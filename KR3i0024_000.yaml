body:
  text: 續茶經譜録類二飲饌之屬提要臣等謹案續茶經三卷附録一卷國朝陸廷燦撰廷燦字秩昭嘉定人官崇安縣知縣候補主事自唐以來茶品推武夷武夷山即在崇安境故廷燦官是縣時習知其說創為此藁歸田後訂緝成編冠以陸羽茶經原本而從其原目採托諸書以續之上卷續其一之源二之具三之造中卷續其四之器下卷自分三子卷下之上續其五之煮六之飲下之中續其七之事八之出下之下續其九之略十之圖而以厯代茶法附為末卷則原目所無廷燦補之也自唐以來閲數百載凡産茶之地製茶之法業已厯代不同即烹煮器具亦古今多異故陸羽所述其書雖古而其法多不可行於今廷燦一一訂定補葺頗切實用其徴引亦頗繁富觀所作南村筆記引李日華紫桃軒又綴五臺凍泉一條自稱此書失載補録於彼則其搜葺亦可謂勤矣録而存之亦足以資考訂至於陸羽舊本廷燦雖用以辨首而其書久已别行未可以續補之書掩其原目故今削去不載惟録廷燦之書焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀續茶經凡例一茶經著自唐桑苧翁迄今千有餘載不獨製作各殊而烹飲迥異即出産之處亦多不同余性嗜茶承乏崇安適係武夷産茶之地值制府滿公鄭重進獻究悉源流每以茶事下詢查閲諸書於武夷之外每多見聞因思採集為續茶經之舉曩以簿書鞅掌有志未遑及䝉量移奉文赴部以多病家居翻閲舊稿不忍委棄爰為序次第恐學術久荒見聞疏漏為識者所鄙謹質之髙明幸有以教之幸甚一茶經之後有茶記及茶譜茶録茶論茶疏茶解等書不可枚舉而其書亦多湮沒無𫝊茲特採所見各書依茶經之例分之源之具之造之器之煮之飲之事之出之略至其圖無𫝊不敢臆補以茶具茶器圖足之一茶經所載皆初唐以前之書今自唐宋元明以至本朝凡有緒論皆行採録有其書在前而茶經未録者亦行補入一茶經原本止三卷恐續者太繁是以諸書所見止摘要分録一各書所引相同者不取重復偶有議論各殊者姑兩存之以示論定至歷代詩文暨當代名公巨卿著述甚多因訪茶經之例不敢備録容俟另編以為外集一原本茶經另列卷首一歷代茶法附後
