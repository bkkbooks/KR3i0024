body:
  text: 續茶經卷中候補主事陸廷燦撰四茶之噐御史臺記唐制御史有三院一曰臺院其僚為侍御史二曰殿院其僚為殿中侍御史三曰察院其僚為監察御史察院㕔居南㑹昌初監察御史鄭路所葺禮察㕔謂之松㕔以其南有古松也刑察㕔謂之魘㕔以寢於此者多夢魘也兵察㕔主掌院中茶其茶必市蜀之佳者貯於陶器以防暑濕御史輒躬親緘啓故謂之茶瓶㕔資暇集茶托子始建中蜀相崔寧之女以茶杯無襯病其熨指取楪子承之既啜而杯傾乃以蠟環楪子之央其盃遂定即命工匠以漆代蠟環進於蜀相蜀相奇之為製名而話於賓親人人為便用於當代是後傳者更環其底愈新其製以至百狀焉貞元初青鄆油繒為荷葉形以襯茶椀别為一家之楪今人多云托子始此非也蜀相即今昇平崔家訊則知矣大觀茶論茶器羅碾碾以銀為上熟鐵次之槽欲深而峻輪欲鋭而薄羅欲細而面𦂳碾必力而速惟再羅則入湯輕泛粥面光凝盡茶之色盞須度茶之多少用盞之大小盞髙茶少則掩蔽茶色茶多盞小則受湯不盡惟盞熱則茶發立耐久筅以觔竹老者為之身欲厚重筅欲踈勁本欲壯而未必眇當如劍脊之狀葢身厚重則操之有力而易於運用筅疎勁如劍脊則擊拂雖過而浮沫不生瓶宜金銀大小之製惟所裁給注湯利害獨瓶之口嘴而已嘴之口差大而宛直則注湯力𦂳而不散嘴之末欲圓小而峻削則用湯有節而不滴瀝葢湯力𦂳則發速有節不滴瀝則茶面不破杓之大小當以可受一盞茶為量有餘不足傾杓煩數茶必氷矣蔡襄茶録茶器茶焙編竹為之裹以篛葉葢其上以收火也隔其中以有容也納火其下去茶尺許常温温然所以養茶色香味也茶籠茶不入焙者宜宻封裹以篛籠盛之置髙處切勿近濕氣砧椎葢以碎茶砧以木為之椎則或金或鐵取於便用茶鈐屈金鐵為之用以炙茶茶碾以銀或鐵為之黄金性柔銅及䃋石皆能生鉎音星不入用茶羅以絶細為佳羅底用蜀東川鵞溪絹之宻者投湯中揉洗以罩之茶盞茶色白宜黒盞建安所造者紺黒紋如毫其柸微厚熁之久熱難冷最為要用出他處者或薄或色紫不及也其青白盞鬭試自不用茶匙要重擊拂有力黄金為上人間以銀鐵為之竹者太輕建茶不取茶瓶要小者易於候湯且㸃茶注湯有準黄金為上若人間以銀鐵或瓷石為之若瓶大啜存停久味過則不佳矣孫穆雞林類事髙麗方言茶匙曰茶戍清波雜志長沙匠者造茶器極精緻工直之厚等所用白金之數士大夫家多有之寘几案間但知以侈靡相夸初不常用也凡茶宜錫竊意以錫為合適用而不侈貼以紙則茶味易損張芸叟云吕申公家有茶羅子一金飾一棕欄方接客索銀羅子常客也金羅子禁近也棕欄則公輔必矣家人常挨排於屏間以候之黄庭堅集同公擇咏茶碾詩要及新香碾一杯不應傳寳到雲來碎身粉骨方餘味莫厭聲喧萬壑雷陶榖清異録富貴湯當以銀銚煮之佳甚銅銚煮水錫壺注茶次之蘇東坡集揚州石塔試茶詩坐客皆可人鼎器手自潔秦少游集茶臼詩幽人躭茗飲刳木事𢷬撞巧製合臼形雅音伴柷椌文與可集謝許判官恵茶器圖詩成圖畫茶器滿幅寫茶詩㑹説工全妙深諳句特奇謝宗可咏物詩茶筅此君一節瑩無瑕夜聴松聲潄玉華萬里引風歸蟹眼半瓶飛雪起龍芽香凝翠髪雲生脚濕滿蒼髯浪卷花到手纎毫皆盡力多因不負玉川家乾淳嵗時記禁中大慶㑹用大鍍金􅜔以五色果簇飣龍鳯謂之繡茶演繁露東坡後集二從駕景靈宫詩云病貪賜茗浮銅葉按今御前賜茶皆不用建盞用大湯􅜔色正白但其制樣似銅葉湯􅜔耳銅葉色黄褐色也周宻癸辛雜志宋時長沙茶具精妙甲天下毎副用白金三百星或五百星凡茶之具悉備外則以大纓銀合貯之趙南仲丞相帥潭以黄金千兩為之以進尚方穆陵大喜葢内院之工所不能為也楊基眉庵集咏木茶爐詩紺緑仙人煉玉膚花神為曝紫霞腴九天清淚沾明月一㸃芳心託鷓鴣肌骨已為香魄死夢魂猶在露團枯孀娥莫怨花零落分付餘醺與酪奴張源茶録茶銚金乃水母銀備剛柔味不鹹澀作銚最良製必穿心令火氣易透茶甌以白磁為上藍者次之聞龍茶牋茶鍑山林隠逸水銚用銀尚不易得何况鍑乎若用之恒歸於鐵也羅廩茶解茶爐或瓦或竹皆可而大小須與湯銚稱凡貯茶之器始終貯茶不得移為他用李如一水南翰記韻書無􅜔字今人呼盛茶酒器曰􅜔檀几叢書品茶用歐白甆為良所謂素甆𫝊静夜芳氣滿閒軒也製宜弇口䆳腸色浮浮而香不散茶説器具精潔茶愈為之生色今時姑蘇之錫注時大彬之沙壺汴梁之錫銚湘妃竹之茶竈宣成窰之茶盞髙人詞客賢士大夫莫不為之珍重即唐宋以來茶具之精未必有如斯之雅致聞雁齋筆談茶既就筐其性必發於日而遇知己於水然非煮之茶竈茶爐則亦不佳故曰飲茶富貴之事也雪庵清史泉冽性駛非扄以金銀器味必破器而走矣有饋中冷泉於歐陽文忠者公訝曰君故貧士何為致此奇貺徐視饋器乃曰水味盡矣噫如公言飲茶乃富貴事耶嘗考宋之大小龍團始於丁謂成於蔡襄公聞而嘆曰君謨士人也何至作此事東坡詩曰武彛溪邊粟粒芽前丁後蔡相籠加吾君所乏豈此物致養口體何陋耶此則二公又為茶敗壊多矣故余於茶瓶而有感茶鼎丹山碧水之鄉月澗雲龕之品滌煩消渴功誠不在芝朮下然不有似泛乳花浮雲脚則草堂暮雲隂松牕殘雪明何以勺之野語清噫鼎之有功於茶大矣哉故日休有立作菌蠢勢煎為潺湲聲禹錫有驟雨松風入鼎來白雲滿盌花徘徊居仁有浮花原屬三昧手竹齋自試魚眼湯仲淹有鼎磨雲外首山銅瓶攜江上中􅍽水景綸有待得聲聞俱寂後一甌春雪勝醍醐噫鼎之有功於茶大矣哉雖然吾猶有取盧仝柴門反闗無俗客紗帽籠頭自煎喫楊萬里老夫平生愛煮茗十年燒穿折脚鼎如二君者差可不負此鼎耳馮時可茶録芘莉一名篣筤茶籠也犧木杓也瓢也宜興志茗壺陶穴環於蜀山原名獨山東坡居陽羡時以其似蜀中風景改名蜀山今山椒建東坡祠以祀之陶煙飛染祠宇盡黒冒巢民云茶壺以小為貴毎一客一壺任獨斟飲方得茶趣何也壺小則香不渙散味不躭遲况茶中香味不先不後恰有一時太早或未足稍緩或已過箇中之妙清心自飲化而裁之存乎其人周髙起陽羨茗壺系茶至明代不復碾屑和香藥製團餅已逺過古人近百年中壺黜銀錫及閩豫甆而尚宜興陶此又逺過前人處也陶曷取諸取其製以本山土砂能發真茶之色香味不但杜工部云傾金注玉驚人眼髙流務以免俗也至名手所作一壺重不數兩價毎一二十金能使土與黄金爭價世日趨華抑足感矣考其創始自金沙寺僧久而逸其名又提學頤山吴公讀書金沙寺中有青衣供春者仿老僧法為之栗色闇闇敦龎周正指螺紋隠隠可按允稱第一世作龔春悮也萬厯間有四大家董翰趙梁𤣥錫時朋朋即大彬父也大彬號少山不務妍媚而樸雅堅栗妙不可思遂於陶人擅空羣之目矣此外則有李茂林李仲芳徐友泉又大彬徒歐正春邵文金邵文銀蔣伯荂四人陳用卿陳信卿閔魯生陳光甫又婺源人陳仲羙重鎪叠刻細極鬼工沈君用邵蓋周後溪邵二孫陳俊卿周季山陳和之陳挺生承雲從沈君盛陳辰輩各有所長徐友泉所自製之泥色有海棠紅朱砂紫定窰白冷金黄淡墨沉香水碧榴皮葵黄閃色梨皮等名大彬鐫欵用竹刀畫之書法閒雅茶洗式如扁壺中加一盎鬲而細竅其底便於過水漉沙茶藏以閉洗過之茶者陳仲羙沈君用各有奇製水杓湯銚亦有製之盡羙者要以椰瓢錫缶為用之恒茗壺宜小不宜大宜淺不宜深壺葢宜盎不宜砥湯力茗香俾得團結氤氲方為佳也壺若有宿雜氣須滿貯沸湯滌之乘熱傾去即沒於冷水中亦急出水瀉之元氣復矣許次杼茶疏茶盒以貯日用零茶用錫為之從大壜中分出若用盡時再取茶壺往時尚龔春近日時大彬所製極為人所重葢是觕砂製成正􅂑砂無土氣耳臞仙云茶甌者予嘗以瓦為之不用磁以筍殻為葢以檞葉攢覆於上如篛笠狀以蔽其塵用竹架盛之極清無比茶匙以竹編成細如笊籬樣與塵世所用者大不凡矣乃林下出塵之物也煎茶用銅瓶不免湯鉎用砂銚亦嫌土氣惟純錫為五金之母製銚能益水徳謝肇淛五雜組宋初閩茶北苑為最當時上供者非兩府禁近不得賜而人家亦珍重愛惜如王東城有茶囊惟楊大年至則取以具茶他客莫敢望也支廷訓集有湯藴之傳乃茶壺也文震亨長物志壺以砂者為上既不奪香又無熟湯氣錫壺有趙良璧者亦佳吴中歸錫嘉禾黄錫價皆最髙遵生八牋茶銚茶瓶磁砂為上銅錫次之磁壺注茶砂銚煮水為上茶盞惟宣窰壇為最質厚白瑩樣式古雅有等宣窰印花白甌式樣得中而瑩然如玉次則嘉窰心内有茶字小盞為羙欲試茶色黄白豈容青花亂之注酒亦然惟純白色器皿為最上乘餘品皆不取試茶以滌器為第一要茶瓶茶盞茶匙生鉎致損茶味必須先時洗潔則羙曹昭格古要論古人喫茶湯用撆取其易乾不留滯陳繼儒試茶詩有竹爐幽討松火怒飛之句竹茶爐出恵山者最佳淵鑒類函茗盌韓詩茗盌纎纎捧徐葆光中山傳信録琉球茶甌色黄描青緑花草云出土噶喇其質少麤無花但作氷紋者出大島甌上造一小木葢朱黑漆之下作空心托子製作頗工亦有茶托茶帚其茶具火爐與中國小異葛萬里清異論録時大彬茶壺有名釣雪似帶笠而釣者然無牽合意随見録洋銅茶銚來自海外紅銅盪錫薄而輕精而雅烹茶最宜續茶經卷中
