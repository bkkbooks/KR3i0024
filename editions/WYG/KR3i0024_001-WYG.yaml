body:
  text: 續茶經卷上之一候補主事陸廷燦撰一茶之源許慎説文茗荼芽也王褒僮約前云炰鼈烹荼後云陽武買荼注前為苦菜後為茗張華博物志飲真荼令人少眠詩疏椒樹似茱萸蜀人作茶吳人作茗皆合煮其葉以為香唐書陸羽傳羽嗜茶著經三篇言茶之源之具之造之器之煮之飲之事之出之畧之圖尤備天下益知飲茶矣唐六典金英緑片皆茶名也李太白集贈族姪僧中孚玉泉仙人掌茶序余聞荆州玉泉寺近青溪諸山山洞往往有乳窟窟多玉泉交流中有白蝙蝠大如鴉按仙經蝙蝠一名仙䑕千嵗之後體白如雪棲則倒懸葢飲乳水而長生也其水邊處處有茗草羅生枝葉如碧玉惟玉泉真公常採而飲之年八十餘嵗顔色如桃花而此茗清香滑熟異於他茗所以能還童振枯扶人夀也余遊金陵見宗僧中孚示余茶數十片卷然重叠其狀如掌號為仙人掌茶葢新出乎玉泉之山曠古未覯因持之見貽兼贈詩要余答之遂有此作俾後之高僧大隠知仙人掌茶發於中孚禪子及青蓮居士李白也皮日休集茶中雜咏詩序自周以降及於國朝茶事竟陵子陸季疵言之詳矣然季疵以前稱茗飲者必渾以烹之與夫瀹蔬而啜者無異也季疵之始為經三卷由是分其源制其具教其造設其器命其煮俾飲之者除痟而去癘雖疾醫之未若也其為利也於人豈小哉余始得季疵書以為備矣後又獲其顧渚山記二篇其中多茶事後又太原温從雲武威段􅀈之各補茶事十數節並存於方冊茶之事由周而至於今竟無纎遺矣封氏聞見記茶南人好飲之北人初不多飲開元中太山靈巖寺有降魔師大興禪教學禪務於不寐又不夕食皆許飲茶人自懷挾到處煮飲從此轉相倣傚遂成風俗起自鄒齊滄棣漸至京邑城市多開店鋪煎茶賣之不問道俗投錢取飲其茶自江淮而來色額甚多唐韻荼字自中唐始變作茶裴汶茶述茶起於東晉盛於今朝其性精清其味浩潔其用滌煩其功致和參百品而不混越衆飲而獨髙烹之鼎水和以虎形人人服之永永不厭得之則安不得則病彼芝术黄精徒云上藥致效在數十年後且多禁忌非此倫也或曰多飲令人體虛病風余曰不然夫物能袪邪必能輔正安有蠲逐聚病而靡裨太和哉今宇内為土貢實衆而顧渚蘄陽䝉山為上其次則夀陽義興碧澗㴩湖衡山最下有鄱陽浮梁今者其精無以尚焉得其麄者則下里兆庶甌盌紛糅頃刻未得則胃腑病生矣人嗜之若此者西晉以前無聞焉至精之味或遺也因作茶述宋徽宗大觀茶論茶之為物擅甌閩之秀氣鍾山川之靈禀袪襟滌滯致清導和則非庸人孺子可得而知矣冲澹閒潔韻髙致静則非遑遽之時可得而好尚矣而本朝之興嵗修建溪之貢龍團鳯餅名冠天下而壑源之品亦自此而盛延及於今百廢具舉海内宴然垂拱宻勿幸致無為縉紳之士韋布之流沐浴膏澤薰陶徳化咸以雅尚相推從事茗飲故近嵗以來采擇之精製作之工品第之勝烹㸃之妙莫不盛造其極嗚呼至治之世豈惟人得以盡其材而草木之靈者亦得以盡其用矣偶因暇日研究精㣲所得之妙後人有不知為利害者叙本末二十篇號曰茶論一曰地産二曰天時三曰擇採四曰蒸壓五曰製造六曰鑒别七曰白茶八曰羅碾九曰盞十曰筅十一曰瓶十二曰杓十三曰水十四曰㸃十五曰味十六曰香十七曰色十八曰蔵十九曰品二十曰外焙名茶各以所産之地葉如耕之平園台星巖葉剛之髙峯青鳯髓葉思純之大風葉嶼之屑山葉五崇林之羅漢上水桑芽葉堅之碎石窠石臼窠一作六窠葉瓊葉輝之秀皮林葉師復師貺之虎巖葉椿之無又巖葉芽懋之老窠園各擅其美未嘗混淆不可概舉焙人之茶固有前優後劣昔負今勝者是以園地之不常也丁謂進新茶表右件物産異金沙名非紫筍江邊地煖方呈彼茁之形闕下春寒已發其甘之味有以少為貴者焉敢韞而藏諸見謂新茶實遵舊例蔡襄進茶録表臣前因奏事伏䝉陛下諭臣先任福建運使日所進上品龍茶最為精好臣退念草木之微首辱陛下知鑒若處之得地則能盡其材昔陸羽茶經不第建安之品丁謂茶圖獨論採造之本至烹煎之法曾未有聞臣輒條數事簡而易明勒成二篇名曰茶録伏惟清閒之宴或賜觀采臣不勝榮幸歐陽修歸田録茶之品莫貴於龍鳯謂之團茶凡八餅重一觔慶厯中蔡君謨始造小片龍茶以進其品精絶謂之小團凡二十餅重一斤其價值金二兩然金可有而茶不可得毎因南郊致齋中書樞宻院各賜一餅四人分之宫人往往縷金花於其上葢其貴重如此趙汝礪北苑别録草木至夜益盛故欲導生長之氣以糝雨露之澤茶於毎嵗六月興工虚其本培其末滋蔓之草遏鬱之木悉用除之政所以導生長之氣而滲雨露之澤也此之謂開畬唯桐木則留焉桐木之性與茶相宜而又茶至冬則畏寒桐木望秋而先落茶至夏而畏日桐木至春而漸茂理亦然也王闢之澠水燕談建茶盛於江南近嵗制作尤精龍團最為上品一觔八餅慶厯中蔡君謨為福建運使始造小團以充嵗貢一觔二十餅所謂上品龍茶者也仁宗尤所珍惜雖宰相未嘗輒賜惟郊禮致齋之夕兩府各四人共賜一餅宫人剪金為龍鳯花貼其上八人分蓄以為竒玩不敢自試有佳客出為𫝊玩歐陽文忠公云茶為物之至精而小團又其精者也嘉祐中小團初出時也今小團易得何至如此多貴周輝清波雜志自熙寧後始貢宻雲龍毎嵗頭綱修貢奉宗廟及貢玉食外賚及臣下無幾戚里貴近丐賜尤繁宣仁太后令建州不許造宻雲龍受他人煎炒不得也此語既𫝊播於縉紳間由是宻雲龍之名益著淳熈間親黨許仲啟官蘇沙得北苑修貢録序以刋行其間載嵗貢十有二綱凡三等四十有一名第一綱曰龍焙貢新止五十餘銙貴重如此獨無所謂密雲龍者豈以貢新易其名耶抑或别為一種又居宻雲龍之上耶沈存中夢溪筆談古人論茶唯言陽羡顧渚天柱蒙頂之類都未言建溪然唐人重串茶粘黑者則已近乎建餅矣建茶皆喬木吳蜀唯叢茇而已品自居下建茶勝處曰郝源曾坑其間又有坌根山頂二品尤勝李氏號為北苑置使領之胡仔苕溪漁隠叢話建安北苑始於太宗太平興國三年遣使造之取象於龍鳯以別入貢至道間仍添造石乳蠟面其後大小龍又起於丁謂而成於蔡君謨至宣政間鄭可簡以貢茶進用乆領漕添續入其數漸廣今猶因之細色茶五綱凡四十三品形製各異共七千餘餅其間貢新試新龍團勝雪白茶御苑玉芽此五品乃水揀為第一餘乃生㨂次之又有麄色茶七綱凡五品大小龍鳯并揀芽悉入龍腦和膏為團餅茶共四萬餘餅葢水揀茶即社前者生揀茶即火前者麄色茶即雨前者閩中地暖雨前茶已老而味加重矣又有石門乳吉香口三外焙亦隸於北苑皆採摘茶芽送官焙添造毎嵗縻金共二萬餘緡日後千夫凡兩月方能迄事第所造之茶不許過數入貢之後市無貨者人所罕得惟壑源諸處私焙茶其絶品亦可敵官焙自昔至今亦皆入貢其流販四方者悉私焙茶耳北苑在富沙之北隸建安縣去城二十五里乃龍焙造貢茶之處亦名鳯皇山自有一溪南流至富沙城下方與西來水合而東車清臣脚氣集毛詩云誰謂荼苦其甘如薺注荼苦菜也周禮掌荼以供喪事取其苦也蘇東坡詩云周詩記苦荼茗飲出近世乃以今之茶為荼夫茶今人以清頭目自唐以來上下好之細民亦日數椀豈是荼也茶之麄者是為茗宋子安東溪試茶録序茶宜髙山之隂而喜日陽之早自北苑鳯山南直苦竹園頭東南屬張坑頭皆高逺先陽處嵗發常早芽極肥乳非民間所比次出壑源嶺髙土沃地茶味甲於諸焙丁謂亦云鳯山髙不百丈無危峯絶崦而岡翠環抱氣勢柔秀宜乎嘉植靈卉之所發也又以建安茶品甲天下疑山川至靈之卉天地始和之氣盡此茶矣又論石乳出壑嶺斷崖缺石之間葢草木之仙骨也近蔡公亦云惟北苑鳯凰山連屬諸焙所産者味佳故四方以建茶為名皆曰北苑云黄儒品茶要録序説者嘗謂陸羽茶經不第建安之品葢前此茶事未甚興靈芽真笋往往委翳消腐而人不知惜自國初以來士大夫沐浴膏澤詠歌昇平之日乆矣夫身世灑落神觀冲澹惟兹茗飲為可喜園林亦相與摘英誇異制棬鬻新以趨時之好故殊異之品始得自出於榛莽之間而其名遂冠天下借使陸羽復起閲其金餅味其雲腴當爽然自失矣因念草木之材一有負瓌偉絶特者未嘗不遇時而後興况於人乎蘇軾書黄道輔品茶要録後黄君道輔諱儒建安人博學能文淡然精深有道之士也作品茶要録十篇委曲微妙皆陸鴻漸以來論茶者所未及非至静無求虚中不留烏能察物之情如此其詳哉茶録茶古不聞食自晉宋已降吳人採葉煮之名為茗粥葉清臣煑茶泉品吳楚山谷間氣清地靈草木穎挺多孕茶荈大率右於武夷者為白乳甲於吳興者為紫筍産禹穴者以天章顯茂錢塘者以徑山稀至於桐廬之巖雲衢之麓雅山著於宣歙蒙頂𫝊於岷蜀角立差勝毛舉實繁周絳補茶經芽茶只作早茶馳奉萬乗嘗之可矣如一旗一槍可謂竒茶也胡致堂曰茶者生人之所日用也其急甚於酒陳師道茶經叢談茶洪之雙井越之日注莫能相先後而强為之第者皆勝心耳陳師道茶經序夫茶之著書自羽始其用於世亦自羽始羽誠有功於茶者也上自宫省下逮邑里外及異域遐陬賔祀燕享預陳於前山澤以成市商賈以起家又有功於人者也可謂智矣經曰茶之否臧存之口訣則書之所載猶其粗也夫茶之為藝下矣至其精微書有不盡况天下之至理而欲求之文字紙墨之間其有得乎昔者先王因人而教同欲而治凡有益於人者皆不廢也吳淑茶賦注五花茶者其片作五出花也姚氏殘語紹興進茶自髙文虎始王楙野客叢書世謂古之荼即今之茶不知荼有數種非一端也詩曰誰謂荼苦其甘如薺者乃苦菜之荼如今苦苣之類周禮掌荼毛詩有女如荼者乃苕荼之荼也此萑葦之屬惟荼檟之荼乃今之茶也世莫知辨魏王花木志茶葉似梔可煮為飲其老葉謂之荈嫩葉謂之茗瑞草總論唐宋以來有貢茶有𣙜茶夫貢茶猶知斯人有愛君之心若夫𣙜茶則利歸於官擾及於民其為害又不一端矣元熊禾勿齋集北苑茶焙記貢古也茶貢不列禹貢周職方而昉於唐北苑又其最著者也苑在建城東二十五里唐末里民張暉始表而上之宋初丁謂漕閩貢額驟益觔至數萬慶厯承平日乆蔡公襄繼之制益精巧建茶遂為天下最公名在四諫官列君子惜之歐陽公修雖實不與然猶誇侈歌咏之蘇公軾則直指其過矣君子創法可繼焉得不重慎也説郛臆乘茶之所産六經載之詳矣獨異美之名未備唐宋以來見於詩文者尤夥頗多疑似若蟾背蝦鬚雀舌蟹眼瑟瑟瀝瀝靄靄皷浪湧泉琉璃眼碧玉池又皆茶事中天然偶字也茶譜衡州之衡山封州之西鄉茶研膏為之皆片團如月又彭州蒲村堋口其園有仙芽石花等號明人月團茶歌序唐人製茶碾末以酥滫為團宋世尤精元時其法遂絶予效而為之葢得其似始悟古人詠茶詩所謂膏油首面所謂佳茗似佳人所謂緑雲輕綰湘娥鬟之句飲啜之餘因作詩記之并𫝊好事屠本畯茗笈評人論茶葉之香未知茶花之香余往嵗過友大雷山中正值花開童子摘以為供幽香清越絶自可人惜非甌中物耳乃予著缾史月表以插茗花為齋中清玩而髙亷盆史亦載茗花足助𤣥賞云茗笈贊十六章一曰溯源二曰得地三曰乗時四曰揆制五曰藏茗六曰品泉七曰候火八曰定湯九曰㸃瀹十曰辨器十一曰申忌十二曰防濫十三曰戒淆十四曰相宜十五曰衡鑒十六曰𤣥賞謝肇淛五雜組今茶品之上者松蘿也虎丘也羅岕也龍井也陽羡也天池也而吾閩武夷清源彭山三種可與角勝六安鴈宕蒙山三種袪滯有功而色香不稱當是藥籠中物非文房佳品也西吳枝乘湖人於茗不數顧渚而數羅岕然顧渚之佳者其風味已逺出龍井下岕稍清雋然葉粗而作草氣丁長孺甞以半角見餉且教余烹煎之法迨試之殊類羊公鶴此余有解有未解也余甞品茗以武夷虎丘第一淡而逺也松蘿龍井次之香而艷也天池又次之常而不厭也餘子瑣瑣勿置齒喙謝肇淛屠長卿考槃餘事虎丘茶最號精絶為天下冠惜不多産皆為豪右所據寂寞山家無由獲購矣天池青翠芳馨噉之賞心嗅亦消渇可稱仙品諸山之茶當為退舎陽羨俗名羅岕浙之長興者佳荆溪稍下細者其價兩倍天池惜乎難得須親自收采方妙六安品亦精入藥最效但不善炒不能發香而味苦茶之本性實佳龍井之山不過數十畝外此有茶似皆不及大抵天開龍泓美泉山靈特生佳茗以副之耳山中僅有一二家炒法甚精近有山僧焙者亦妙真者天池不能及也天目為天池龍井之次亦佳品也地志云山中寒氣早嚴山僧至九月即不敢出冬來多雪三月後方通行其萌芽較他茶獨晩包衡清賞録昔人以陸羽飲茶比於后稷樹榖及觀韓翃謝賜茶啟云吳主禮賢方聞置茗晉人愛客纔有分茶則知開創之功非闗桑苧老翁也若云在昔茶勲未普則比時賜茶已一千五百串矣陳仁錫潛確類書紫琳腴雲腴皆茶名也茗花白色冬開似梅亦清香按冒巢民岕茶彚鈔云茶花味濁無香香凝葉内二説不同豈岕與他茶獨異歟農政全書六經中無茶荼即茶也毛詩云誰謂荼苦其甘如薺以其苦而甘味也夫茶靈草也種之則利博飲之則神清上而王公貴人之所尚下而小夫賤隸之所不可闕誠民生食用之所資國家課利之一助也羅廪茶解茶固不宜雜以惡木惟古梅叢桂辛夷玉蘭玫瑰蒼松翠竹與之間植足以蔽霜雪掩映秋陽其下可植芳蘭幽菊清芬之品最忌菜畦相逼不免滲漉滓厥清真茶地南向為佳向隂者遂劣故一山之中美惡相懸李日華六研齋筆記茶事於唐末未甚興不過幽人雅士手擷於荒園雜穢中拔其精英以薦靈爽所以饒雲露自然之味至宋設茗綱充天家玉食士大夫益復貴之民間服習寖廣以為不可缺之物於是營植者擁溉孳糞等於蔬䔩而茶亦隤其品味矣人知鴻漸到處品泉不知亦到處捜茶皇甫冉送羽攝山採茶詩數言僅存公案而已徐巖泉六安州茶居士傳居士姓茶族氏衆多枝葉繁衍遍天下其在六安一枝最著為大宗陽羨羅岕武夷匡廬之類皆小宗蒙山又其别枝也樂思白雪庵清史夫輕身換骨消渇滌煩茶荈之功至妙至神昔在有唐吾閩茗事未興草木仙骨尚閟其靈五代之季南唐採茶北苑而茗事興迨宋至道初有詔奉造而茶品日廣及咸平慶厯中丁謂蔡襄造茶進奉而製作益精至徽宗大觀宣和間而茶品極矣斷崖缺石之上木秀雲腴往往於此露靈倘微丁蔡來自吾閩則種種佳品不㡬於委翳消腐哉雖然患無佳品耳其品果佳即微丁蔡來自吾閩而靈芽真笋豈終於委翳消腐乎吾閩之能輕身換骨消渇滌煩者寧獨一茶乎兹將發其靈矣馮時可茶譜茶全貴採造蘇州茶飲徧天下専以採造勝耳徽郡向無茶近出松蘿最為時尚是茶始比丘大方大方居虎丘最乆得採造法其後於徽之松蘿結庵採諸山茶於庵焙製逺邇争市價忽翔湧人因稱松蘿實非松蘿所出也胡文煥茶集茶至清至美物也世皆不味之而食烟火者又不足以語此醫家論茶性寒能傷人脾獨予有諸疾則必藉茶為藥石毎深得其功效噫非縁之有自而何契之若是耶羣芳譜蘄州蘄門團黄有一旗一槍之號言一葉一芽也歐陽公詩有共約試新茶旗槍㡬時緑之句王荆公送元厚之句云新茗齋中試一旗世謂茶始生而嫩者為一鎗寖大開者為一旗魯彭刻茶經序夫茶之為經要矣兹復刻者便覽爾刻之竟陵者表羽之為竟陵人也按羽生甚異類令尹子文人謂子文賢而仕羽雖賢卒以不仕今觀茶經三篇固具體用之學者其曰伊公羮陸氏茶取而比之實以自况所謂易地皆然者非歟厥後茗飲之風行於中外而回紇亦以馬易茶由宋迄今大為邊助則羽之功固在萬世仕不仕奚足論也沈石田書岕茶别論後昔人咏梅花云香中别有韻清極不知寒此惟岕茶足當之若閩之清源武夷吳郡之天池虎丘武林之龍井新安之松蘿匡廬之雲霧其名雖大噪不能與岕相抗也顧渚毎嵗貢茶三十二觔則岕於國初已受知遇施于今漸逺漸𫝊漸覺聲價轉重既得聖人之清又得聖人之時蒸采烹洗悉與古法不不同李維楨茶經序羽所著君臣契三卷源解三十卷江表四姓譜十卷占夢三卷不盡𫝊而獨𫝊茶經豈他書人所時有此其觭長易於取名耶太史公曰富貴而名磨滅不可勝數惟俶儻非常之人稱焉鴻漸窮阨終身而遺書遺跡百世下寳愛之以為山川邑里重其風足以亷頑立懦胡可少哉楊慎丹鉛總録茶即古荼字也周詩記荼苦春秋書齊荼漢志書荼陵顔師古陸徳明雖已轉入荼音而未易字文也至陸羽茶經玉川茶歌趙賛茶禁以後遂以茶易荼董其昌茶董題詞荀子曰其為人也多暇其出入也不逺矣陶通明曰不為無益之事何以悦有涯之生余謂茗椀之事足當之葢幽人髙士蟬蜕勢利以耗壯心而送日月水源之輕重辨若淄澠火候之文武調若丹鼎非枕潄之侣不親非文字之飲不比者也當今此事惟許夏茂卿拈出顧渚陽羡肉食者往焉茂卿亦安能禁壹似强􅀏不樂强顔無懽茶韻故自勝耳予夙秉幽尚入山十年差可不愧茂卿語今者驅車入閩念鳯團龍餅延津為瀹豈必土思如亷頗思用趙惟是絶交書所謂心不耐煩而官事鞅掌者竟有負茶竈耳茂卿能以同味諒吾耶童承叙題陸羽傳後余嘗過竟陵憩羽故寺訪雁橋觀茶井慨然想見其為人夫羽少厭髠緇篤嗜墳素本非忘世者卒乃寄號桑苧遁跡苕霅嘯歌獨行繼以痛哭其意必有所在時迺比之接輿豈知羽者哉至其性甘茗荈味辨淄澠清風雅趣膾炙今古張顛之於酒也昌黎以為有所托而逃羽亦以是夫榖山筆塵茶自漢以前不見於書想所謂檟者即是矣李贄疑謂古人冬則飲湯夏則飲水未有茶也李文正資暇録謂茶始於唐崔寧黄伯思已辨其非伯思甞見北齊楊子華作邢子才魏收勘書圖已有煎茶者南牕記談謂飲茶始於梁天監中事見洛陽伽藍記及閲吳志韋曜𫝊賜茶荈以當酒則茶又非始於梁矣余謂飲茶亦非始於吳也爾雅曰檟苦荼郭璞注可以為羮飲早採為茶晚采為茗一名荈則吳之前亦以茶作茗矣苐未如後世之日用不離也葢自陸羽出茶之法始講自吕恵卿蔡君謨輩出茶之法始精而茶之利國家且藉之矣此古人所不及詳者也王象晉茶譜小序茶嘉木也一植不再移故婚禮用茶從一之義也雖兆自食經飲自隋帝而好者尚寡至後興於唐盛於宋始為世重矣仁宗賢君也頒賜兩府四人僅得兩餅一人分數錢耳宰相家至不敢碾試藏以為寳其貴重如此近世蜀之蒙山毎嵗僅以兩計蘇之虎丘至官府預為封識公為採製所得不過數觔豈天地間尤物生固不數數然耶甌泛翠濤碾飛緑屑不藉雲腴孰驅睡魔作茶譜陳繼儒茶董小序范希文云萬象森羅中安知無茶星余以茶星名館毎與客茗戰旗槍標格天然色香映發若陸季疵復生忍作毁茶論乎夏子茂卿叙酒其言甚豪予曰何如隠囊紗帽翛然林澗之間摘露芽煮雲腴一洗百年塵土胃耶熱腸如沸茶不勝酒幽韻如雲酒不勝茶酒類俠茶類隠酒固道廣茶亦徳素茂卿茶之董狐也因作茶董東佘陳繼儒書於素濤軒夏茂卿茶董序自晉唐而下紛紛邾莒之㑹各立勝塲品別淄澠判若南董遂以茶董名篇語曰窮春秋演河圖不如載茗一車誠重之矣如謂此君面目嚴冷而且以為水厄且以為乳妖則請效綦毋先生無作此事冰蓮道人識本草石蕊一名雲茶卜萬祺松寮茗政虎丘茶色味香韻無可比儗必親詣茶所手摘監製乃得真産且難乆貯即百端珍䕶稍過時即全失其初矣殆如彩雲易散故不入供御耶但山嵓隙地所産無㡬又為官司禁據寺僧慣雜贋種非精鑒家卒莫能辨明萬厯中寺僧苦大吏需索薙除殆盡文文肅公震孟作薙茶説以譏之至今真産尤不易得袁了凡羣書備考茶之名始見於王褒僮約許次杼茶疏唐人首稱陽羨宋人最重建州於今貢茶兩地獨多陽羨僅有其名建州亦上品惟武夷雨前最勝近日所尚者為長興之羅岕疑即古顧渚紫筍然岕故有數處今惟峒山最佳姚伯道云明月之峽厥有佳茗韻致清逺滋味甘香足稱仙品其在顧渚亦有佳者今但以水口茶名之全與岕别矣若歙之松蘿吳之虎丘杭之龍井並可與岕頡頑郭次甫極稱黄山黄山亦在歙去松蘿逺甚往時士人皆重天池然飲之略多令人脹滿浙之産曰鴈宕大盤金華日鑄皆與武夷相伯仲錢塘諸山産茶甚多南山儘佳北山稍劣武夷之外有泉州之清源儻以好手製之亦是武夷亞匹惜多焦枯令人意盡楚之産曰寳慶滇之産曰五華皆表表有名在鴈茶之上其他名山所産當不止此或余未知或名未著故不及論李詡戒庵漫筆昔人論茶以槍旗為美而不取雀舌麥顆葢芽細則易雜他樹之葉而難辨耳槍旗者猶今稱壺蜂翅是也四時類要茶子於寒露候收曬乾以溼沙土拌匀盛筐籠内穰草葢之不爾即凍不生至二月中取出用糠與焦土種之於樹下或背隂之地開坎圓三尺深一尺熟劚著糞和土毎阬下子六七十顆覆土厚一寸許相離二尺種一叢性惡濕又畏日大概宜山中斜坡峻坂走水處若平地須深開溝壟以洩水三年後方可收茶張大復梅花筆談趙長白作茶史攷訂頗詳要以識其事而已矣龍團鳯餅紫茸驚芽决不可用於今之世予甞論今之世筆貴而愈失其𫝊茶貴而愈出其味天下事未有不身試而出之者也文震亨長物志古今論茶事者無慮數十家若鴻漸之經君謨之録可為盡善然其時法用熟碾為丸為挺故所稱有龍鳯團小龍團宻雲龍瑞雲翔龍至宣和間始以茶色白者為貴漕臣鄭可聞始創為銀絲水芽以茶剔葉取心清泉漬之去龍腦諸香惟新銙小龍蜿蜒其上稱龍團勝雪當時以為不更之法而吾朝所尚又不同其烹試之法亦與前人異然簡便異常天趣悉備可謂盡茶之味矣而至於洗茶候湯擇器皆各有法寧特侈言烏府雲屯等目而已哉虎丘志馮夣楨云徐茂吳品茶以虎丘為第一周高起洞山茶系岕茶之尚於髙流雖近數十年中事而厥産伊始則自盧仝隠居洞山種於隂嶺遂有茗嶺之目相𫝊古有漢王者棲遲茗嶺之陽課童藝茶踵盧仝幽致故陽山所産香味倍勝茗嶺所以老廟後一帶茶猶唐宋根株也貢山茶今已絶種徐􅎾茶考按茶録諸書閩中所産茶以建安北􅁐為第一壑源諸處次之武夷之名未有聞也然范文正公鬭茶歌云溪邊竒茗冠天下武夷仙人從古栽蘇文忠公云武夷溪邊粟粒芽前丁後蔡相籠加則武夷之茶在北宋已經著名第未盛耳但宋元製造團餅似失正味今則靈芽仙萼香色尤清為閩中第一至於北􅁐壑源又冺然無稱豈山川靈秀之氣造物生殖之美或有時變易而然乎勞大與甌江逸志按茶非甌産也而甌亦産茶故舊制以之充貢及今不廢張羅峯當國凡甌中所貢方物悉與題蠲而茶獨留将毋以先春之採可薦馨香且嵗費物力無多姑存之以稍備芹獻之義耶乃後世因按辦之際不無恣取上為一下為十而藝茶之圃遂為怨叢惟願為官於此地者不濫取於數外庶不致大為民病天中記凡種茶樹必下子移植則不復生故俗聘婦必以茶為禮義固有所取也事物記原𣙜茶起於唐建中正元之間趙贊張滂建議税其什一枕譚古𫝊注茶樹初採為荼老為茗再老為荈今概稱茗當是錯用事也熊明遇岕山茶記産茶處山之夕陽勝於朝陽廟後山西向故稱佳總不如洞山南向受陽氣特専足稱仙品云冒襄岕茶彚抄茶産平地受土氣多故其質濁岕茗産於髙山渾是風露清虛之氣故為可尚吳拭云武夷茶賞自蔡君謨始謂其味過於北苑龍團周右文極抑之葢緣山中不諳製焙法一味計多狥利之過也余試采少許製以松蘿法汲虎嘯巖下語兒泉烹之三德俱備帶雲石而復有甘軟氣乃分數百葉寄右文令茶吐氣復酹一杯報君謨於地下耳釋超全武夷茶歌注建州一老人始獻山茶死後𫝊為山神喊山之茶始此中原市語茶曰渲老陳詩教灌園史予嘗聞之山僧言茶子數顆落地一莖而生有似連理故婚嫁用茶蓋取一本之義舊傳茶樹不可移竟有移之而生者乃知晁采寄茶徒襲影響耳唐李義山以對花啜茶為殺風景予苦渴疾何啻七椀花神有知當不我罪金陵瑣事茶有肥瘦雲泉道人云凡茶肥者甘甘則不香茶瘦者苦苦則香此又茶經茶訣茶品茶譜之所未發野航道人朱存理云飲之用必先茶而茶不見於禹貢蓋全民用而不為利後世𣙜茶立為制非古聖意也陸鴻漸著茶經蔡君謨著茶譜孟諫議寄盧玉川三百月團後侈至龍鳯之飾責當備於君謨然清逸高逺上通王公下逮林野亦雅道也佩文齋廣羣芳譜茗花即食茶之花色月白而黄心清香隱然瓶之髙齋可為清供佳品且蕊在枝條無不開徧王新城居易錄廣南人以䔲為茶予頃著之皇華記聞閲道鄉集有張糾送吳洞䔲絶句云茶選修仁方破碾䔲分吳洞忽當筵君謨逺矣知難作試取一瓢江水煎蓋志完遷昭平時作也分甘餘話宋丁謂為福建轉運使始造龍鳯團茶上供不過四十餅天聖中又造小團其品過於大團神宗時命造密雲龍其品又過於小團元祐初宣仁皇太后曰指揮建州今後更不許造密雲龍亦不要團茶揀好茶喫了生得甚好意智宣仁改熈寧之政此其小者顧其言實可為萬世法士大夫家膏粱子弟尤不可不知也謹備錄之百夷語茶曰芽以麄茶曰芽以結細茶曰芽以完緬甸夷語茶曰臘扒喫茶曰臈扒儀索徐葆光中山傳信錄琉球呼茶曰札武夷茶考按丁謂製龍團蔡忠恵製小龍團皆北苑事其武夷修貢自元時浙省平章髙興始而談者輒稱丁蔡蘇文忠公詩云武夷溪邊粟粒芽前丁後蔡相寵嘉則北苑貢時武夷已為二公賞識矣至髙興武夷貢後而北苑漸至無聞昔人云茶之為物滌昏雪滯於務學勤政未必無助其與進荔枝桃花者不同然充類至義則亦宦官宫妾之愛君也忠恵直道高名與范歐相亞而進茶一事乃儕晉公君子舉措可不慎歟隨見錄按沈存中筆談云建茶皆喬木吳蜀惟叢茇而已以余所見武夷茶樹俱係叢茇初無喬木豈存中未至建安歟抑當時北苑與此日武夷有不同歟茶經云巴山峽川有兩人合抱者又與吳蜀叢茇之説互異姑識之以俟參考萬姓綂譜載漢時人有茶恬出江都易王𫝊按漢書荼恬蘇林曰茶食邪反則荼本兩音至唐而荼茶始分耳焦氏説楛茶曰玉茸補續茶經卷上之一欽定四庫全書續茶經卷上之二候補主事陸廷燦撰二茶之具陸龜蒙集和茶具十詠茶塢茗地曲隈囘野行多繚繞向陽就中宻背澗差還少遥盤雲髻慢亂簇香篝小何處好幽期滿巖春露曉茶人天賦識靈草自然鍾野姿閒來北山下似與東風期雨後探芳去雲間幽路危唯應報春鳥得共斯人知茶筍所孕和氣深時抽玉笤短輕烟漸結華嫩蘂初成管尋來青靄曙欲去紅雲煖秀色自難逢傾筐不曽滿茶籯金刀劈翠筠織似波紋鈄製作自野老攜持伴山娃昨日鬬煙粒今朝貯緑華爭歌調笑曲日暮方還家茶舍旋取山上材架為山下屋門因水勢斜壁任巖隈曲朝隨鳥俱散暮與雲同宿不憚採掇勞秖憂官未足茶竈經云竈無突無突抱輕嵐有烟映初旭盈鍋玉泉沸滿甑雲芽熟竒香襲春桂嫩色凌秋菊煬者若吾徒年年看不足茶焙左右𢷬凝膏朝昏布烟縷方圓隨樣拍次第依層取山謡縱高下火候還文武見説焙前人時時炙花脯紫花焙人以花為脯茶鼎新泉氣味良古鐵形狀醜那堪風雨夜更值煙霞友曾過頳石下又住清溪口頳石清溪皆江南出茶處且共薦臯盧臯盧茶名何勞傾斗酒茶甌昔人謝塸埞徒為妍詞飾劉孝威集有謝塸埞啟豈如珪璧姿又有煙嵐色光參筠席上韻雅金罍側直使于闐君從來未嘗識煑茶閒來松間坐看煑松上雪時於浪花裏併下藍英末傾餘精爽健忽似氛埃滅不合别觀書但宜窺玉札皮日休集茶中雜咏茶具茶籯筤篣曉攜去驀過山桑塢開時送紫茗負處沾清露歇把傍雲泉歸將挂煙樹滿此是生涯黄金何足數茶竈南山茶事動竈起巖根傍水煑石髪氣薪燃杉脂香青瓊蒸後凝緑髓炊來光如何重辛苦一一輸膏粱茶焙鑿彼碧巖下恰應深二尺泥易帶雲根燒難碍石脉初能燥金餅漸見乾瓊液九里共杉林皆焙名相望在山側茶鼎龍舒有良匠鑄此佳樣成立作菌蠢勢煎為潺湲聲草堂暮雲隂松窻殘月明此時勺複茗野語知逾清茶甌邢客與越人皆能造前器圓似月魂墮輕如雲魄起􅀥花勢旋眼蘋沫香沾齒松下時一看支公亦如此江西志餘干縣冠山有陸羽茶竈羽嘗鑿石為竈取越溪水煎茶於此陶榖清異録豹革為囊風神呼吸之具也煮茶啜之可以滌滯思而起清風毎引此義稱之為水豹囊曲洧舊聞范蜀公與司馬温公同遊嵩山各攜茶以行温公取紙為帖蜀公用小木合子盛之温公見而驚曰景仁乃有茶具也蜀公聞其言留合與寺僧而去後來士大夫茶具精麗極世間之工巧而心猶未厭晁以道嘗以此語客客曰使温公見今日之茶具又不知云如何也北苑貢茶别録茶具有銀模銀圏竹圏銅圈等梅堯臣宛陵集茶竈詩山寺碧溪頭幽人緑巖畔夜火竹聲乾春甌茗花亂兹無雅趣兼薪桂煩燃㸑又茶磨詩云楚匠斵山骨折檀為轉臍乾坤人力内日月蟻行迷又有謝晏太祝遺雙井茶五品茶具四枚詩武夷志五曲朱文公書院前溪中有茶竈文公詩云仙翁遺石竈宛在水中央飲罷方舟去茶烟裊細香羣芳譜黄山谷云相茶瓢與相笻竹同法不欲肥而欲瘦但須飽風霜耳樂純雪菴清史陸叟溺於茗事嘗為茶論并煎炙之法造茶具二十四事以都綂籠貯之時好事者家藏一副於是若韋鴻臚木待制金法曹石轉運胡員外羅樞宻宗從事漆雕袐閣陶寳文湯提㸃竺副帥司職方輩皆入吾籯中矣許次杼茶疏凡士人登山臨水必命壺觴若茗椀薫爐置而不問是徒豪舉耳余特置游裝精茗茗香同行異室茶罌銚注甌洗盆巾諸具畢備而附以香匳小爐香囊匙箸未曽汲水先備茶具必潔必燥瀹時壺蓋必仰置磁盂勿覆案上漆氣食氣皆能敗茶朱存理茶具圖贊序飲之用必先茶而制茶必有其具錫具姓而繫名寵以爵加以號季宋之彌文然清逸高逺上通王公下逮林野亦雅道也願與十二先生周旋嘗山泉極品以終身此閒富貴也天豈靳乎哉審安老人茶具十二先生姓名韋鴻臚文鼎景𤾉四窻閒叟木待制利濟忘機隔竹主人金法曹研古鑠古元鍇仲鑑雍之舊民和琴先生石轉運鑿齒遄行香屋隠君胡員外惟一宗許貯月仙翁羅樞宻若藥傳師思隠寮長宗從事子弗不遺柿雲溪友漆雕祕閣承之易持古臺老人陶寳文去越自厚兔園上客湯提㸃發新一鳴温谷遺老竺副帥善調希黙雪濤公子司職方成式如素潔齋居士高濓遵生八牋茶具十六事收貯於器􅈰内供役於苦節君者故立名管之蓋欲歸綂於一以其素有貞心雅操而自能守之也商象古石鼎也用以煎茶降紅銅火筯也用以簇火不用聮索為便逓火銅火斗也用以搬火團風素竹扇也用以發火分盈挹水杓也用以量水觔兩即茶經水則也執權準茶秤也用以衡茶毎杓水二觔用茶一兩注春磁瓦壺也用以注茶啜香磁瓦甌也用以啜茗撩雲竹茶匙也用以取果納敬竹茶槖也用以放盞漉塵洗茶籃也用以澣茶歸潔竹筅箒也用以滌壺受汚拭抹布也用以潔甌靜沸竹架即茶經支鍑也運鋒劖果刀也用以切果甘鈍木碪墪也王友石譜竹爐并分封茶具六事苦節君湘竹風爐也用以煎茶更有行省收藏之建城以篛為籠封茶以貯庋閣雲屯磁瓦瓶用以杓泉以供煮水水曹即磁缸瓦缶用以貯泉以供火鼎烏府以竹為篮用以盛炭為煎茶之資器局編竹為方箱用以總收以上諸茶具者品司編竹為圓撞提盒用以收貯各品茶葉以待烹品者也屠赤水茶箋茶具湘筠焙焙茶箱也鳴泉煑茶磁罐沉垢古茶洗合香藏日支茶瓶以貯司品者易持用以納茶即漆雕袐閣屠隆考槃餘事構一斗室相傍書齋内設茶具教一童子專主茶役以供長日清談寒宵兀坐此幽人首務不可少廢者灌園史盧廷璧嗜茶成癖號茶庵嘗蓄元僧詎可庭茶具十事具衣冠拜之王象晋羣芳譜閩人以粗磁膽瓶貯茶近鼔山支提新茗出一時盡學新安製為方圓錫具遂覺神采奕奕不同馮可賔岕茶牋論茶具茶壺以窰器為上錫次之茶杯汝官哥定如未可多得則適意為佳耳李日華紫桃軒雜綴昌化茶大葉如桃枝栁梗乃極香余過逆旅偶得手摩其焙甑三日龍麝氣不斷臞仙云古之所有茶竈但聞其名未嘗見其物想必無如此清氣也予乃陶土粉以為瓦器不用泥土為之大能耐火雖猛焰不裂徑不過尺五高不過二尺余上下皆鏤銘頌箴戒之又置湯壺於上其座皆空下有陽谷之穴可以藏瓢甌之具清氣倍常重慶府志涪江青􅀈石為茶磨極佳南安府志崇義縣出茶磨以上猶縣石門山石為之尤佳蒼䃜縝宻鐫琢堪施聞龍茶箋茶具滌畢覆於竹架俟其自乾為佳其拭巾只宜拭外切忌拭内蓋布帨雖潔一經人手極易作氣縱器不乾亦無大害續茶經卷上之二欽定四庫全書續茶經卷上之三候補主事陸廷燦撰三茶之造唐書太和七年正月吳蜀貢新茶皆於冬中作法為之上務恭儉不欲逆物性詔所在貢茶宜於立春後造北堂書鈔茶譜續補云龍安造騎火茶最為上品騎火者言不在火前不在火後作也清明改火故曰火大觀茶論茶工作於驚蟄尤以得天時為急輕寒英華漸長條達而不迫茶工從容致力故其色味兩全故焙人得茶天為度擷茶以黎明見日則止用爪斷芽不以指揉凡芽如雀舌榖粒者為鬭品一槍一旗為揀芽一槍二旗為次之餘斯為下茶之始芽萌則有白合不去害茶味既擷則有烏蔕不去害茶色茶之美惡尤係於蒸芽壓黄之得失蒸芽欲及熟而香壓黄欲膏盡亟止如此則製造之功十得八九矣滌芽惟潔濯器惟浄蒸壓惟其宜研膏惟熟焙火惟良造茶先度日晷之長短均工力之衆寡會采擇之多少使一日造成恐茶過宿則害色味茶之範度不同如人之有首面也其首面之異司難以槩論要之色瑩徹而不駁質縝繹而不浮舉之凝結碾之則鏗然可驗其為精品也有得於言意之表者白茶自為一種與常茶不同其條敷闡其葉瑩薄崖林之間偶然生出有者不過四五家生者不過一二株所造止於二三銙而已湏製造精微運度得宜則表裏昭澈如玉之在璞他無與倫也蔡襄茶録茶味主於甘滑惟北苑鳯凰山連屬諸焙所造者味佳隔溪諸山雖及時加意製作色味皆重莫能及也又有水泉不甘能損茶味前世之論水品者以此東溪試茶録建溪茶比他郡最先北􅁐壑源者尤早嵗多暖則先驚蟄十日即芽嵗多寒則後驚蟄五日始發先芽者氣味俱不佳惟過驚蟄者為第一民間常以驚蟄為候諸焙後北􅁐者半月去逺則益晩凡斷芽必以甲不以指以甲則速斷不柔以指則多溼易損擇之必精濯之必潔蒸之必香火之必良一失其度俱為茶病芽擇肥乳則甘香而粥面著盞而不散土瘠而芽短則雲脚渙亂去盞而易散葉梗長則受水鮮白葉梗短則色黄而泛烏蔕白合茶之大病不去烏蔕則色黄黒而惡不去白合則味苦澀蒸芽必熟去膏必盡蒸芽未熟則草木氣存去膏未盡則色濁而味重受烟則香奪壓黄則味失此皆茶之病也北􅁐别録御園四十六所廣袤三十餘里自官平而上為内園官坑而下為外園方春靈芽萌坼先民焙十餘日如九窠十二隴龍游窠小苦竹張坑西際又為禁園之先也而石門乳吉香口三外焙常後北􅁐五七日興工毎日采茶蒸榨以其黄悉送北􅁐併造造茶舊分四局匠者起好勝之心彼此相誇不能無弊遂并而為二焉故茶堂有東局西局之名茶銙有東作西作之號凡茶之初出研盆盪之欲其匀揉之欲其膩然後入圈製銙隨笪過黄有方故銙有花銙有大龍有小龍品色不同其名亦異隨綱繫之於貢茶云采茶之法湏是侵晨不可見日晨則夜露未晞茶芽肥潤見日則為陽氣所薄使芽之膏腴内耗至受水而不鮮明故毎日常以五更撾皷集羣夫於鳯凰山山有伐皷亭日役采夫二百二十二人監采官人給一牌入山至辰刻則復鳴鑼以聚之恐其踰時貪多務得也大抵採茶亦湏習熟募夫之際必擇土著及諳曉之人非特識茶發早晩所在而於采摘亦知其指要耳茶有小芽有中芽有紫芽有白合有烏蔕不可不辨小芽者其小如鷹爪初造龍團勝雪白茶以其芽先次蒸熟置之水盆中剔取其精英僅如針小謂之水芽是小芽中之最精者也中芽古謂之一槍二旗是也紫芽葉之紫者也白合乃小芽有兩葉抱而生者是也烏蔕茶之帶頭是也凡茶以水芽為上小芽次之中芽又次之紫芽白合烏蔕在所不取使其擇焉而精則茶之色味無不佳萬一雜之以所不取則首面不均色濁而味重也驚蟄節萬物始萌每嵗常以前三日開焙遇閏則後之以其氣候少遲故也蒸芽再四洗滌取令潔淨然後入甑俟湯沸蒸之然蒸有過熟之患有不熟之患過熟則色黄而味淡不熟則色青而易沉而有草木之氣故唯以得中為當茶既蒸熟謂之茶黄湏淋洗數過欲其冷也方入小榨以去其水又入大榨以出其膏水芽則以高榨壓之以其芽嫩故也先包以布帛束以竹皮然後入大榨壓之至中夜取出揉匀復如前入榨謂之翻榨徹曉奮擊必至於乾淨而後已蓋建茶之味逺而力厚非江茶之比江茶畏沉其膏建茶唯恐其膏之不盡膏不盡則色味重濁矣茶之過黄初入烈火焙之次過沸湯爁之凡如是者三而後宿一火至翌日遂過煙焙之火不欲烈烈則面泡而色黒又不欲烟烟則香盡而味焦但取其温温而已凡火之數多寡皆視其銙之厚薄銙之厚者有十火至於十五火銙之薄者六火至於八火火數既足然後過湯上出色出色之後置之宻室急以扇扇之則色澤自然光瑩矣研茶之具以柯為杵以瓦為盆分團酌水亦皆有數上而勝雪白茶以十六水下而揀芽之水六小龍鳳四大龍鳯二其餘皆一十二焉自十二水而上曰研一團自六水而下曰研三團至七團毎水研之必至於水乾茶熟而後已水不乾則茶不熟茶不熟則首面不匀煎試易沉故研夫尤貴於强有力者也嘗謂天下之理未有不相湏而成者有北􅁐之芽而後有龍井之水龍井之水清而且甘晝夜酌之而不竭凡茶自北􅁐上者皆資焉此亦猶錦之於蜀江膠之於阿井也詎不信然姚寛西溪叢語建州龍焙面北謂之北􅁐有一泉極清澹謂之御泉用其池水造茶即壞茶味惟龍團勝雪白茶二種謂之水芽先蒸後揀毎一芽先去外兩小葉謂烏蔕又次取兩嫩葉謂之白合留小心芽置於水中呼為水芽聚之稍多即研焙為二品即龍團勝雪白茶也茶之極精好者無出於此毎銙計工價近二十千其他皆先揀而后蒸研其味次第減也茶有十綱第一綱第二綱太嫩第三綱最妙自六綱至十綱小團至大團而止黄儒品茶要録茶事起於驚蟄前其采芽如鷹爪初造曰試焙又曰一火其次曰二火二火之茶已次一火矣故市茶芽者惟伺出於三火前者為最佳尤喜薄寒氣候陰不至凍芽登時尤畏霜有造於一火二火者皆遇霜而三火霜霽則三火之茶勝矣晴不至於暄則榖芽含養約勒而滋長有漸采工亦優為矣凡試時泛色鮮白隠於薄霧者得於佳時而然也有造於積雨者其色昏黄或氣候暴暄茶芽蒸發采工汗手薰漬揀摘不潔則製造雖多皆為常品矣試時色非鮮白水脚微紅者過時之病也茶芽初采不過盈筐而已趨時爭新之勢然也既采而蒸既蒸而研蒸或不熟雖精芽而所損已多試時味作桃仁氣者不熟之病也唯正熟者味甘香蒸芽以氣為候視之不可以不謹也試時色黄而粟紋大者過熟之病也然過熟愈於不熟以甘香之味勝也故君謨論色則以青白勝黄白而余論味則以黄白勝青白茶蒸不可以逾乆乆則過熟又乆則湯乾而焦釜之氣出茶工有乏薪湯以益之是致蒸損茶黄故試時色多昏黯氣味焦惡者焦釡之病也建人謂之熱鍋氣夫茶本以芽葉之物就之棬模既出棬上笪焙之用火務令通熱即以茶覆之虛其中以透火氣然茶民不喜用實炭號為冷火以茶餅新溼急欲乾以見售故用火常帶烟焰烟焰既多稍失看候必致薫損茶餅試時其色皆昏紅氣味帶焦者傷焙之病也茶餅先黄而又如隂潤者榨不乾也榨欲盡去其膏膏盡則有如乾竹葉之意唯喜飾首面者故榨不欲乾以利易售試時色雖鮮白其味帶苦者漬膏之病也茶色清潔鮮明則香與味亦如之故採佳品者常於半曉間衝蒙雲霧而出或以甆罐汲新泉懸胸臆間采得即投於中蓋欲其鮮也如或日氣烘爍茶芽暴長工力不給其采芽已陳而不及蒸蒸而不及研研或出宿而後製試時色不鮮明薄如壞卵氣者乃壓黄之病也茶之精絶者曰鬬曰亞鬬其次揀芽茶芽鬬品雖最上園户或止一株蓋天材間有特異非能皆然也且物之變勢無常而人之耳目有盡故造鬭品之家有昔優而今劣前負而後勝者雖人工有至有不至亦造化推移不可得而擅也其造一火曰鬭二火曰亞鬬不過十數銙而已揀芽則不然徧園隴中擇其精英者耳其或貪多務得又滋色澤往往以白合盜葉間之試時色雖鮮白其味澀淡者間白合盜葉之病也一凡鷹爪之芽有兩小葉抱而生者白合也新條葉之初生而白者盜葉也造揀芽者只剔取鷹爪而白合不用况盜葉乎物固不可以容偽况飲食之物尤不可也故茶有入他草者建人號為入雜銙列入柿葉常品入桴檻葉二葉易致又滋色澤園民欺售直而為之試時無粟紋甘香盞面浮散隠如微毛或星星如纖絮者入雜之病也善茶品者側盞視之所入之多寡從可知矣嚮上下品有之近雖銙列亦或勾使萬花谷龍焙泉在建安城東鳯凰山一名御泉北􅁐造貢茶社前芽細如針用此水研造每片計工直錢四萬分試其色如乳乃最精也文獻通考宋人造茶有二類曰片曰散片者即龍團舊法散者則不蒸而乾之如今時之茶也始知南渡之後茶漸以不蒸為貴矣學林新編茶之佳者造在社前其次火前謂寒食前也其下則雨前謂榖雨前也唐僧齊巳詩曰高人愛惜藏巖裏白甀封題寄火前其言火前蓋未知社前之為佳也唐人於茶雖有陸羽茶經而持論未精至本朝蔡君謨茶録則持論精矣苕溪詩話北􅁐官焙也漕司嵗貢為上壑源私焙也土人亦以入貢為次二焙相去三四里間若沙溪外焙也與二焙絶逺為下故魯直詩莫遣沙溪來亂真是也官焙造茶嘗在驚蟄後朱翌猗覺寮記唐造茶與今不同今採茶者得芽即蒸熟焙乾唐則旋摘旋炒劉夢得試茶歌自傍芳叢摘鷹嘴斯湏炒成滿室香又云陽崖陰嶺各不同未若竹下莓苔地竹間茶最佳武夷志通仙井在御茶園水極甘冽每當造茶之候則井自溢以供取用金史泰和五年春罷造茶之防張源茶録茶之妙在乎始造之精藏之得法㸃之得宜優劣定於始鐺清濁係乎末火火烈香清鐺寒神倦火烈生焦柴疎失翠乆延則過熟速起却還生熟則犯黄生則著黒帶白㸃者無妨絶焦㸃者最勝藏茶切勿臨風近火臨風易冷近火先黄其置頓之所須在時時坐卧之處逼近人氣則常温而不寒必湏板房不宜土室板房温燥土室潮蒸又要透風勿置幽隠之處不惟易生溼潤兼恐有失檢㸃謝肇淛五雜組古人造茶多舂令細末而蒸之唐詩家僮隔竹敲茶臼是也至宋始用碾若揉而焙之則本朝始也但揉者恐不及細末之耐藏耳今造團之法皆不傳而建茶之品亦逺出吳㑹諸品下其武夷清源二種雖與上國爭衡而所産不多十九贗鼎故遂令聲價靡復不振閩之方山太姥支提俱産佳茗而製造不如法故名不出里閈予嘗過松蘿遇一製茶僧詢其法曰茶之香原不甚相逺惟焙之者火候極難調耳茶葉尖者太嫩而蔕多老至火候匀時尖者已焦而蔕尚未熟二者雜之茶安得佳製松蘿者每葉皆剪去其尖蔕但留中段故茶皆一色而工力煩矣宜其價之高也閩人急於售利每觔不過百錢安得費工如許若價高即無市者矣故近來建茶所以不振也羅廩茶解採茶製茶最忌手汗體膻口臭多涕不潔之人及月信婦人更忌酒氣蓋茶酒性不相入故採茶製茶切忌沾醉茶性淫易於染著無論腥穢及有氣息之物不宜近即名香亦不宜近許次杼茶疏岕茶非夏前不摘初試摘者謂之開園采自正夏謂之春茶其地稍寒故湏待時此又不當以太遲病之徃時無秋日摘者近乃有之七八月重摘一番謂之早春其品甚佳不嫌少薄他山射利多摘梅茶以梅雨時采故名梅茶苦澀且傷秋摘佳産戒之茶初摘時香氣未透必借火力以發其香然茶性不耐勞炒不宜乆多取入鐺則手力不匀乆於鐺中過熟而香散矣炒茶之鐺最忌新鐵湏預取一鐺以備炒毋得别作他用一説惟常煑飯者佳既無鐵鍟亦無脂膩炒茶之薪僅可樹枝勿用榦葉榦則火力猛熾葉則易焰易滅鐺必磨洗瑩潔旋摘旋炒一鐺之内僅可四兩先用文火炒軟次加武火催之手加木指急急鈔轉以半熟為度微俟香發是其候也清明太早立夏太遲榖雨前後其時適中若再遲一二日待其氣力完足香烈尤倍易於收藏藏茶於庋閣其方宜塼底數層四圍磚研形若火爐愈大愈善勿近土牆頓甕其上隨時取竈下火灰候冷簇於甕傍半尺以外仍隨時取火灰簇之令裏灰常燥以避風濕却忌火氣入甕蓋能黄茶耳日用所湏貯於小磁瓶中者亦當箬包苧紥勿令見風且宜置於案頭勿近有氣味之物亦不可用紙包蓋茶性畏紙紙成於水中受水氣多也紙裏一夕既隨紙作氣而茶味盡矣雖再焙之少頃即潤鴈宕諸山之茶首坐此病紙帖貽逺安得復佳茶之味清而性易移藏法喜温燥而惡冷溼喜清凉而惡鬱蒸宜清觸而忌香惹藏用火焙不可日曬世人多用竹器貯茶雖加篛葉擁䕶然篛性峭勁不甚伏帖風溼易侵至於地爐中頓放萬萬不可人有以竹器盛茶置被籠中用火即黄除火即潤忌之忌之聞龍茶箋嘗考經言茶焙甚詳愚謂今人不必全用此法予構一焙室高不踰尋方不及丈縱廣正等四圍及頂綿紙宻糊無小罅隙置三四火缸於中安新竹篩於缸内預洗新麻布一片以襯之散所炒茶於篩上闔户而焙上面不可覆蓋以茶葉尚潤一覆則氣悶罨黄湏焙二三時俟潤氣既盡然後覆以竹箕焙極乾出缸待冷入器收藏後再焙亦用此法則香色與味猶不致大減諸名茶法多用炒惟羅岕宜於蒸焙味真藴藉世競珍之即顧渚陽羨宻邇洞山不復倣此想此法偏宜於岕未可槩施諸他茗也然經已云蒸之焙之則所從來逺矣吳人絶重岕茶往往雜以黒篛大是闕事􅀢每藏茶必令樵青入山採竹箭篛拭淨烘乾䕶罌四週半用剪碎拌入茶中經年發覆青翠如新吳興姚叔度言茶若多焙一次則香味隨減一次予驗之良然但於始焙時烘令極燥多用炭箬如法封固即梅雨連旬燥仍自若惟開罈頻取所以生潤不得不再焙耳自四月至八月極宜致謹九月以後天氣漸肅便可解嚴矣雖然能不弛懈尤妙炒茶時湏用一人從傍扇之以袪熱氣否則茶之色香味俱減此予所親試扇者色翠不扇者色黄炒起出鐺時置大磁盆中仍湏急扇令熱氣稍退以手重揉之再散入鐺以文火炒乾之蓋揉則其津上浮㸃時香味易出田子藝以生曬不炒不揉者為佳其法亦未之試耳羣芳譜以花拌茶頗有别致凡梅花木樨茉莉玫瑰薔薇蘭蕙金橘梔子木香之屬皆與茶宜當於諸花香氣全時摘拌三停茶一停花收於磁罐中一層茶一層花相間填滿以紙篛封固入淨鍋中重湯煑之取出待冷再以紙封裹於火上焙乾貯用但上好細芽茶忌用花香反奪其真味惟平等茶宜之雲林遺事蓮花茶就池沼中於早飯前日初出時擇取蓮花蕊畧綻者以手指撥開入茶滿其中用麻絲縛紥定經一宿次早連花摘之取茶紙包曬如此三次錫罐盛貯紥口收藏邢士襄茶説凌露無雲采候之上霽日融和采候之次積日重陰不知其可田藝衡煑泉小品芽茶以火作者為次生曬者為上亦更近自然且斷烟火氣耳况作人手器不潔火候失宜皆能損其香色也生曬茶瀹之甌中則旗鎗舒暢清翠鮮明香潔勝於火炒尤為可愛洞山茶系岕茶采焙定以立夏後三日陰雨又需之世人妄云雨前真岕抑亦未知茶事矣茶園既開入山賣草枝者日不下二三百石山民收製以假混真好事家躬往予租采焙戒視惟謹多被潛易真茶去人地相京高價分買家不能二三觔近有采嫩葉除尖蔕抽細筋焙之亦曰片茶不去尖筋炒而復焙燥如葉狀曰攤茶並難多得又有俟茶市將闌采取剩葉焙之名曰修山茶香味足而色差老若今四方所貨岕片多是南岳片子署為騙茶可矣茶賈衒人率以長潮等茶本岕亦不可得噫安得起陸龜蒙於九京與之賡茶人詩也茶人皆有市心令予徒仰真茶而已故余煩悶時每誦姚合乞茶詩一過月令廣義炒茶毎鍋不過半觔先用乾炒後微灑水以布捲起揉做茶擇淨微蒸候變色攤開扇去溼熱氣揉做畢用火焙乾以篛葉包之語曰善蒸不若善炒善曬不若善焙蓋茶以炒而焙者為佳耳月令廣義採茶在四月嫩則益人粗則損人茶之為道釋滯去垢破睡除煩功則著矣其或採造藏貯之無法碾焙煎試之失宜則雖建芽浙茗祇為常品耳此製作之法宜亟講也馮夢禎快雪堂漫録炒茶鍋令極淨茶要少火要猛以手拌炒令軟淨取出攤於匾中略用手揉之揉去焦梗冷定復炒極燥而止不得便入瓶置於淨處不可近溼一二日後再入鍋炒令極燥攤冷然後收藏藏茶之罌先用湯煑過烘燥乃燒栗炭透紅投罌中覆之令黒去炭及灰入茶五分投入冷炭再入茶將滿又以宿箬葉實之用厚紙封固􅑥口更包燥淨無氣味甎石壓之置於高燥透風處不得傍牆壁及泥地方得屠長卿考槃餘事茶宜篛葉而畏香藥喜温燥而忌冷溼故收藏之法先於清明時收買篛葉揀其最青者預焙極燥以竹絲編之每四片編為一塊聽用又買宜興新堅大罌可容茶十觔以上者洗淨焙乾聽用山中采焙囘復焙一番去其茶子老葉梗屑及枯焦者以大盆埋伏生炭覆以竈中敲細赤火既不生烟又不易過置茶焙下焙之約以二觔作一焙别用炭火入大爐内將罌縣架其上烘至燥極而止先以編篛襯於罌底茶焙燥後扇冷方入茶之燥以拈起即成末為驗隨焙隨入既滿又以篛葉覆於茶上每茶一觔約用篛二兩罌口用尺八紙焙燥封固約六七層擫以方厚白木板一塊亦取焙燥者然後於向明淨室或高閣藏之用時以新燥宜興小瓶約可受四五兩者另貯取用後隨即包整夏至後三日再焙一次秋分後三日又焙一次一陽後三日又焙一次連山中共焙五次從此直至交新色味如一罌中用淺更以燥篛葉滿貯之雖乆不浥又一法以中罈盛茶約十觔一瓶每年燒稻草灰入大桶内將茶瓶座於桶中以灰四面填桶瓶上覆灰築實用時撥灰開瓶取茶些少仍復封瓶覆灰則再無蒸壞之患次年另換新灰又一法於空樓中縣架將茶瓶口朝下放則不蒸縁蒸氣自天而下也采茶時先自帶鍋入山别租一室擇茶工之尤良者倍其雇值戒其搓摩勿使生硬勿令過焦細細炒燥扇冷方貯罌中采茶不必太細細則芽初萌而味欠足不可太青青則葉已老而味欠嫩湏在榖雨前後覔成梗帶葉微緑色而團且厚者為上更湏天色晴明採之方妙若閩廣嶺南多瘴癘之氣必待日出山霽霧瘴嵐氣收淨采之可也馮可賓岕茶牋茶雨前精神未足夏後則梗葉太麤然以細嫩為妙湏當交夏時時看風日晴和月露初收親自監采入籃如烈日之下應防籃内鬱蒸又湏傘蓋至舍速傾於淨􅀢内薄攤細揀枯枝病葉蛸絲青牛之類一一剔去方為精潔也蒸茶湏看葉之老嫩定蒸之遲速以皮梗碎而色帶赤為度若太熟則失鮮其鍋内湯湏頻換新水蓋熟湯能奪茶味也陳眉公太平清話吳人於十月中采小春茶此時不獨逗漏花枝而尤喜日光晴暖從此蹉過霜凄鴈凍不復可堪矣眉公云采茶欲精藏茶欲燥烹茶欲潔吳拭云山中採茶歌凄清哀婉韻態悠長一聲從雲際飄來未嘗不潜然墮淚吳歌未便能動人如此也熊明遇岕山茶記貯茶器中先以生炭火煅過於烈日中暴之令火滅乃亂插茶中封固甖口覆以新甎置於高爽近人處霉天雨候切忌發覆湏於晴燥日開取其空缺處即當以箬填滿封閟如故方為可乆雪蕉館記談明玉珍子昇在重慶取涪江青􅀈石為茶磨令宫人以武隆雪錦茶碾焙以大足縣香霏亭海棠花味倍於常海棠無香獨此地有香焙茶尤妙詩話顧渚湧金泉每嵗造茶時太守先祭拜然後水稍出造貢茶畢水漸減至供堂茶畢已減半矣太守茶畢遂涸北􅁐龍焙泉亦然紫桃軒雜綴天下有好茶為凡手焙壞有好山水為俗子粧㸃壞有好子弟為庸師敎壞真無可奈何耳匡廬頂産茶在雲霧蒸蔚中極有勝韻而僧拙於焙瀹之為赤滷豈復有茶哉戊戌春小住東林同門人董獻可曹不隨萬南仲手自焙茶有淺碧從敎如凍栁清芬不遣雜花飛之句既成色香味殆絶顧渚前朝名品正以採摘初芽加之法製所謂罄一畆之入僅充半環取精之多自然擅妙也今碌碌諸葉茶中無殊菜瀋何勝括目金華仙洞與閩中武夷俱良材而厄於焙手埭頭本草市溪菴施濟之品近有蘇焙者以色稍青遂混常價岕茶彚鈔岕茶不炒甑中蒸熟然後烘焙縁其摘遲枝葉微老炒不能軟徒枯碎耳亦有一種細炒岕乃他山炒焙以欺好竒者岕中人惜茶决不忍嫩采以傷樹本余意他山摘茶亦當如岕之遲摘老蒸似無不可但未經嘗試不敢漫作茶以初出雨前者佳惟羅岕立夏開園吳中所貴梗觕葉厚者有簫箬之氣還是夏前六七日如雀舌者最不易得檀几叢書南岳貢茶天子所嘗不敢置品縣官修貢期以清明日入山肅祭乃始開園采造視松羅虎丘而色香豐美自是天家清供名曰片茶初亦如岕茶製法萬厯丙辰僧稠䕃遊松蘿乃仿製為片馮時可滇行記略滇南城外石馬井泉無異惠泉感通寺茶不下天池伏龍特此中人不善焙製耳徽州松蘿舊亦無聞偶虎丘一僧往松蘿菴如虎丘法焙製遂見嗜於天下恨此泉不逢陸鴻漸此茶不逢虎丘僧也湖州志長興縣啄木嶺金沙泉唐時每嵗造茶之所也在湖常二郡界泉處沙中居常無水將造茶二郡太守畢至具儀注拜勅祭泉頃之發源其夕清溢供御者畢水即微減供堂者畢水已半之太守造畢水即涸矣太守或還斾稽期則示風雷之變或見鷙獸毒蛇木魅陽晱之類焉商旅多以顧渚水造之無沾金沙者今之紫筍即用顧渚造者亦甚佳矣高濓八牋藏茶之法以篛葉封裹入茶焙中兩三日一次用火當如人體之温温然而溼潤自去若火多則茶焦不可食矣陳眉公太平清話武夷屴崱紫㡌龍山皆産茶僧拙於焙既採則先蒸而後焙故色多紫赤只堪供宫中澣濯用耳近有以松蘿法製之者既試之色香亦具足經旬月則紫赤如故蓋製茶者不過土著數僧耳語三吳之法轉轉相效舊態畢露此湏如昔人論琵琶法使數年不近盡忘其故調而後以三吳之法行之或有當也徐茂吳云實茶大甕底置篛甕口封閟倒放則過夏不黄以其氣不外泄也子晉云當倒放有蓋缸内缸宜砂底則不生水而常燥加謹封貯不宜見日見日則生翳而味損矣藏又不宜於熱處新茶不宜驟用貯過黄梅其味始足張大復梅花筆談松蘿之香馥馥廟後之味閒閒顧渚撲人鼻孔齒頰都異乆而不􅁯然其妙在造凡宇内道地之産性相近也習相逺也吾深夜被酒發張震封所遺顧渚連啜而醒宗室文昭古瓻集桐花頗有清味因收花以熏茶命之曰桐茶有長泉細火夜煎茶覺有桐香入齒牙之句王草堂茶説武夷茶自榖雨采至立夏謂之頭春約隔二旬復采謂之二春又隔又采謂之三春頭春葉粗味濃二春三春葉漸細味漸薄且帶苦矣夏末秋初又采一次名為秋露香更濃味亦佳但為來年計惜之不能多采耳茶采後以竹筐匀鋪架於風日中名曰曬青俟其青色漸收然後再加炒焙陽羨岕片祇蒸不炒火焙以成松蘿龍井皆炒而不焙故其色純獨武夷炒焙兼施烹出之時半青半紅青者乃炒色紅者乃焙色茶采而攤攤而摝香氣發越即炒過時不及皆不可既炒既焙復揀去其中老葉枝蒂使之一色釋超全詩云如梅斯馥蘭斯馨心閒手敏工夫細形容殆盡矣王草堂節物出典養生仁術云榖雨日採茶炒藏合法能治痰及百病隨見録凡茶見日則味奪惟武夷茶喜日曬武夷造茶其巗茶以僧家所製者最為得法至洲茶中采囘時逐片擇其背上有白毛者另炒另焙謂之白毫又名夀星眉摘初發之芽一旗未展者謂之蓮子心連枝二寸剪下烘焙者謂之鳯尾龍鬚要皆異其製造以欺人射利實無足取焉續茶經卷上之三
