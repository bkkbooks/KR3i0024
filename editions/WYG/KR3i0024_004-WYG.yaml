body:
  text: 續茶經附録候補主事陸廷燦撰茶法唐書德宗納户部侍郎趙贊議税天下茶漆竹木十取一以為常平本錢及出奉天乃悼悔下詔亟罷之及朱泚平佞臣希意興利者益進貞元八年以水災减税明年諸道鹽鐵使張滂奏出茶州縣若山及商人要路以三等定估十税其一自是嵗得錢四十萬緡穆宗即位鹽鐵使王播圖寵以自幸乃增天下茶税率百錢增五十天下茶加斤至二十兩播又奏加取焉右拾遺李珏上疏謂𣙜率本濟軍興而税茶自貞元以來方有之天下無事忽厚歛以傷國體一不可茗為人飲鹽粟同資若重税之售必髙其弊先及貧下二不可山澤之産無定數程斤論税以售多為利若騰價則市者寡其税幾何三不可其後王涯判二使置㩁茶使徙民茶樹于官塲焚其舊積者天下大怨令狐楚代為鹽鐵使兼摧茶使復令納㩁加價而已李石為相以茶税皆歸鹽鐵復貞元之制武宗即位崔珙又增江淮茶税是時茶商所過州縣有重税或奪掠舟車露積雨中諸道置邸以收税謂之踏地錢大中初轉運使裴休著條約私鬻如法論罪天下税茶増倍貞元江淮茶為大模一斤至五十兩諸道鹽鐵使于悰每斤增税錢五謂之剩茶錢自是斤兩復舊元和十四年歸光州茶園于百姓從刺史房克讓之請也裴休領諸道鹽鐵轉運使立税茶十二法人以為便藩鎮劉仁恭禁南方茶自擷山為茶號山曰大恩以邀利何易于為益昌令鹽鐵官㩁取茶利詔下所司毋敢隠易于視詔曰益昌人不征茶且不可活矧厚賦毒之乎命吏閣詔吏曰天子詔何敢拒吏坐死公得免竄耶易于曰吾敢愛一身移暴于民乎亦不使罪及爾曹即自焚之觀察使素賢之不劾也陸贄為宰相以賦役煩重上疏云天災流行四方代有税茶錢積户部者宜計諸道户口均之五代史楊行宻字化源議出鹽茗俾民輸帛幕府髙朂曰創破之餘不可以加歛且帑貲何患不足若悉我所有以易四鄰所無不積財而自有餘矣行宻納之宋史𣙜茶之制擇要㑹之地曰江陵府曰真州曰海州曰漢陽軍曰無為軍曰蘄之蘄口為𣙜貨務六初京城建安襄復州皆有務後建安襄復之務廢京城務雖存但㑹給交鈔徃還而不積茶貨在淮南則蘄黄廬舒光夀六州官自為塲置吏總謂之山塲者十三六州採茶之民皆𨽻焉謂之園戸嵗課作茶輸租餘則官悉市之總為嵗課八百六十五萬餘斤其出鬻者皆就本塲在江南則宣歙江池饒信洪撫筠袁十州廣德興國臨江建昌南康五軍兩浙則杭蘇明越婺處温台湖常衢睦十二州荆湖則江陵府潭灃鼎鄂岳歸峽七州荆門軍福建則建劍二州嵗如山塲輸租折税緫為嵗課江南百二十七萬餘斤兩浙百二十七萬九千餘斤荆湖二百四十七萬餘斤福建三十九萬三千餘斤悉從六𣙜貨務鬻之茶有二類曰片茶曰散茶片茶蒸造實棬模中串之唯建劍則既蒸而研編竹為格置焙室中最為精潔他處不能造有龍鳯石乳白乳之類十二等以充嵗貢及邦國之用其出䖍袁饒池光歙潭岳辰灃州江陵府興國臨江軍有仙芝玉津先春緑芽之類二十六等兩浙及宣江鼎州又以上中下或苐一至苐五為號散茶出淮南歸州江南荆湖有龍溪雨前雨後之類十一等江浙又有上中下或苐一等至苐五為號者民之欲茶者售於官給其食用者謂之食茶出境者則給劵商賈貿易入錢若金帛京師𣙜貨務以射六務十三塲願就東南入錢若金帛者聼凡民茶匿不送官及私販鬻者沒入之計其直論罪園戸輙毁敗茶樹者計所出茶論如法民造温桑為茶比犯真茶計直十分論二分之罪主吏私以官茶貿易及一貫五百者死自後定法務從輕减太平興國二年主吏盗官茶販鬻錢三貫以上黥靣送闕下淳化三年論直十貫以上黥靣配本州牢城廵防卒私販茶依舊條加一等論凡結徒持仗販易私茶遇官司擒捕抵拒者皆死太平興國四年詔鬻偽茶一斤杖一百二十斤以上棄市厥後更改不一載全史陳恕為三司使將立茶法召茶商數十人俾條陳利害第為三等具奏太祖曰吾視上等之説取利太深此可行于商賈不可行于朝廷下等之説固滅裂無取惟中等之説公私皆濟吾裁損之可以經乆行之數年公用足而民富實太祖開寶七年有司以湖南新茶異于常嵗請髙其價以鬻之太祖曰道則善毋乃重困吾民乎即詔苐復舊制勿増價值煕寧三年熙河運使以嵗計不足乞以官茶博糴每茶三斤易粟一斛其利甚溥朝廷謂茶馬司本以博馬不可以博糴于茶馬司嵗額外增買川茶兩倍朝廷别出錢二萬給之令提刑司封樁又令茶馬官程之邵兼轉運使由是數嵗邊用粗足神宗熙寧七年幹當公事李杞入蜀經畫買茶秦鳯熙河博馬王上韶言西人頗以善馬至邊交易所嗜惟茶自熙豐以來舊博馬皆以粗茶乾道之未始以細茶遺之成都利州路十二州産茶二千一百二萬斤茶馬司所收大較若此茶利嘉祐間禁𣙜時取一年中數計一百九萬四千九十三貫八百八十五錢治平間通商後計取數一百一十七萬五千一百四貫九百一十九錢瓊山丘氏曰後世以茶易馬始見於此盖自唐世回紇入貢先已以馬易茶則西北之嗜茶有自來矣蘇轍論蜀茶狀園户例收晩茶謂之秋老黄茶不限早晩隨時即賣沈括夢溪筆談乾德二年始詔在京建州漢陽蘄口各置𣙜貨務五年始禁私賣茶從不應為情理重太平興國二年刪定禁法條貫始立等科罪淳化二年令商賈就園戸買茶公於官塲貼射始行貼射法淳化四年初行交引罷貼射法西北入粟給交引自通利軍始是嵗罷諸處𣙜貨務尋復依舊至咸平元年茶利錢以一百三十九萬二千一百一十九貫為額至嘉祐三年凡六十一年用此額官本雜費皆在内中間時有增虧嵗入不常咸平五年三司使王嗣宗始立三分法以十分茶價四分給香藥三分犀象三分茶引六年又改支六分香藥犀象四分茶引景德二年許人入中錢帛金銀謂之三説至祥符九年茶引益輕用知秦州曹瑋議就永興鳯翔以官錢收買客引以救引價前此累增加饒錢至天祐二年鎮戎軍納大麥一斗本價通加饒共支錢一貫二百五十四乾興元年改二分法支茶引三分東南見錢二分半香藥四分半天聖元年復行貼射法行之三年茶利盡歸大商官塲但得黄晩惡茶乃詔孫奭重議罷貼射法明年推治元議省吏計覆官旬獻官皆决配沙門島元詳定樞宻副使張鄧公參知政事吕許公魯肅簡各罰俸一月御史中丞劉筠入内内侍省副都知周文賈西上閣門使薛招廊三部副使各罰銅二十斤前三司使李諮落樞密直學士依舊知洪州皇祐三年􅈫茶依舊只用見錢至嘉祐四年二月五日降勅罷茶禁洪邁容齊隨筆蜀茶税額總三十萬熙寧七年遣三司幹當公事李杞經畫買茶以蒲宗閔同領其事剏設官塲增為四十萬後李杞以疾去都官郎中劉佐繼之蜀茶盡𣙜民始病矣知彭州吕陶言天下茶法既通蜀中獨行禁𣙜杞佐宗閔作為弊法以困西南生聚佐雖罷去以國子博士李稷代之陶亦得罪侍御史周尹復極論𣙜茶為害罷為河北提㸃刑獄利路漕臣張宗諤張升卿復建議廢茶塲司依舊通商皆為稷劾坐貶茶塲司行劄子督綿州彰明知縣宋大章繳奏以為非所當用又為稷詆坐衝替一嵗之間通課利及息耗至七十六萬緡有竒熊蕃宣和北苑貢茶録陸羽茶經裴汶茶述皆不第建品説者但謂二子未嘗至閩而不知物之發也固自有時盖昔者山川尚閟靈芽未露至於唐末然後北苑出為之最時偽蜀詞臣毛文錫作茶譜亦第言建有紫筍而蠟靣乃產於福五代之季建屬南唐嵗率諸縣民采茶北苑初造研膏繼造蠟靣既又製其佳者號曰京挺本朝開寳末下南唐太平興國二年特置龍鳯模遣使即北苑造團茶以别庶飲龍鳯茶盖始於此又一種茶叢生石崖枝葉尤茂至道初有詔造之别號石乳又一種號的乳又一種號白乳此四種出而臘靣斯下矣真宗咸平中丁謂為福建漕監御茶進龍鳯團始載之於茶録仁宗慶厯中蔡襄為漕改剏小龍團以進甚見珍惜㫖令嵗貢而龍鳯遂為次矣神宗元豐間有㫖造密雲龍其品又加於小龍團之上哲宗紹聖中又改為瑞雲翔龍至徽宗大觀初親製茶論二十篇以白茶自為一種與他茶不同其條敷闡其葉瑩薄崖林之間偶然生出非人力可致正焙之有者不過四五家家不過四五株所造止於二三銙而已淺焙亦有之但品格不及於是白茶遂為第一既又製三色細芽及試新銙貢新銙自三色細芽出而瑞雲翔龍又下矣凡茶芽數品最上曰小芽如雀舌鷹爪以其勁直纎挺故號芽茶次曰揀芽乃一芽帶一葉者號一鎗一旗次曰中芽乃一芽帶兩葉號一鎗兩旗其帶三葉四葉者漸老矣芽茶早春極少景德中建守周絳為補茶經言芽茶只作早茶馳奉萬乘嘗之可矣如一鎗一旗可謂竒茶也故一鎗一旗號揀芽最為挺特光正舒王送人閩中詩云新茗齋中試一旗謂揀芽也或者謂茶芽未展為鎗已展為旗指舒王此詩為誤盖不知有所謂揀芽也夫揀芽猶貴重如此而况芽茶以供天子之新嘗者乎夫芽茶絶矣至於水芽則曠古未之聞也宣和庚子嵗漕臣鄭可簡始創為銀絲水芽盖將已揀熟芽再為剔去祗取其心一縷用珍器貯清泉漬之光明瑩潔如銀絲然以制方寸新銙有小龍蜿蜒其上號龍團勝雪又廢白的石乳鼎造花銙二十餘色初貢茶皆入龍腦至是慮奪真味始不用焉盖茶之妙至勝雪極矣故合為首冠然猶在白茶之次者以白茶上之所好也異時郡人黄儒撰品茶要録極稱當時靈芽之富謂使陸羽數子見之必爽然自失蕃亦謂使黄君而閲今日之品則前此者未足詫焉然龍焙初興貢數殊少累増至於元符以斤計者一萬八千視初已加數倍而猶未盛今則為四萬七千一百斤有竒矣此數見范逵所著龍焙美成茶録逵茶官也白茶勝雪以次厥名實繁今列於左使好事者得以觀焉貢新銙大觀二年造試新銙政和年造白茶宣和年造龍團勝雪宣和二年御苑玉芽大觀二年萬夀龍芽大觀二年上林第一宣和二年乙夜清供承平雅玩龍鳯英華玉除清賞啓沃承恩雪英雲葉蜀葵金錢宣和三年玉華宣和二年寸金宣和三年無比夀芽大觀四年萬春銀葉宣和二年宜年寶玉玉清慶雲無疆夀龍玉葉長春宣和四年瑞雲翔龍紹聖二年長夀玉圭政和二年興國岩銙香口焙銙上品揀芽紹興二年新收揀芽太平嘉瑞政和二年龍苑報春宣和四年南山應瑞興國岩揀芽興國岩小龍興國岩小鳯以上號細色揀芽小龍小鳯大龍大鳯以上號粗色又有瓊林毓料浴雪呈祥壑源供重篚推先價倍南金暘谷先春夀岩却勝延平石乳清白可鑒風韻甚髙凡十色皆宣和二年所製越五嵗省去右茶嵗分十餘綱惟白茶與勝雪自驚蟄前興役浹日乃成飛騎疾馳不出仲春已至京師號為頭綱玉芽以下即先後以次發逮貢足時夏過半矣歐陽公詩云建安三千五百里京師三月嘗新茶盖異時如此以今較昔又為最早因念草木之㣲有瓌竒卓異亦必逢時而後出而况為士者哉昔昌黎感二鳥之蒙采擢而自悼其不如今蕃於是茶也焉敢效昌黎之感姑務自警而堅其守以待時而已外焙石門乳吉香口右三焙常後北苑五七日興工毎日采茶蒸榨以其黄悉送北苑併造北苑别録先人作茶録當貢品極勝之時凡有四十餘色紹興戊寅嵗克攝事北苑閲近所貢皆仍舊其先後之序亦同惟躋龍團勝雪於白茶之上及無興國岩小龍小鳯盖建炎南渡有㫖罷貢三之一而省去之也先人但著其名號克今更寫其形製庶覽之無遺恨焉先是任子春漕司再攝茶政越十三載乃復舊額且用政和故事補種茶二萬株政和周曹種三萬株此年