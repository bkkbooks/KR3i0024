葉束以紅縷包以紅紙緘以舊綾惟揀芽俱以黄焉金史茶自宋人嵗供之外皆貿易於宋界之𣙜塲世宗大定十六年以多私販乃定香茶罪賞格章宗承安三年命設官製之以尚書省令史徃河南視官造者不嘗其味但採民言謂為温桑實非茶也還即白上以為不幹杖七十罷之四年三月於淄密寧海蔡州各置一坊造茶照南方例每斤為袋直六百文後令每袋减三百文五年春罷造茶之坊六年河南茶樹槁者命補植之十一月尚書省奏禁茶遂命七品以上官其家方許食茶仍不得賣及饋獻七年更定食茶制八年言事者以止可以鹽易茶省臣以為所易不廣兼以雜物博易宣宗元光二年省臣以茶非飲食之急今河南陜西凡五十餘都郡日食茶率二十袋直銀二兩是一嵗之中妄費民間三十餘萬也奈何以吾有用之貨而資敵乎乃制親王公主及現任五品以上官素蓄存者存之禁不得買餽餘人並禁之犯者徒五年告者賞寶泉一萬貫元史本朝茶課由約而博大率因宋之舊而為之制焉至元六年始以興元交鈔同知運使白賡言初𣙜成都茶課十三年江南平左丞吕文煥首以主茶税為言以宋㑹五十貫凖中統鈔一貫次年定長引短引是嵗征一千二百餘錠泰定十七年置㩁茶都轉運使司於江州路總江淮荆湖福廣之税而遂除長引專用短引二十一年免食茶税以益正税二十三年以李起南言增引税為五貢二十六年丞相桑哥增為一十貫延祐五年用江西茶運副法忽魯丁言減引添錢每引再增為一十二兩五錢次年課額遂增為二十八萬九千二百一十一錠矣天厯己巳罷𣙜司而歸諸州縣其嵗徴之數盖與延祐同至順之後無籍可考他如范殿帥茶西番大葉茶建寧銙茶亦無從知其始末故皆不著明㑹典陜西置茶馬司四河州洮州西寧甘州各司並赴徽州茶引所批騐每嵗差御史一員廵茶馬明洪武間差行人一員齎榜文於行茶所在懸示以肅禁永樂十三年差御史三員廵督茶馬正統十四年停止茶馬金牌遣行人四員廵察景泰二年令川陜布政司各委官廵視罷差行人四年復差行人成化三年奏准每年定差御史一員陜西廵茶十一年令取回御史仍差行人十四年奏准定差御史一員專理茶馬每嵗一代遂為定例𢎞治十六年取回御史凡一應茶法悉聼督理馬政都御史兼理十七年令陜西每年於按察司揀憲臣一員駐洮廵禁私茶一年滿日擇一員交代正德二年仍差廵茶御史一員兼理馬政光禄寺衙門每嵗福建等處觧納茶葉一萬五千斤先春等茶芽三千八百七十八斤收充茶飯等用博物典彚云本朝捐茶利予民而不利其入凡前代所設𣙜務貼射交引茶由諸種名色今皆無之惟於四川置茶馬司四所於闗津要害置數批驗茶引所而已及每年遣行人於行茶地方張挂榜文俾民知禁又於西番入貢為之禁限每人許其順帶有定數所以然者非為私奉盖欲資外國之馬以為邊境之備焉耳洪武五年户部言四川産巴茶凡四百四十七處茶戸三百一十五宜依定制每茶十株官取其一嵗計得茶一萬九千二百八十斤令有司貯候西番易馬從之至三十一年置成都重慶保寧三府及播州宣慰司茶倉四所命四川布政司移文天全六番招討司將嵗收茶課仍收碉門茶課司餘地方就送新倉收貯聼商人交易及與西番易馬茶課嵗額五萬餘斤每百加耗六斤商茶嵗中率八十斤令商運賣官取其半易馬納馬番族洮州三十河州四十三又新附歸德所生番十一西寧十三茶馬司收貯官立金牌信符為驗洪武二十八年駙馬歐陽倫以私販茶撲殺明初茶禁之嚴如此武夷山志茶起自元初至元十六年浙江行省平章髙興過武夷製石乳數斤入獻十九年乃令縣官蒞之嵗貢茶二十斤采摘户凡八十大德五年興之子久住為邵武路總管就近至武夷督造貢茶明年剏焙局稱為御茶園有仁風門第一春殿清神堂諸景又有通仙井覆以龍亭皆極丹雘之盛設塲官二員領其事後嵗額浸廣增戸至二百五十茶三百六十斤製龍團五千餅泰定五年崇安令張端本重加修葺於園之左右各建一坊扁曰茶塲至順三年建寧總管暗都剌於通仙井畔築臺髙五尺方一丈六尺名曰喊山臺其上為喊泉亭因稱井為呼來泉舊志云祭後羣喊而水漸盈造茶畢而遂涸故名迨至正末額凡九百九十斤明初仍之著為令每嵗驚蟄日崇安令具牲醴詣茶塲致祭造茶入貢洪武二十四年詔天下産茶之地嵗有定額以建寧為上聼茶戸采進勿預有司茶名有四探春先春次春紫筍不得碾揉為大小龍團然而祀典貢額猶如故也嘉靖三十六年建寧太守錢嶫因本山茶枯令以嵗編茶夫銀二百兩及水脚銀二十兩齎府造辦自此遂罷茶塲而崇民得以休息御園尋廢惟井尚存井水清甘較他泉迥異仙人張邋遢過此飲之曰不徒茶美亦此水之力也我朝茶法陜西給番易馬舊設茶馬御史後歸廵撫兼理各省發引通商止於陜境交界處盤查凡産茶地方止有茶利而無茶累深山窮谷之民無不沾濡雨露耕田鑿井共樂昇平此又有茶以來希遇之盛也雍正十二年七月既望陸廷燦識續茶經附録
