body:
  text: 續茶經卷下之一候補主事陸廷燦撰五茶之煑唐陸羽六羡歌不羡黄金罍不羡白玉盃不羡朝入省不羡暮入臺千羡萬羡西江水曽向竟陵城下來唐張又新水記故刑部侍郎劉公諱伯芻于又新丈人行也為學精博有風鑒稱較水之與茶宜者凡七等揚子江南零水第一無錫恵山寺石水第二蘇州虎邱寺石水第三丹陽縣觀音寺井水第四大明寺井水第五吳淞江水第六淮水最下第七余嘗具瓶於舟中親挹而比之誠如其說也客有熟於兩浙者言捜訪未盡余嘗志之及刺永嘉過桐廬江至嚴瀨溪色至清水味甚冷煎以佳茶不可名其鮮馥也愈於揚子南零殊逺及至永嘉取仙巖瀑布用之亦不下南零以是知客之説信矣陸羽論水次第凡二十種廬山康王谷水簾水第一無錫恵山寺石泉水第二蘄州蘭溪石下水第三峽州扇子山下蝦􅂒口水第四蘇州虎邱寺石泉水第五廬山招賢寺下方橋潭水第六揚子江南零水第七洪州西山瀑布泉第八唐州桐柏縣淮水源第九廬州龍池山嶺水第十丹陽縣觀音寺水第十一揚州大明寺水第十二漢江金州上游中零水第十三水苦歸州玉虛洞下香溪水第十四商州武闗西洛水第十五吳淞江水第十六天台山西南峰千丈瀑布水第十七栁州圎泉水第十八桐廬嚴陵灘水第十九雪水第二十用雪不可太冷唐顧况論茶煎以文火細烟煑以小鼎長泉蘇廙仙芽𫝊第九卷載作湯十六法謂湯者茶之司命若名茶而濫湯則與凡味同調矣煎以老嫩言凡三品注以緩急言凡三品以器標者共五品以薪論者共五品一得一湯二嬰湯三百夀湯四中湯五斷脈湯六大壯湯七富貴湯八秀碧湯九壓一湯十纒口湯十一減價湯十二法律湯十三一面湯十四宵人湯十五賤湯十六魔湯丁用晦芝田録唐李衛公德裕喜恵山泉取以烹茗自常州到京置驛騎𫝊送號曰水逓後有僧某曰請為相公通水脉盖京師有一眼井與恵山泉脉相通汲以烹茗味殊不異公問井在何坊曲曰昊天觀常住庫後是也因取恵山昊天各一瓶雜以他水八瓶令僧辨晰僧止取二瓶井泉德裕大加竒嘆事文類聚贊黄公李德裕居廊廟日有親知奉使於京口公曰還日金山下揚子江南零水與取一壺來其人敬諾及使回舉棹日因醉而忘之汎舟至石城下方憶乃汲一瓶於江中歸京獻之公飲後歎訝非常曰江表水味有異於頃歳矣此水頗似建業石頭城下水也其人即謝過不敢隠河南通志廬仝茶泉在濟源縣仝有莊在濟源之通濟橋二里餘茶泉存焉其詩曰買得一片田濟源花洞前自號玉川子有寺名玉泉汲此寺之泉煎茶有玉川子飲茶歌句多竒警黄州志陸羽泉在蘄水縣鳯棲山下一名蘭溪泉羽品為天下第三泉也嘗汲以烹茗宋王元之有詩無盡法師天台志陸羽品水以此山瀑布泉為天下第十七水余嘗試飲比余豳溪蒙泉殊劣余疑鴻漸但得至瀑布泉耳茍徧歴天台當不取金山為第一也海録陸羽品水以雪水第二十以煎茶滯而太冷也陸平泉茶寮記唐秘書省中水最佳故名秘水檀几叢書唐天寶中稠錫禪師名清晏卓錫南嶽磵上泉忽迸石窟間字曰真珠泉師飲之清甘可口曰得此瀹吾鄉桐廬茶不亦稱乎大觀茶論水以輕清甘潔為美用湯以魚蟹眼連絡迸躍為度咸淳臨安志棲霞洞内有水洞深不可測水極甘冽魏公嘗調以瀹茗又蓮花院有三井露井最良取以烹茗清甘寒冽品為小林第一王氏談録公言茶品高而年多者必稍陳遇有茶處春初取新芽輕炙雜而烹之氣味自復在襄陽試作甚佳嘗語君謨亦以為然歐陽修浮槎水記浮槎與龍池山皆在廬州界中較其味不及浮槎逺甚而又新所記以龍池為第十浮槎之水棄而不録以此知又新所失多矣陸羽則不然其論曰山水上江次之井為下山水乳泉石池漫流者上其言雖簡而於論水盡矣蔡襄茶録茶或經年則香色味皆陳煑時先於淨器中以沸湯漬之刮去膏油去聲一兩重即止乃以鈐拑之用微火炙乾然後碎碾若當年新茶則不用此説碾時先以淨紙宻裹搥碎然後熟碾其大要旋碾則色白如經宿則色昏矣碾畢即羅羅細則茶浮麤則沫浮候湯最難未熟則沫浮過熟則茶沉前世謂之蟹眼者過熟湯也沉瓶中煑之不可辨故曰侯湯最難茶少湯多則雲脚散湯少茶多則粥面聚建人謂之雲脚粥面鈔茶一錢七先注湯調令極勻又添注入環迴擊拂湯上盞可四分則止眡其面色鮮白著盞無水痕為絶佳建安鬬試以水痕先退者為負耐久者為勝故校勝負之説曰相去一水兩水茶有真香而入貢者微以龍腦和膏欲助其香建安民間試茶皆不入香恐奪其真也若烹㸃之際又雜以珍果香草其奪益甚正當不用陶穀清異録饌茶而幻出物象於湯面者茶匠通神之藝也沙門福全生於金鄉長於茶海能注湯幻茶成一句詩如並㸃四甌共一首絶句泛於湯表小小物類唾手辦爾檀越日造門求觀湯戲全自咏詩曰生成盞裏水丹青巧畫工夫學不成却笑當時陸鴻漸煎茶贏得好名聲茶至唐而始盛近世有下湯運七别施妙訣使湯紋水脉成物象者禽獸蟲魚花草之屬纖巧如畫但須臾即就散滅此茶之變也時人謂之茶百戲又有漏影春法用縷紙貼盞糝茶而去紙偽為花身别以荔肉為葉松實鴨脚之類珍物為蕊沸湯㸃攪煑茶泉品予少得温氏所著茶説嘗識其水泉之目有二十焉㑹西走巴峽經蝦蟇窟北憩蕪城汲蜀岡井東遊故都絶揚子江留丹陽酌觀音泉過無錫􅆽慧山水粉槍末旗蘇蘭薪桂且鼎且缶以飲以歠莫不瀹氣滌慮蠲病析醒祛鄙恡之生心招神明而還觀信乎物類之得宜臭味之所感幽人之佳尚前賢之精鑒不可及已昔酈元善於水經而未嘗知茶王肅癖於茗飲而言不及水表是二美吾無愧焉魏泰東軒筆録鼎州北百里有甘泉寺在道左其泉清美最宜瀹茗林􅅢迴抱境亦幽勝宼萊公謫守雷州經此酌泉誌壁而去未㡬丁晉公竄朱崖復經此禮佛留題而行天聖中范諷以殿中丞安撫湖外至此寺覩二相留題徘徊慨嘆作詩以誌其旁曰平仲酌泉方頓轡謂之禮佛繼南行層巒下瞰嵐烟路轉使高僧薄寵榮張邦基墨莊漫録元祐六年七夕日東坡時知揚州與發運使晁端彦吳倅晁旡咎大明寺汲塔院西廊井與下院蜀井二水校其髙下以塔院水為勝華亭縣有寒穴泉與無錫恵山泉味相同並嘗之不覺有異邑人知之者少王荆公嘗有詩云神震冽氷霜髙穴雪與平空山渟千秋不出嗚咽聲山風吹更寒山月相與清北客不到此如何洗煩酲羅大經鶴林玉露余同年友李南金云茶經以魚目湧泉連珠為煑水之節然近世瀹茶鮮以鼎鍑用瓶煑水難以候視則當以聲辨一沸二沸三沸之節又陸氏之法以未就茶鍑故以第二沸為合量而下未若今以湯就茶甌瀹之則當用背二渉三之際為合量也乃為聲辨之詩曰砌虫唧唧萬蟬催忽有千車捆載來聽得松風并澗水急呼縹色緑磁盃其論固已精矣然瀹茶之法湯欲嫩而不欲老盖湯嫩則茶味甘老則過苦矣若聲如松風澗水而遽瀹之豈不過於老而苦㢤惟移瓶去火少待其沸止而瀹之然後湯適中而茶味甘此南金之所未講也因補一詩云松風桂雨到來初急引銅瓶離竹爐待得聲聞俱寂後一甌春雪勝醍醐趙彦衛雲麓漫抄陸羽别天下水味各立名品有石刻行於世列子云孔子淄澠之合易牙能辨之易牙齊威公大夫淄澠二水易牙知其味威公不信數試皆驗陸羽豈得其遺意乎黄山谷集瀘州大雲寺西偏崖石上有泉滴瀝一州泉味皆不及也林逋烹北苑茶有懷石碾輕飛瑟瑟塵乳花烹出建溪春人間絶品應難識閑對茶經憶故人東坡集予頃自汴入淮泛江泝峽歸蜀飲江淮水盖彌年既至覺井水腥澀百餘日然後安之以此知江水之甘於井也審矣今来嶺外自揚子始飲江水及至南康江益清駛水益甘則又知南江賢於北江也近度嶺入清逺峽水色如碧玉味益勝今游羅浮酌泰禪師錫杖泉則清逺峽水又在其下矣嶺外惟恵州人喜鬭茶此水不虛出也恵山寺東為觀泉亭堂曰漪瀾泉在亭中二井石甃相去咫尺方圎異形汲者多由圎井盖方動圎静静清而動濁也流過漪瀾從石龍口中出下赴大池者有土氣不可汲泉流冬夏不涸張又新品為天下第二泉避暑録話裴晉公詩云飽食緩行初睡覺一甌新茗侍兒煎脱巾斜倚繩床坐風送水聲來耳邊公為此詩必自以為得意然吾山居七年享此多矣馮璧東坡海南烹茶圗詩講筵分賜宻雲龍春夢分明覺亦空地惡九鑽黎火洞天游兩腋玉川風萬花谷黄山谷有井水帖云取井傍十數小石置瓶中令水不濁故咏慧山泉詩云錫谷寒泉􅀈音妥石俱是也石圎而長曰􅀈所以澄水茶家碾茶須碾着眉上白乃為佳㑹茶山詩云碾處須看眉上白分時為見眼中青輿地紀勝竹泉在荆州府松滋縣南宋至和初苦竹寺僧浚井得筆後黄庭堅謫黔過之視筆曰此吾蝦蟇碚所墜因知此泉與之相通其詩曰松滋縣西竹林寺苦竹林中甘井泉巴人謾説蝦蟇碚試裹春茶來就煎周輝清波雜志余家恵山泉石皆為几案間物親舊東來數問松竹平安信且時致陸子泉茗椀殊不落寞然頃歳亦可致於汴都但未免瓶盎氣用細砂淋過則如新汲時號拆洗恵山泉天台竹瀝水彼地人斷竹稍屈而取之盈甕若雜以他水則亟敗蘇才翁與蔡君謨比茶蔡茶精用恵山泉煑蘇茶劣用竹瀝水煎便能取勝此説見江鄰㡬所著嘉祐雜志果爾今喜擊拂者曽無一語及之何也雙井因山谷乃重蘇魏公嘗云平生薦舉不知㡬何人唯孟安序朝奉歳以雙井一瓮為餉盖公不納苞苴顧獨受此其亦珍之耶東京記文德殿兩掖有東西上閤門故杜詩云東上閣之東有井泉絶佳山谷憶東坡烹茶詩云閤門井不落第二竟陵谷簾空誤書陳舜俞廬山記康王谷有水簾飛泉破巖而下者二三十派其廣七十餘尺其髙不可計山谷詩云谷簾煑甘露是也孫月峰坡仙食飲録唐人煎茶多用薑故薛能詩云鹽損添常戒薑宜着更誇據此則又有用鹽者矣近世有此二物者輒大笑之然茶之中等者用薑煎信佳鹽則不可馮可賔岕茶牋茶雖均出於岕有如蘭花香而味甘過霉歴秋開罈烹之其香愈烈味若新沃以湯色尚白者真洞山也他嶰初時亦香秋則索然矣羣芳譜世人情性嗜好各殊而茶事則十人而九竹爐火候茗椀清縁煑引風之碧雲傾浮花之雪乳非藉湯勲何昭茶德略而言之其法有五一曰擇水二曰簡器三曰忌溷四曰慎煑五曰辨色吳興掌故録湖州金沙泉至元中中書省遣官致祭一夕水溢溉田千畆賜名瑞應泉職方志廣陵蜀岡上有井曰蜀井言水與西蜀相通茶品天下水有二十種而蜀岡水為第七遵生八牋凡㸃茶先須熁盞令熱則茶面聚乳冷則茶色不浮熁音脅火迫也陳眉公太平清話余嘗酌中泠劣於恵山殊不可解後攷之乃知陸羽原以廬山谷簾泉為第一山疏云陸羽茶經言瀑瀉湍激者勿食今此水瀑瀉湍激無如矣乃以為第一何也又雲液泉在谷簾側山多雲母泉其液也洪纎如指清洌甘寒逺出谷簾之上乃不得第一又何也又碧琳池東西兩泉皆極甘香其味不減恵山而東泉尤冽蔡君謨湯取嫩而不取老盖為團餅茶言耳今旗芽鎗甲湯不足則茶神不透茶色不明故茗戰之㨗尤在五沸徐渭煎茶七類煑茶非漫浪要須其人與茶品相得故其法每𫝊於高流隠逸有烟霞泉石磊磈於胸次間者品泉以井水為下井取汲多者汲多則水活候湯眼鱗鱗起沫餑鼓泛投茗器中初入湯少許俟湯茗相投即滿注雲脚漸開乳花浮面則味全盖古茶用團餅碾屑味易出葉茶驟則乏味過熟則味昏底滯張源茶録山頂泉清而輕山下泉清而重石中泉清而甘砂中泉清而洌土中泉清而厚流動者良於安静負陰者勝於向陽山削者泉寡山秀者有神真源無味真水無香流於黄石為佳瀉出青石無用湯有三大辨一曰形辨二曰聲辨三曰㨗辨形為内辨聲為外辨捷為氣辨如蝦眼蠏眼魚目連珠皆為萌湯直至湧沸如騰波鼔浪水氣全消方是純熟如初聲轉聲振聲駭聲皆為萌湯直至無聲方是純熟如氣浮一縷二縷三縷及縷亂不分氤氲繚繞皆為萌湯直至氣直冲貫方是純熟蔡君謨因古人製茶碾磨作餅則見沸而茶神便發此用嫩而不用老也今時製茶不假羅碾全具元體湯須純熟元神始發也爐火通紅茶銚始上扇起要輕疾待湯有聲稍稍重疾斯文武火之候也若過乎文則水性柔柔則水為茶降過於武則火性烈烈則茶為水制皆不足於中和非茶家之要㫖投茶有序無失其宜先茶後湯曰下投湯半下茶復以湯滿曰中投先湯後茶曰上投夏宜上投冬宜下投春秋宜中投不宜用惡木敝器銅匙銅銚木桶柴薪烟煤麩炭觕童惡婢不潔巾悅及各色果實香藥謝肇淛五雜組唐薛能茶詩云鹽損添嘗戒薑宜著更誇煑茶如是味安佳此或在竟陵翁未品題之先也至東坡和寄茶詩云老妻稚子不知愛一半已入薑鹽煎則業覺其非矣而此習猶在也今江右及楚人尚有以薑煎茶者雖云古風終覺未典閩人苦山泉難得多用雨水其味甘不及山泉而清過之然自淮而北則雨水苦黒不堪煑茗矣惟雪水冬月藏之入夏用乃絶佳夫雪固雨所凝也宜雪而不宜雨何㢤或曰北方瓦屋不净多用穢泥塗塞故耳古時之茶曰煑曰烹曰煎須湯如蟹眼茶味方中今之茶惟用沸湯投之稍著火即色黄而味澀不中飲矣迺知古今煑法亦自不同也蘇才翁鬭茶用天台竹瀝水乃竹露非竹瀝也若今醫家用火逼竹取瀝斷不宜茶矣顧元慶茶譜煎茶四要一擇水二洗茶三候湯四擇品㸃茶三要一滌器二熁盞三擇果熊明遇岕山茶記烹茶水之功居六無山泉則用天水秋雨為上梅雨次之秋雨冽而白梅雨醇而白雪水五穀之精也色不能白養水須置石子於甕不惟益水而白石清泉㑹心亦不在逺雪庵清史余性好清苦獨與茶宜幸近茶鄉恣我飲啜乃友人不辨三火三沸法余毎過飲非失過老則失之太嫩致令甘香之味蕩然無存盖誤於李南金之説耳如羅玉露之論乃為得火候也友曰吾性惟好讀書玩佳山水作佛事或時醉花前不愛水厄故不精於火候昔人有言釋滯消壅一日之利暫佳瘠氣耗精終身之害斯大獲益則歸功茶力貽害則不謂茶災甘受俗名緣此之故噫茶寃甚矣不聞秃翁之言釋滯消壅清苦之益實多瘠氣耗精情慾之害最大獲益則不謂茶力自害則反謂茶殃且無火候不獨一茶讀書而不得其趣玩山水而不㑹其情學佛而不破其宗好色而不飲其韻皆無火候者也豈余愛茶而故為茶吐氣㢤亦欲以此清苦之味與故人共之耳煑茗之法有六要一曰别二曰水三曰火四曰湯五曰器六曰飲有觕茶有散茶有末茶有餅茶有研者有熬者有煬者有舂者余幸得産茶方又兼得烹茶六要毎遇好朋便手自煎烹但願一甌常及真不用撐膓拄腹文字五千卷也故曰飲之時義逺矣㢤田藝蘅煑泉小品茶南方嘉木日用之不可少者品固有􅍇惡若不得其水且煑之不得其宜雖佳弗佳也但飲泉覺爽啜茗忘喧謂非膏梁紈袴可語爰著煑泉小品與枕石潄流者商焉陸羽嘗謂烹茶於所産處無不佳盖水土之宜也此論誠妙况旋摘旋瀹兩及其新耶故茶譜亦云蒙之中頂茶若獲一兩以本處水煎服即能祛宿疾是也今武林諸泉惟龍泓入品而茶亦惟龍泓山為最盖兹山深厚高大佳麗秀越為兩山之主故其泉清寒甘香雅宜煑茶虞伯生詩但見瓢中清翠影落羣岫烹煎黄金芽不取穀雨後姚公綬詩品嘗顧渚風斯下零落茶經奈爾何則風味可知矣又况為葛仙翁煉丹之所㢤又其上為老龍泓寒碧倍之其地産茶為南北兩山絶品鴻漸第錢塘天竺靈隠者為下品當未識此耳而郡志亦只稱寶雲香林白雲諸茶皆有水有茶不可以無火非謂其真無火也失所宜也李約云茶須活火煎盖謂炭火之有焰者東坡詩云活水仍將活火烹是也余則以為山中不常得炭且死火耳不若枯松枝為妙遇寒月多拾松實房蓄為煑茶之具更雅人但知湯候而不知火候火然則水乾是試火當先於試水也吕氏春秋伊尹説湯五味九沸九變火為之紀許次杼茶疏甘泉旋汲用之斯良丙舍在城夫豈易得故宜多汲貯以大甕但忌新器為其火氣未退易於敗水亦易生蟲久用則善最嫌他用水性忌木松杉為甚木桶貯水其害滋甚挈瓶為佳耳沸速則鮮嫩風逸沸遲則老熟昏鈍故水入銚便須急煑候有松聲即去盖以息其老鈍蟹眼之後水有微濤是為當時大濤鼎沸旋至無聲是為過時過時老湯决不堪用茶注茶銚茶甌最宜蕩滌飲事甫畢餘瀝殘葉必盡去之如或少存奪香敗味每日晨興必以沸湯滌過用極熟麻布向内拭乾以竹編架覆而庋之燥處烹時取用味若龍泓清馥雋永甚余嘗一一試之求其茶泉雙絶兩浙罕伍云山厚者泉厚山竒者泉竒山清者泉清山幽者泉幽皆佳品也不厚則薄不竒則蠢不清則濁不幽則喧必無用矣江公也衆水共入其中也水共則味雜故曰江水次之其水取去人逺者盖去人逺則湛深而無蕩漾之漓耳嚴陵瀨一名七里灘盖沙石上曰瀨曰灘也總謂之浙江但潮汐不及而且深澄故入陸品耳余嘗清秋泊釣臺下取囊中武夷金華二茶試之固一水也武夷則黄而燥冽金華則碧而清香乃知擇水當擇茶也鴻漸以婺州為次而清臣以白乳為武夷之右今優劣頓反矣意者所謂離其處水功其半者耶去泉再逺者不能日汲須遣誠實山僮取之以免石頭城下之偽蘇子瞻愛玉女河水付僧調水符以取之亦惜其不得枕流焉耳故曾茶山謝送恵山泉詩有舊時水遞費經營之句湯嫩則茶味不出過沸則水老而茶乏惟有花而無衣乃得㸃瀹之候耳三人以上止熱一爐如五六人便當兩鼎爐用一童湯方調適若令兼作恐有參差火必以堅木炭為上然木性未盡尚有餘烟烟氣入湯湯必無用故先燒令紅去其烟焰兼取性力猛熾水乃易沸既紅之後方授水器乃急扇之愈速愈妙母令手停停過之湯寧棄而再烹茶不宜近陰室㕑房市喧小兒啼野性人僮奴相閧酷熱齋舍羅廪茶解茶色白味甘鮮香氣撲鼻乃為精品茶之精者淡亦白濃亦白初潑白久貯亦白味甘色白其香自溢三者得則俱得也近來好事者或慮其色重一注之水投茶數片味固不足香亦窅然終不免水厄之誚雖然尤貴擇水香以蘭花為上蠶豆花次之煑茗須甘泉次梅水梅雨如膏萬物賴以滋養其味獨甘梅後便不堪飲大甕滿貯投伏龍肝一塊以澄之即竈中心乾土也乗熱投之李南金謂當背二渉三之際為合量此真賞鑒家言而羅鶴林懼湯老欲於松風澗水後移瓶去火少待沸止而瀹之此語亦未中窽殊不知湯既老矣雖去火何救㢤貯水甕須置於陰庭覆以紗帛使晝挹天光夜承星露則英華不散靈氣常存假令壓以木石封以紙箬暴於日中則内閉其實外耗其精水神敝矣水味敗矣考槃餘事今之茶品與茶經逈異而烹製之法亦與蔡陸諸人全不同矣始如魚目微微有聲為一沸緣邊湧泉如連珠為二沸奔濤濺沫為三沸其法非活火不成若薪火方交水釡纔熾急取旋傾水氣未消謂之懶若人過百息水踰十沸始取用之湯已失性謂之老老與懶皆非也夷門廣牘虎邱石泉舊居第三漸品第五以石泉渟泓皆雨澤之積滲竇之潢也况闔廬墓隧當時石工多閟死僧衆上棲不能無穢濁滲八雖名陸羽泉非天然水道家服食禁屍氣也六硯齋筆記武林西湖水取貯大缸澄淀六七日有風雨則覆晴則露之使受日月星之氣用以烹茶甘淳有味不遜慧麓以其溪谷奔注􅇽浸凝渟非復一水取精多而味自足耳以是知凡有湖陂大浸處皆可貯以取澄絶勝淺流陰井昏滯腥薄不堪㸃試也古人好竒飲中作百花熟水又作五色飲及氷蜜糖藥種種各殊余以為皆不足尚如值精茗適乏細劚松枝瀹湯潄嚥而已竹嬾茶衡處處茶皆有然勝處未暇悉品姑㨿近道日御者虎邱氣芳而味薄乍入盎菁英浮動鼻端拂拂如蘭初析經喉吻亦快然然必恵麓水甘醇足佐其寡薄龍井味極腆厚色如淡金氣亦沉寂而咀嚥之久鮮腴潮舌又必藉虎跑空寒熨齒之泉發之然後飲者領雋永之滋無昏滯之恨耳松雨齋運泉約吾輩竹雪神期松風齒頰暫隨飲啄人間終擬逍遥物外名山未即塵海何辭然而捜竒煉句液瀝易枯滌滯洗蒙茗泉不廢月團三百喜折魚緘槐火一篝驚翻蟹眼陸季疵之著述既奉典刑張又新之編摩能無鼔吹昔衛公宦達中書頗煩遞水杜老潛居䕫峽險叫濕雲今者環處恵麓踰二百里而遥問渡松陵不三四日而致登新捐舊轉手竗若轆轤取便費廉用力省於桔橰凡吾清士咸赴嘉盟運恵水每罈償舟力費銀三分水罈罈價及罈盖自備不計水至走報各友令人自擡毎月上旬歛銀中旬運水月運一次以致清新願者書號於左以便登冊併開罈數如數付銀某月某日付松雨齋主人謹訂岕茶彚鈔烹時先以上品泉水滌烹器務鮮務潔次以熱水滌茶葉水若太滚恐一滌味損當以竹筯夾茶於滌器中反覆洗蕩去塵土黄葉老梗既盡乃以手搦乾置滌器内盖定少刻開眎色青香冽急取沸水潑之夏先貯水入茶冬先貯茶入水茶色貴白然白亦不難泉清瓶潔葉少水洗旋烹旋啜其色自白然真味抑鬱徒為目食耳若取青緑則天池松蘿及岕之最下者雖冬月色亦如苔衣何足為妙若余所收真洞山茶自穀雨後五日者以湯蕩澣貯壺良久其色如玉至冬則嫩緑味甘色淡韻清氣醇亦作嬰兒肉香而芝芬浮蕩則虎邱所無也洞山茶系岕茶德全策勲惟歸洗控沸湯潑葉即起洗鬲斂其出液候湯可下指即下洗鬲排蕩沙沫復起併指控乾閉之茶藏候投盖他茶欲按時分投惟岕既經洗控神理綿綿止須上投耳天下名勝志宜興縣湖汶鎮有於潛泉竇穴濶二尺許狀如井其源洑流潛通味頗甘冽唐修茶貢此泉亦遞進洞庭縹緲峰西北有水月寺寺東入小青塢有泉瑩澈甘凉冬夏不涸宋李彌大名之曰無礙泉安吉州碧玉泉為冠清可鑒髮香可瀹茗徐獻忠水品泉甘者試稱之必厚重其所由來者逺大使然也江中南零水自岷江發源數千里始澄於兩石間其性亦重厚故甘也處士茶經不但擇水其火用炭或勁薪其炭曽經燔為腥氣所及及膏木敗器不用之古人辨勞薪之味殆有㫖也山深厚者雄大者氣盛麗者必出佳泉張大復梅花筆談茶性必發於水八分之茶遇十分之水茶亦十分矣八分之水試十分之茶茶只八分耳巖棲幽事黄山谷賦洶洶乎如澗松之發清吹浩浩乎如春空之行白雲可謂得煎茶三昧劍掃煎茶乃韻事須人品與茶相得故其法徃徃𫝊於高流隠逸有烟霞泉石磊塊胸次者湧幢小品天下第四泉在上饒縣北茶山寺唐陸鴻漸寓其地即山種茶酌以烹之品其等為第四邑人尚書楊麒讀書於此因取以為號余在京三年取汲德勝門外水烹茶最佳大内御用井亦西山泉脉所灌真天漢第一品陸羽所不及載俗語芒種逢壬便立霉霉後積水烹茶甚香冽可久藏一交夏至便逈别矣試之良驗家居苦泉水難得自以意取尋常水煑滚入大磁罁置庭中避日色俟夜天色皎潔開罁受露凡三夕其清澈底積垢二三寸亟取出以罈盛之烹茶與恵泉無異聞龍它泉記吾鄉四郵皆山泉水在在有之然皆淡而不甘獨所謂它泉者其源出自四明自洞抵埭不下三數百里水色蔚藍素砂白石􅉿􅉿見底清寒甘滑甲於郡中玉堂叢語黄諌常作京師泉品郊原玉泉第一京城文華殿東大庖井第一後謫廣州評泉以雞爬井為第一更名學士泉吴栻云武夷泉出南山者皆潔冽味短北山泉味逈别盖兩山形似而脉不同也予攜茶具共訪得三十九處其最下者亦無硬冽氣質王新城隴蜀餘聞百花潭有巨石三水流其中汲之煎茶清冽異於他水居易録濟源縣段少司空園是玉川子煎茶處中有二泉或曰玉泉去盤谷不十里門外一水曰漭水出王屋山按通志玉泉在瀧水上盧仝煎茶於此今水經注不載分甘餘話一水水名也酈元水經注渭水又東㑹一水發源吳山地里志吳山古汧山也山下石穴水溢石空懸波側注按此即一水之源在靈應峰下所謂西鎮靈湫是也余丙子祭告西鎮常品茶於此味與西山玉泉極相似古夫于亭雜録唐劉伯芻品水以中泠為第一恵山虎邱次之陸羽則以康王谷為第一而次以恵山古今耳食者遂以為不易之論其實二子所見不過江南數百里内之水逺如峽中蝦蟇碚纔一見耳不知大江以北如吾郡發地皆泉其著名者七十有二以之烹茶皆不在恵泉之下宋李文叔格非郡人也嘗作濟南水記與洛陽名園記並𫝊惜水記不存無以正二子之陋耳謝在杭品平生所見之水首濟南趵突次以益都孝婦泉在顔神鎮青州范公泉而尚未見章邱之百脉泉右皆吾郡之水二子何嘗多見予嘗題王秋史苹二十四泉草堂云翻憐陸鴻漸跬歩限江東正此意也陸次雲湖壖雜記龍井泉從龍口中瀉出水在池内其氣恬然若遊人注視久之忽波瀾湧起如欲雨之狀張鵬翮奉使日記葱嶺乾澗側有舊二井從旁掘地七八尺得水甘冽可煑茗字之曰塞外第一泉廣輿記永平灤州有扶蘇泉甚甘冽秦太子扶蘇嘗憩此江寧攝山千佛嶺下石壁上刻隸書六字曰白乳泉試茶亭鍾山八功德水一清二冷三香四柔五甘六净七不饐八蠲疴丹陽玉乳泉唐劉伯蒭論此水為天下第四寧州雙井在黄山谷所居之南汲以造茶絶勝他處杭州孤山下有金沙泉唐白居易嘗酌此泉甘美可愛視其地沙光燦如金因名安陸府沔陽有陸子泉一名文學泉唐陸羽嗜茶得泉以試故名增訂廣輿記玉泉山泉出石罅間因鑿石為螭頭泉從口出味極甘美潴為池廣三丈東跨小石橋名曰玉泉垂虹武夷山志山南虎嘯巖語兒泉濃若停膏瀉杯中鑑毛髮味甘而博啜之有軟順意次則天柱三敲泉而茶園喊泉又可伯仲矣北山泉味逈别小桃源一泉高地尺許汲不可竭謂之髙泉純逺而逸致韻雙發愈啜愈想愈深不可以味名也次則接筍之仙掌露其最下者亦無硬冽氣質中山傳信録琉球烹茶以茶末雜細粉少許入碗沸水半甌用小竹帚攪數十次起沫滿甌面為度以敬客且有以大螺殻烹茶者隨見録安慶府宿松縣東門外孚玉山下福昌寺旁井曰龍井水味清甘瀹茗甚佳質與溪泉較重續茶經卷下之一欽定四庫全書續茶經卷下之二候補主事陸廷燦撰六茶之飲盧仝茶歌日髙丈五睡正濃軍將扣門驚周公口𫝊諌議送書信白絹斜封三道印開緘宛見諌議面手閱月團三百片聞道新年入山裏蟄蟲驚動春風起天子未嘗陽羡茶百草不敢先開花仁風暗結珠蓓蕾先春抽出黄金芽摘鮮焙芳旋封裹至精至好且不奢至尊之餘合王公何事便到山人家柴門反闗無俗客紗㡌籠頭自煎吃碧雲引風吹不斷白花浮光凝椀面一椀喉吻潤二椀破孤悶三椀捜枯腸惟有文字五千卷四椀發輕汗平生不平事盡向毛孔散五椀肌骨清六椀通仙靈七椀吃不得也唯覺兩腋習習清風生唐馮䞇記事珠建人謂鬭茶曰茗戰北堂書鈔杜育荈賦云茶能調神和内解倦除慵續博物志南人好飲茶孫皓以茶與韋曜代酒謝安詣陸納設茶果而已北人初不識此唐開元中泰山靈巖寺有降魔師教學禪者以不寐法令人多作茶飲因以成俗大觀茶論㸃茶不一以分輕清重濁相稀稠得中可欲則止桐君録云若有餑飲之宜人雖多不為貴也夫茶以味為上香甘重滑為味之全惟北苑壑源之品兼之卓絶之品真香靈味自然不同茶有真香非龍麝可擬要須蒸及熟而壓之及乾而研研細而造則和美具足入盞則馨香四達秋爽洒然㸃茶之色以純白為上真青白為次灰白次之黄白又次之天時得于上人力盡于下茶必純白青白者蒸壓㣲生灰白者蒸壓過熟壓膏不盡則色青暗焙火太烈則色昏黒蘇文忠集予去黄十七年復與彭城張聖途丹陽陳輔之同來院僧梵英葺治堂宇比舊加嚴潔茗飲芳冽予問此新茶耶英曰茶性新舊交則香味復予嘗見知琴者言琴不百年則桐之生意不盡緩急清濁常與雨暘寒暑相應此理與茶相近故并記之王燾集外臺秘要有代茶飲子詩云格韻高絶惟山居逸人乃當作之予嘗依法治服其利膈調中信如所云而其氣味乃一帖煮散耳與茶了無干渉月􅇠茶詩環非環玦非玦中有迷離玉兔兒一似佳人裙上月月圓還缺缺還圎此月一缺圎何年君不見鬭茶公子不忍鬭小團上有雙啣綬𢃄雙飛鸞坡公嘗遊杭州諸寺一日飲釅茶七椀戲書云示病維摩原不病在家靈運已忘家何須魏帝一丸藥且盡盧仝七椀茶侯鯖録東坡論茶除煩已膩世固不可一日無茶然闇中損人不少故或有忌而不飲者昔人云自茗飲盛後人多患氣患黄雖損益相半而消陰助陽益不償損也吾有一法常自珍之每食已輒以濃茶潄口頰膩既去而脾胃不知凡肉之在齒間得茶潄滌乃盡消縮不覺脫去毋煩挑刺也而齒性便苦縁此漸堅密蠧疾自已矣然率用中茶其上者亦不常有間數日一啜亦不為害也此大是有理而人罕知者故詳述之白玉蟾茶歌味如甘露勝醍醐服之頓覺沉疴甦身輕便欲登天衢不知天上有茶無唐庚鬭茶記政和三年三月壬戌二三君子相與鬭茶于寄傲齋予為取龍塘水烹之而苐其品吾聞茶不問團銙要之貴新水不問江井要之貴活千里致水偽固不可知就令識真已非活水今我提瓶走龍塘無數千歩此水宜茶昔人以為不減清逺峽每歳新茶不過三月至矣罪戾之餘得與諸公從容談笑于此汲泉煮茗以取一時之適此非吾君之力歟蔡襄茶録茶色貴白而餅茶多以珍膏油去聲其面故有青黄紫黑之異善别茶者正如相工之視人氣色也隠然察之于内以肉理潤者為上既已末之黄白者受水昏重青白者受水詳明故建安人鬭試以青白勝黄白張淏雲谷雜記飲茶不知起于何時歐陽公集古録跋云茶之見前史盖自魏晉以來有之予按晏子春秋嬰相齊景公時食脫粟之飯炙三弋五卵茗菜而已又漢王褒僮約有五陽一作武都買茶之語則魏晉之前已有之矣但當時雖知飲茶未若後世之盛也考郭璞注爾雅云樹似梔子冬生葉可煮作羮飲然茶至冬味苦豈可作羮飲耶飲之令人少睡張華得之以為異聞遂載之博物志非但飲茶者鮮識茶者亦鮮至唐陸羽著茶經三篇言茶甚備天下益知飲茶其後尚茶成風囬紇入朝始驅馬市茶德宗建中間趙贊始興茶稅興元初雖詔罷貞元九年張滂復奏請歳得緍錢四十萬今乃與鹽酒同佐國用所入不知㡬倍于唐矣品茶要録余嘗論茶之精絶者其白合未開其細如麥蓋得青陽之輕清者也又其山多𢃄砂石而號佳品者皆在山南盖得朝陽之和者也余嘗事閒乗晷景之明淨適亭軒之瀟灑一一皆取品試既而神水生于華池愈甘而新其有助乎昔陸羽號為知茶然羽之所知者皆今之所謂茶草何㢤如鴻漸所論蒸筍併葉畏流其膏盖草茶味短而淡故常恐去其膏建茶力厚而甘故惟欲去其膏又論福建為未詳徃得之其味極佳由是觀之鴻漸其未至建安歟謝宗論茶候蟾背之芳香觀蝦目之沸湧故細漚花泛浮餑雲騰昏俗塵勞一啜而散黄山谷集品茶一人得神二人得趣三人得味六七人是名施茶沈存中夣溪筆談芽茶古人謂之雀舌麥顆言其至嫩也今茶之美者其質素良而所植之土又美則新芽一發便長寸餘其細如鍼惟芽長為上品以其質幹土力皆有餘故也如雀舌麥顆者極下材耳乃北人不識誤為品題予山居有茶論且作嘗茶詩云誰把嫩香名雀舌定來北客未曽嘗不知靈草天然異一夜風吹一寸長遵生八牋茶有真香有佳味有正色烹㸃之際不宜以珍果香草雜之奪其香者松子柑橙蓮心木𤓰梅花茉莉薔薇木樨之類是也奪其色者柿餅膠棗火桃楊梅橘餅之類是也凡飲佳茶去果方覺清絶雜之則味無辨矣若欲用之所宜則惟核桃榛子𤓰仁杏仁欖仁栗子雞頭銀杏之類或可用也徐渭煎茶七類茶入口先須灌潄次復徐啜俟甘津潮舌乃得真味若雜以花果則香味俱奪矣飲茶宜凉臺静室明牕曲几僧寮道院松風竹月晏坐行吟清談把巻飲茶宜翰卿墨客緇衣羽士逸老散人或軒冕中之超軼世味者除煩雪滯滌酲破睡譚渴書倦是時茗椀策勲不減凌烟許次杼茶疏握茶手中俟湯入壺隨手投茶定其浮沉然後瀉啜則乳嫩清滑而馥郁于鼻端病可令起疲可令爽一壺之茶只堪再巡初巡鮮美再巡甘醇三巡則意味盡矣余嘗與客戲論初巡為婷婷嬝嬝十三餘再巡為碧玉破𤓰年三巡以來緑葉成陰矣所以茶注宜小小則再巡已終寧使餘芬剰馥尚留葉中猶堪飯後供啜𠻳之用人必各手一甌毋勞𫝊送再巡之後清水滌之若巨器屢巡滿中瀉飲待停少温或求濃苦何異農匠作勞但資口腹何論品賞何知風味乎煮泉小品唐人以對花啜茶為殺風景故王介甫詩云金谷千花莫漫煎其意在花非在茶也余意以為金谷花前信不宜矣若把一甌對山花啜之當更助風景又何必羔兒酒也茶如佳人此論最妙但恐不宜山林間耳昔蘇東坡詩云從來佳茗似佳人曽茶山詩云移人尤物衆談誇是也若欲稱之山林當如毛女麻姑自然仙丰道骨不凂烟霞若夫桃臉栁腰亟宜屏諸銷金帳中母令汚我泉石茶之團者片者皆出於碾磑之末既損真味復加油垢即非佳品總不若今之芽茶也盖天然者自勝耳曽茶山日鑄茶詩云寶銙自不乏山芽安可無蘇子瞻壑源試焙新茶詩云要知玉雪心腸好不是膏油首面新是也且末茶瀹之有屑滯而不爽知味者當自辨之煮茶得宜而飲非其人猶汲乳泉以灌蒿蕕罪莫大焉飲之者一吸而盡不暇辨味俗莫甚焉人有以梅花菊花茉莉花薦茶者雖風韻可賞究損茶味如品佳茶亦無事此今人薦茶類下茶果此尤近俗是縱佳者能損茶味亦宜去之且下果則必用匙若金銀大非山居之器而銅又生鉎皆不可也若舊稱北人和以酥酪蜀人入以白土此皆蠻飲固不足責羅廪茶解茶通仙靈然有妙理山堂夜坐汲泉煮茗至水火相戰如聽松濤傾瀉入杯雲光㶑灔此時幽趣故難與俗人言矣顧元慶茶譜品茶八要一品二泉三烹四器五試六候七侣八勛張源茶録飲茶以客少為貴衆則喧喧則雅趣乏矣獨啜曰幽二客曰勝三四曰趣五六曰汛七八曰施釃不宜早飲不宜遲釃早則茶神未發飲遲則妙馥先消雲林遺事倪元鎮素好飲茶在恵山中用核桃松子肉和真粉成小磈如石狀置于茶中飲之名曰清泉白石茶聞龍茶箋東坡云蔡君謨嗜茶老病不能飲日烹而玩之可發來者之一笑也孰知千載之下有同病焉余嘗有詩云年老躭彌甚脾寒量不勝去烹而玩之者㡬希矣因憶老友周文甫自少至老茗椀薫爐無時暫廢飲茶日有定期旦明晏食禺中晡時下舂黄昏凡六舉而客至烹㸃不與焉夀八十五無疾而卒非宿植清福烏能畢世安享視好而不能飲者所得不既多乎嘗蓄一龔春壺摩挲寶愛不啻掌珠用之既久外類紫玉内如碧雲真竒物也後以殉塟快雪堂漫録昨同徐茂吳至老龍井買茶山民十數家各出茶茂吳以次㸃試皆以為贗曰真者甘香而不冽稍冽便為諸山贗品得一二兩以為真物試之果甘香若蘭而山民及寺僧反以茂吳為非吾亦不能置辨偽物亂真如此茂吳品茶以虎邱為第一常用銀一兩餘購其斤許寺僧以茂吳精鑒不敢相欺他人所得雖厚價亦贗物也子晉云本山茶葉微帶黑不甚青翠㸃之色白如玉而作寒豆香宋人呼為白雲茶稍緑便為天池物天池茶中雜數莖虎邱則香味逈别虎邱其茶中王種耶岕茶精者庶㡬妃后天池龍井便為臣種其餘則民種矣熊明遇岕山茶記茶之色重味重香重者俱非上品松羅香重六安味苦而香與松羅同天池亦有草萊氣龍井如之至雲霧則色重而味濃矣嘗啜虎邱茶色白而香似嬰兒肉真稱精絶邢士襄茶說夫茶中着料碗中着果譬如玉貎加脂蛾眉染黛翻累本色矣馮可賔岕茶牋茶宜無事佳客幽坐吟咏揮翰倘佯睡起宿酲清供精舍㑹心賞鑒文僮茶忌不如法惡具主客不韻冠裳苛禮葷肴雜陳忙冗壁間案頭多惡趣謝在杭五雜組昔人謂楊子江心水蒙山頂上茶蒙山在蜀雅州其中峯頂尤極險穢虎狼蛇虺所居采得其茶可蠲百疾今山東人以蒙陰山下石衣為茶當之非矣然蒙陰茶性亦冷可治胃熱之病凡花之竒香者皆可㸃湯遵生八牋云芙蓉可為湯然今牡丹薔薇玫瑰桂菊之屬采以為湯亦覺清逺不俗但不若茗之易致耳北方栁芽初茁者采之入湯云其味勝茶曲阜孔林楷木其芽可以烹飲閩中佛手柑橄欖為湯飲之清香色味亦旗槍之亞也又或以菉豆微炒投沸湯中傾之其色正緑香味亦不減新茗偶宿荒村中覔茗不得者可以此代也穀山筆麈六朝時北人猶不飲茶至以酪與之較惟江南人食之甘至唐始興茶稅宋元以來茶目遂多然皆蒸乾為末如今香餅之製乃以入貢非如今之食茶止采而烹之也西北飲茶不知起於何時本朝以茶易馬西北以茶為藥療百病皆瘥此亦前代所未有也金陵𤨏事思屯乾道人見萬鎡手軟膝酸云係五藏皆火不必服藥惟武夷茶能解之茶以東南枝者佳採得烹以澗泉則茶􅆆立若以井水即横六研齋筆記茶以芳冽洗神非讀書談道不宜褻用然非真正契道之士茶之韻味亦未易評量嘗笑時流持論貴嘶聲之曲無色之茶嘶近於啞古之遶梁遏雲竟成鈍置茶若無色芳冽必減且芳與鼻觸冽以舌受色之有無目之所審根境不相攝而取𠂻於彼何其悖耶何其謬耶虎邱以有芳無色擅茗事之品顧其馥郁不勝蘭芷止與新剝荳花同調鼻之消受亦無㡬何至於入口淡於勺水清泠之淵何地不有乃煩有司章程作僧流棰楚㢤紫桃軒雜綴天目清而不醨苦而不螫正堪與緇流潄滌筍蕨石瀨則太寒儉野人之飲耳松羅極精者方堪入供亦濃辣有餘甘芳不足恰如多財賈人縱復藴藉不免作蒜酪氣分水貢芽出本不多大葉老根潑之不動入水煎成畨有竒味薦此茗時如得千年松栢根作石鼎薫燎乃足稱其老氣鷄蘇佛橺欖仙宋人咏茶語也鷄蘇即薄荷上口芳辣橺欖久咀囬甘合此二者庶得茶藴曰仙曰佛當於空𤣥虛寂中嘿嘿證入不具是舌根者終難與説也賞名花不宜更度曲烹精茗不必更焚香恐耳目口鼻互牽不得全領其妙也精茶不宜潑飯更不宜沃醉以醉則燥渴將滅裂吾上味耳精茶豈止當為俗客吝倘是日汨汨塵務無好意緒即烹就寧俟冷以灌蘭斷不令俗腸汚吾茗君也羅山廟后岕精者亦芬芳回甘但嫌稍濃乏雲露清空之韻以兄虎邱則有餘以父龍井則不足天地通俗之才無逺韻亦不致嘔噦寒月諸茶黣􅀈無色而彼獨翠緑媚人可念也屠赤水云茶於穀雨候晴明日采製者能治痰𠻳療百疾類林新咏顧彦先曰有味如臛飲而不醉無味如茶飲而醒焉醉人何用也徐文長秘集致品茶宜精舍宜雲林宜磁瓶宜竹竈宜幽人雅士宜衲子仙朋宜永晝清談宜寒宵兀坐宜松月下宜花鳥間宜清流白石宜緑蘚蒼苔宜素手汲泉宜紅粧掃雪宜船頭吹火宜竹裏飄煙芸窓清玩茅一相云余性不能飲酒而獨躭味于茗清泉白石可以濯五臟之汚可以澄心氣之哲服之不已覺兩腋習習清風自生吾讀醉鄉記未嘗不神遊焉而間與陸鴻漸蔡君謨上下其議則又爽然自釋矣三才藻異雷鳴茶産蒙山頂雷發收之服三兩換骨四兩為地仙聞雁齋筆記趙長白自言吾生平無他幸但不曽飲井水耳此老子茶可謂能盡其性者今亦老矣甚窮大都不能如曩時猶摩挲萬卷中作茶史故是天壤間多情人也袁宏道瓶花史賞花茗賞者上也譚賞者次也酒賞者下也茶譜博物志云飲真茶令人少眠此是實事但茶佳乃效且須末茶飲之如葉烹者不效也太平清話琉球國亦曉烹茶設古鼎于几上水將沸時投茶末一匙以湯沃之少頃奉飲味清香藜牀瀋餘長安婦女有好事者曾侯家睹彩牋曰一輪初滿萬户皆清若乃狎處衾幃不惟辜負蟾光竊恐嫦娥生妒涓于十五十六二宵聨女伴同志者一茗一爐相從卜夜名曰伴嫦娥凡有氷心竚垂玉允朱門龍氏拜啟陸濬原沈周跋茶録樵海先生真隠君子也平日不知朱門為何物日偃仰於青山白雲堆中以一瓢消磨半生盖實得品茶三昧可以羽翼桑苧翁之所不及即謂先生為茶中董狐可也王晫快説續記春日看花郊行一二里許足力小疲口亦少渴忽逢解事僧邀至精舍未通姓名便進佳茗踞竹牀連啜數甌然后言别不亦快㢤衛泳枕中秘讀罷吟餘竹外茶烟輕颺花深酒後鐺中聲響初浮箇中風味誰知盧居士可與言者心下快活自省黄宜州豈欺我㢤江之蘭文房約詩書涵聖脉草木棲神明一草一木當其含香吐艷倚檻臨窓真足賞心悦目助我幽思亟宜烹蒙頂石花悠然啜飲扶輿沆瀣往來於竒峰怪石間結成佳茗故幽人逸士紗㡌籠頭自煎自喫車聲羊腸無非火候茍飲不盡且潄棄之是又呼陸羽為茶博士之流也高士竒天禄識餘飲茶或云始於梁天監中見洛陽伽藍記非也按吳志韋曜𫝊孫皓每讌饗無不竟日曜不能飲密賜茶荈以當酒如此言則三國時已知飲茶矣逮唐中世𣙜茶遂與煮海相抗迄今國計賴之中山𫝊信録琉球茶甌頗大斟茶止二三分用菓一小塊貯匙内此學中國獻茶法也王復禮茶説花晨月夕賢主嘉賔縱談古今品茶次苐天壤間更有何樂奚俟膾鯉炰羔金罍玉液痛飲狂呼始為得意也范文正公云露芽錯落一畨榮綴玉含珠散嘉樹鬭茶味兮輕醍醐鬭茶香兮薄蘭芷沈心齋云香含玉女峯頭露潤帶珠簾洞口雲可稱岩茗知己陳鑑虎邱茶經注補鑑親采數嫩葉與茶侣湯愚公小焙烹之真作荳花香昔之鬻虎邱茶者盡天池也陳鼎滇黔紀遊貴州羅漢洞深十餘里中有泉一泓其色如黝甘香清冽煮茗則色如渥丹飲之唇齒皆赤七日乃復瑞草論云茶之為用味寒若熱渇凝悶胸目澀四肢煩百節不舒聊四五啜與醍醐甘露抗衡也本草拾遺茗味苦微寒無毒治五臟邪氣益意思令人少卧能輕身明目去痰消渴利水道蜀雅州名山茶有露鋑芽籛芽皆云火前者言采造於禁火之前也火後者次之又有枳殻芽枸杞芽枇杷芽皆治風疾又有皂莢芽槐芽栁芽乃上春摘其芽和茶作之故今南人輸官茶往往雜以衆葉惟茅蘆竹箬之類不可以入茶自餘山中草木芽葉皆可和合而椿柿葉尤竒真茶性極冷惟雅州蒙頂出者温而主療疾李時珍本草服葳靈仙土茯苓者忌飲茶羣芳譜療治方氣虛頭痛用上春茶末調成膏置瓦盞内覆轉以巴豆四十粒作一次燒烟燻之曬乾乳細每服一匙别入好茶末食後煎服立効又赤白痢下以好茶一斤炙搗為末濃煎一二盞服久痢亦宜又二便不通好茶生芝蔴各一撮細嚼滚水冲下即通屢試立效如嚼不及擂爛滚水送下隨見録蘇文忠集載憲宗賜馬總治泄痢腹痛方以生薑和皮切碎如粟米用一大錢并草茶相等煎服元祐二年文潞公得此疾百藥不效服此方而愈續茶經卷下之二欽定四庫全書續茶經卷下之三候補主事陳廷燦撰七茶之事晉書温嶠表遣取供御之調條列真上茶千片茗三百大薄洛陽伽藍記王肅初入魏不食羊肉及酪漿等物常飯鯽魚羮渴飲茗汁京師士子道肅一飲一斗號為漏巵後數年髙祖見其食羊肉酪粥甚多謂肅曰羊肉何如魚羮茗飲何如酪漿肅對曰羊者是陸産之最魚者乃水族之長所好不同並各稱珍以味言之甚是優劣羊比齊魯大邦魚比邾莒小國唯茗不中與酪作奴髙祖大笑彭城王勰謂肅曰卿不重齊魯大邦而愛邾莒小國何也肅對曰鄉曲所羙不得不好彭城王復謂曰卿明日顧我為卿設邾莒之食亦有酪奴因此呼茗飲為酪奴時給事中劉縞慕肅之風専習茗飲彭城王謂縞曰卿不慕王侯八珍而好蒼頭水厄海上有逐臭之夫里内有學顰之婦以卿言之即是也葢彭城王家有吳奴故以此言戯之後梁武帝子西豐侯蕭正徳歸降時元乂欲為設茗先問卿於水厄多少正徳不曉乂意答曰下官生於水鄉而立身以來未遭陽侯之難元乂與舉坐之客皆笑焉海録碎事晉司徒長史王濛字仲祖好飲茶客至輒飲之士大夫甚以為苦毎欲候濛必云今日有水厄續捜神記桓宣武有一督將因時行病後虚熱更能飲複茗一斛二斗乃飽纔減升合便以為不足非復一日家貧後有客造之正遇其飲複茗亦先聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐狀似牛肚客乃令置之於盆中以一斛二斗複澆之此物噏之都盡而止覺小脹又増五升便悉混然從口中湧出既吐此物其病遂瘥或問之此何病客答云此病名斛二瘕潛確類書進士權紓文云隋文帝微時夢神人易其腦骨自爾腦痛不止後遇一僧曰山中有茗草煮而飲之當愈帝服之有效由是人競采啜因為之贊其畧曰窮春秋演河圖不如載茗一車唐書太和七年罷吳蜀冬貢茶太和九年王涯獻茶以涯為榷茶使茶之有税自涯始十二月諸道鹽鐵轉運榷茶使令孤楚奏榷茶不便於民從之陸龜蒙嗜茶置園顧渚山下嵗取租茶自判品第張又新為水説七種其二恵山泉三虎邱井六淞江水人助其好者雖百里為致之日登舟設篷席齎束書茶竈筆牀釣具往來江湖間俗人造門罕覯其面時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以髙士徴不至國史補故老云五十年前多患熱黄坊曲有專以烙黄為業者灞滻諸水中常有晝坐至暮者謂之浸黄近代悉無而病腰脚者多乃飲茶所致也韓晉公滉聞奉天之難以夾練囊盛茶末遣健歩以進黨魯使西番烹茶帳中番使問何為者魯曰滌煩消渴所謂茶也番使曰我亦有之取出以示曰此夀州者此顧渚者此蘄門者唐趙璘因話録陸羽有文學多奇思無一物不盡其妙茶術最著始造煎茶法至今鬻茶之家陶其像置煬突間祀為茶神云宜茶足利鞏縣為甆偶人號陸鴻漸買十茶器得一鴻漸市人沽茗不利輒灌注之復州一老僧是陸僧弟子常誦其六羡歌且有追感陸僧詩唐吳晦摭言鄭光業䇿試夜有同人突入吳語曰必先必先可相容否光業為輟半舖之地其人曰仗取一杓水更託煎一椀茶光業欣然為取水煎茶居二日光業狀元及第其人啓謝曰既煩取水更便煎茶當時不識貴人凡夫肉眼今日俄為後進窮相骨頭唐李義山雜纂富貴相𢷬藥碾茶聲唐馮贄烟花記建陽進茶油花子餅大小形製各别極可愛宫嬪縷金於面皆以淡粧以此花餅施於鬢上時號北苑粧唐玉泉子崔蠡知制誥丁太夫人憂居東都里第時尚苦節嗇四方寄遺茶藥而已不納金帛不異寒素顔魯公帖廿九日南寺通師設茶㑹咸來静坐離諸煩惱亦非無益足下此意語虞十一不可自外耳顔真卿頓首頓首開元遺事逸人王休居太白山下日與僧道異人往還每至冬時取溪氷敲其晶瑩者煮建茗共賔客飲之李鄴侯家𫝊皇孫奉節王好詩初煎茶加酥椒之類遺泌求詩泌戲賦云旋沫翻成碧玉池添酥散出琉璃眼奉節王即徳宗也中朝故事有人授舒州牧贊皇公徳裕謂之曰到彼郡日天柱峯茶可恵數角其人獻數十斤李不受明年罷郡用意精求獲數角投之李閲而受之曰此茶可以消酒食毒乃命烹一觥沃於肉食内以銀合閉之詰旦視其肉已化為水矣衆服其廣識段公路北户録前朝短書雜説呼茗為薄為夾又梁科律有薄茗千夾云云唐蘇鶚杜陽雜編唐徳宗毎賜同昌公主饌其茶有緑華紫英之號鳯翔退耕傳元和時館閣湯飲待學士者煎麒麟草温庭筠採茶録李約字存博汧公子也一生不近粉黛雅度簡逺有山林之致性嗜茶能自煎嘗謂人曰當使湯無妄沸庶可養茶始則魚目散布微微有聲中則四際泉湧纍纍若貫珠終則騰波鼓浪水氣全消此謂老湯三沸之法非活火不能成也客至不限甌數竟日爇火執持茶器弗倦曽奉使行至陜州硤石縣東愛其渠水清流旬日忘發南部新書杜豳公悰位極人臣富貴無比嘗與同列言平生不稱意有三其一為澧州刺史其二貶司農卿其三自西川移鎮廣陵舟次瞿塘為駭浪所驚左右呼喚不至渴甚自潑湯茶喫也大中三年東都進一僧年一百二十嵗宣皇問服何藥而致此僧對曰臣少也賤不知藥性本好茶至處惟茶是求或出日過百餘椀如常日亦不下四五十椀因賜茶五十斤令居保夀寺名飲茶所曰茶寮有胡生者失其名以釘鉸為業居霅溪而近白蘋洲去厥居十餘歩有古墳胡生毎瀹茗必奠酹之嘗夢一人謂之曰吾性栁平生善為詩而嗜茗及死塟室在子今居之側常銜子之恵無以為報欲教子為詩胡生辭以不能栁強之曰但率子言之當有致矣既寤試搆思果若有㝠助者厥後遂工焉時人謂之胡釘鉸詩栁當是栁惲也又一説列子終於鄭今墓在郊藪謂賢者之跡而或禁其樵牧焉里有胡生者性落魄家貧少為洗鏡鎪釘之業遇有甘果名茶羙醖輒祭於列御㓂之祠壟以求聰慧而思學道歴稔忽夢一人取刀劃其腹以一卷書置於心腑及覺而吟咏之意皆工羙之詞所得不由於師友也既成卷軸尚不棄於猥賤之業真隠者之風逺近號為胡釘鉸云張又新煎茶水記代宗朝李季卿刺湖州至維揚逢陸處士鴻漸李素熟陸名有傾蓋之歡因之赴郡泊揚子驛將食李曰陸君善於茶蓋天下聞名矣况揚子南零水又殊絶今者二妙千載一遇何曠之乎命軍士謹信者操舟挈瓶深詣南零陸利器以俟之俄水至陸以杓揚其水曰江則江矣非南零者似臨岸之水使曰某操舟深入見者累百敢虚紿乎陸不言既而傾諸盆至半陸遽止之又以杓揚之曰自此南零者矣使蹶然大駭伏罪曰某自南零齎至岸舟蕩覆半至懼其尠挹岸水増之處士之鑒神鑒也其敢隠乎李與賓從數十人皆大駭愕茶經本傳羽嗜茶著經三篇時鬻茶者至陶羽形置煬突間祀為茶神有常伯熊者因羽論復廣著茶之功御史大夫李季卿宣慰江南次臨淮知伯熊善煮茗召之伯熊執器前季卿為再舉杯其後尚茶成風金鑾宻記金鑾故例翰林當直學士春晚人困則日賜成象殿茶果梅妃傳唐明皇與梅妃鬭茶顧諸王戲曰此梅精也吹白玉笛作驚鴻舞一座光輝鬭茶今又勝吾矣妃應聲曰草木之戲悞勝陛下設使調和四海烹餁鼎鼐萬乘自有憲法賤妾何能較勝負也上大悦杜鴻漸送茶與楊祭酒書顧渚山中紫笋茶兩片一片上太夫人一片充昆弟同歠此物但恨帝未得嘗實所嘆息白孔六帖夀州刺史張鎰以餉錢百萬遺陸宣公贄公不受止受茶一串曰敢不承公之賜海録碎事鄧利云陸羽茶既為癖酒亦稱狂侯鯖録唐右補闕綦母焸音英博學有著述才性不飲茶嘗著伐茶飲序其畧曰釋滯消壅一日之利暫佳瘠氣耗精終身之累斯大獲益則歸功茶力貽患則不咎茶災豈非為福近易知為禍逺難見歟焸在集賢無何以熱疾暴終苕溪漁隠叢話義興貢茶非舊也李栖筠典是邦僧有獻佳茗陸羽以為冠於他境可薦於上栖筠從之始進萬兩合璧事類唐肅宗賜張志和奴婢各一人志和配為夫婦號漁童樵青漁童捧釣收綸蘆中鼓枻樵青蘇蘭薪桂竹裏煎茶萬花谷顧渚山茶記云山有鳥如鴝鵒而小蒼黄色毎至正二月作聲云春起也至三四月作聲云春去也採茶人呼為報春鳥董逌陸羽㸃茶圖跋竟陵大師積公嗜茶乆非漸兒煎奉不嚮口羽出遊江湖四五載師絶於茶味代宗召師入内供奉命宫人善茶者烹以餉師一啜而罷帝疑其詐令人私訪得羽召入翌日賜師齋密令羽煎茗遺之師捧甌喜動顔色且賞且啜一舉而盡上使問之師曰此茶有似漸兒所為者帝由是歎師知茶出羽見之蠻甌志白樂天方齋劉禹錫正病酒乃以菊苗虀蘆菔鮓餽樂天換取六斑茶以醒酒詩話皮光業字文通最躭茗飲中表請嘗新柑筵具甚豐簪紱叢集纔至未顧尊罍而呼茶甚急徑進一巨觥題詩曰未見甘心氏先迎苦口師衆噱云此師固清髙難以療饑也太平清話盧仝自號癖王陸龜蒙自號怪魁潛確類書唐錢起字仲文與趙莒為茶宴又嘗過長孫宅與朗上人作茶㑹俱有詩紀事湘烟録閔康侯曰羽著茶經為李季卿所慢更著毁茶論其名疾字季疵者言為季所疵也事詳傳中吳興掌故録長興啄木嶺唐時吳興昆陵二太守造茶修貢㑹宴於此上有境㑹亭故白居易有夜聞賈常州崔湖州茶山境㑹歡宴詩包衡清賞録唐文宗謂左右曰若不甲夜視事乙夜觀書何以為君嘗召學士於内庭論講經史較量文章宫人以下侍茶湯飲饌名勝志唐陸羽宅在上饒縣東五里羽本竟陵人初隠吳興苕溪自號桑苧翁後寓新城時又號東岡子刺史姚驥嘗詣其宅鑿沼為溟渤之狀積石為嵩華之形後隠士沈洪喬葺而居之饒州志陸羽茶竈在餘干縣冠山右峯羽嘗品越溪水為天下第二故思居禪寺鑿石為竈汲泉煮茶曰丹爐晉張氲作元大徳時總管常福生從方士􅊧爐下得藥二粒盛以金盒及歸開視失之續博物志物有異體而相制者翡翠屑金人氣粉犀北人以鍼敲氷南人以線解茶太平山川記茶葉寮五代時于履居之類林五代時魯公和凝字成績在朝率同列遞日以茶相飲味劣者有罰號為湯社浪樓雜記天成四年度支奏朝臣乞假省覲者欲量賜茶藥文班自左右常侍至侍郎宜各賜蜀茶三觔蠟面茶二觔武班官各有差馬令南唐書豐城毛炳好學家貧不能自給入廬山與諸生留講獲鏹即市酒盡醉時彭㑹好茶而炳好酒時人為之語曰彭生作賦茶三片毛氏傳詩酒半升十國春秋楚王馬殷世家開平二年六月判官髙郁請聴民售茶北客收其徴以贍軍從之秋七月王奏運茶河之南北以易繒纊戰馬仍嵗貢茶二十五萬觔詔可由是屬内民得自摘山造茶而收其筭嵗入萬計髙另置邸閣居茗號曰八牀主人荆南列傳文了吳僧也雅善烹茗擅絶一時武信王時來遊荆南延住紫雲禪院日試其藝王大加欣賞呼為湯神奏授華亭水大師人皆目為乳妖談苑茶之精者北苑名白乳頭江左有金䗶面李氏别命取其乳作片或號曰京挺的乳二十餘品又有研膏茶即龍品也釋文瑩玉壺清話黄夷簡雅有詩名在錢忠懿王俶幕中陪樽爼二十年開寳初太祖賜俶開吳鎮越崇文耀武功臣制誥俶遣夷簡入謝於朝歸而稱疾於安溪别業保身潛遁著山居詩有宿雨一番蔬甲嫩春山㡬焙茗旗香之句雅喜治宅咸平中歸朝為光禄寺少卿後以夀終焉五雜爼建人喜鬭茶故稱茗戰錢氏子弟取霅上𤓰各言其中子之的數剖之以觀勝負謂之𤓰戰然茗猶堪戰𤓰則俗矣潛確類書偽閩甘露堂前有茶樹兩株鬱茂婆娑宫人呼為清人樹毎春初嬪嬙戲於其下採摘新芽於堂中設傾筐㑹宋史紹興四年初命四川宣撫司支茶博馬舊賜大臣茶有龍鳯飾明徳太后曰此豈人臣可得命有司别製入香京挺以賜之宋史職官志茶庫掌茶江浙荆湖建劍茶茗以給翰林諸司賞賚出鬻宋史錢俶傳太平興國三年宴俶長春殿令劉鋹李煜預坐俶貢茶十萬斤建茶萬斤及銀絹等物甲申雜記仁宗朝春試進士集英殿后妃御太清樓觀之慈聖光獻出餅角以賜進士出七寳茶以賜考官玉海宋仁宗天聖三年幸南御庄觀刈麥遂幸玊津園燕羣臣聞民舍機杼賜織婦茶綵陶榖清異録有得建州茶膏取作耐重兒八枚膠以金縷獻於閩王曦遇通文之禍為内侍所盗轉遺貴人苻昭逺不喜茶嘗為同列御史㑹茶嘆曰此物面目嚴冷了無和羙之態可謂冷面草也孫樵送茶與焦刑部書云晚甘侯十五人遣侍齋閣此徒皆乘雷而摘拜水而和蓋建陽丹山碧水之鄉月澗雲龕之品慎勿賤用之湯悦有森伯頌葢名茶也方飲而森然嚴乎齒牙既乆而四肢森然二義一名非熟乎湯甌境界者誰能目之吳僧梵川誓願燃頂供養雙林𫝊大士自往蒙頂山結庵種茶凡三年味方全羙得絶佳者曰聖楊花吉祥蘂共不逾五觔持歸供獻宣城何子華邀客於剖金堂酒半出嘉陽嚴峻所畫陸羽像懸之子華因言前代惑駿逸者為馬癖泥貫索者為錢癖愛子者有譽兒癖躭書者有左𫝊癖若此叟溺於茗事何以名其癖楊粹仲曰茶雖珍未離草也宜追目陸氏為甘草癖一座稱佳類苑學士陶榖得黨太尉家姬取雪水烹團茶以飲謂姬曰黨家應不識此姬曰彼麄人安得有此但能於銷金帳中淺斟低唱飲羊膏兒酒耳陶深愧其言胡嶠飛龍澗飲茶詩云沾牙舊姓餘甘氏破睡當封不夜侯陶榖愛其新奇令猶子彛和之彛應聲云生凉好喚雞蘇佛回味宜稱橄欖仙彛時年十二亦文詞之有基址者也延福宫曲宴記宣和二年十二月癸巳召宰執親王學士曲宴於延福宫命近侍取茶具親手注湯擊拂少頃白乳浮盞面如踈星淡月顧諸臣曰此自烹茶飲畢皆頓首謝宋朝紀事洪邁選成唐詩萬首絶句表進夀皇宣諭閣學選擇甚精備見博洽賜茶一百銙清馥香一十貼薫香二十貼金器一百兩乾淳嵗時紀仲春上旬福建漕司進第一綱茶名北苑試新方寸小銙進御止百夸䕶以黄羅輭盝藉以青篛裹以黄羅夾複臣封朱印外用朱漆小匣鍍金鎻又以細竹絲織笈貯之凡數重此乃雀舌水芽所造一銙之值四十萬僅可供數甌之啜爾或以一二賜外邸則以生線分解轉遺好事以為奇玩南渡典儀車駕幸學講書官講訖御藥𫝊㫖宣坐賜茶凡駕出儀衛有茶酒班殿侍兩行各三十一人司馬光日記初除學士待詔李堯卿宣召稱有勅口宣畢再拜升階與待詔坐啜茶蓋中朝舊典也歐陽脩龍茶録後序皇祐中修起居注奏事仁宗皇帝屢承天問以建安貢茶併所以試茶之狀諭臣論茶之舛謬臣追念先帝顧遇之恩覽本流涕輒加正定書之於石以永其傳隨手雜録子瞻在杭時一日中使至密謂子瞻曰某出京師辭官家官家曰辭了娘娘來某辭太后殿復到官家處引某至一櫃子旁出此一角密語曰賜與蘇軾不得令人知遂出所賜乃茶一觔封題皆御筆子瞻具劄附進稱謝潘中散适為處州守一日作醮其茶百二十盞皆乳花内一盞如墨詰之則酌酒人誤酌茶中潘焚香再拜謝過即成乳花僚吏皆驚嘆石林燕語故事建州嵗貢大龍鳯團茶各二觔以八餅為觔仁宗時蔡君謨知建州始别擇茶之精者為小龍團十觔以獻觔為十餅仁宗以非故事命劾之大臣為請因留而免劾然自是遂為嵗額熈寧中賈清為福建運使又取小團之精者為密雲龍以二十餅為觔而雙袋謂之雙角團茶大小團袋皆用緋通以為賜也密雲龍獨用黄蓋專以奉玉食其後又有瑞雲翔龍者宣和後團茶不復貴皆以為賜亦不復如向日之精後取其精者為銙茶嵗賜者不同不可勝紀矣春渚記聞東坡先生一日與魯直文潛諸人㑹飯既食骨䭔兒血羮客有須薄茶者因就取所碾龍團徧啜坐客或曰使龍茶能言當須稱屈魏了翁先茶記眉山李君鏗為臨卭茶官吏以故事三日謁先茶君詰其故則曰是韓氏而王號相傳為然實未嘗請命於朝也君曰飲食皆有先而况茶之為利不惟民生食用之所資亦馬政邊防之攸賴是之弗圖非忘本乎於是撤舊祠而増廣焉且請於郡上神之功狀於朝宣賜榮號以侈神賜而馳書於靖命記成役拊掌録宋自崇寧後復榷茶法制日嚴私販者固已抵罪而商賈官劵清納有限道路有程纎悉不如令則被擊斷或没貨出告昏愚者往往不免其儕乃目茶籠為草大虫言傷人如虎也苕溪漁隠叢話歐公和劉原父揚州時㑹堂絶句云積雪猶封蒙頂樹驚雷未發建溪春中州地煖萌芽早入貢宜先百物新注時㑹堂造貢茶所也余以陸羽茶經考之不言揚州出茶惟毛文錫茶譜云揚州禪智寺隋之故宫寺傍蜀岡其茶甘香味如蒙頂焉苐不知入貢之因起何時也盧溪詩話雙井老人以青沙蠟紙裹細茶寄人不過二兩青𤨏詩話大丞相李公昉嘗言唐時目外鎮為麤官有學士貽外鎮茶有詩謝云麄官乞與真虚擲頼有詩情合得嘗外鎮即薛能也玉堂雜記淳熈丁酉十一月壬寅必大輪當内直上曰卿想不甚飲比賜宴時見卿面赤賜小春茶二十銙葉世英墨五團以代賜酒陳師道後山叢談張忠定公令崇陽民以茶為業公曰茶利厚官將取之不若早自異也命拔茶而植桑民以為苦其後榷茶他縣皆失業而崇陽之桑皆已成其為絹而北者嵗百萬疋矣又見名臣言行録文正李公既薨夫人誕日宋宣獻公時為侍從公與其僚二十餘人詣第上夀拜於簾下宣獻前曰太夫人不飲以茶為夀探懐出之注湯以獻復拜而去張芸叟畫墁録有唐茶品以陽羡為上供建溪北苑未著也貞元中常衮為建州刺史始蒸焙而研之謂研膏茶其後稍為餅樣而穴其中故謂之一串陸羽所烹惟是草茗爾迨本朝建溪獨盛採焙製作前世所未有也士大夫珍尚鑒别亦過古先丁晉公為福建轉運使始製為鳯團後為龍團貢不過四十餅專擬上供即近臣之家徒聞之而未嘗見也天聖中又為小團其品逈嘉於大團賜兩府然止於一觔惟上大齋宿兩府八人共賜小團一餅縷之以金八人析歸以侈非常之賜親知瞻玩賡唱以詩故歐陽永叔有龍茶小録或以大團賜者輒刲方寸以供佛供仙奉家廟已而奉親并待客享子弟之用熈寧末神宗有㫖建州製密雲龍其品又加於小團自密雲龍出則二團少粗以不能兩好也予元祐中詳定殿試是年分為制舉考第各蒙賜三餅然親知誅責殆將不勝熙寧中蘇子容使北姚麟為副曰盍載些小團茶乎子容曰此乃供上之物疇敢與北人未㡬有貴公子使北廣貯圑茶以往自爾北人非團茶不納也非小圑不貴也彼以二圑易蕃羅一疋此以一羅酬四圑少不滿意即形言語近有貴貂守邊以大圑為常供密雲龍為好茶云鶴林玉露嶺南人以檳榔代茶彭乘墨客揮犀蔡君謨議茶者莫敢對公發言建茶所以名重天下由公也後公製小團其品尤精於大圑一日福唐蔡葉丞秘教召公啜小圑坐乆復有一客至公啜而味之曰此非獨小團必有大圑雜之丞驚呼童詰之對曰本碾造二人茶繼有一客至造不及即以大團兼之丞神服公之明審王荆公為小學士時嘗訪君謨君謨聞公至喜甚自取絶品茶親滌器烹㸃以待公冀公稱賞公於夾袋中取消風散一撮投茶甌中併食之君謨失色公徐曰大好茶味君謨大笑且歎公之真率也魯應龍閑忩括異志當湖徳藏寺有水陸齋壇往嵗富民沈忠建毎設齋施主䖍誠則茶現瑞花故花儼然可睹亦一異也周輝清波雜志先人嘗從張晉彦覔茶張答以二小詩云内家新賜密雲龍只到調元六七公頼有山家供小草猶堪詩老薦春風仇池詩裏識焦坑風味官焙可抗衡鑽餘權倖亦及我十輩遣前公試烹詩總得偶病此詩俾其子代書後誤刋於湖集中焦坑産庾嶺下味苦硬乆方囬甘如浮石已乾霜後水焦坑新試雨前茶東坡南還囬至章貢顯聖寺詩也後屢得之初非精品特彼人自以為重包裹鑽權倖亦豈能望建溪之勝東京夢華録舊曹門街北山子茶坊内有仙洞仙橋士女往往夜遊吃茶於彼五色線騎火茶不在火前不在火後故也清明改火故曰騎火茶夢溪筆談王城東素所厚惟楊大年公有一茶囊唯大年至則取茶囊具茶他客莫與也華夷花木考宋二帝北狩到一寺中有二石金剛並拱手而立神像髙大首觸桁棟别無供器止有石盂香爐而已有一胡僧出入其中僧揖坐問何來帝以南來對僧呼童子㸃茶以進茶味甚香羙再欲索飲胡僧與童子趨堂後而去移時不出入内求之寂然空舍惟竹林間有一小室中有石刻胡僧像並二童子侍立視之儼然如獻茶者馬永卿懶真子録王元道嘗言陜西子仙姑𫝊云得道術能不食年約三十許不知其實年也陜西提刑陽翟李熙民逸老正直剛毅人也聞人所傳甚異乃往青平軍自騐之既見道貌髙古不覺心服因曰欲獻茶一盃可乎姑曰不食茶乆矣今勉強一啜既食少頃埀兩手出玉雪如也須臾所食之茶從十指甲出凝於地色猶不變逸老令就地刮取且使嘗之香味如故因大奇之朱子文集與志南上人書偶得安樂茶分上廿缾陸放翁集同何元立蔡肩吾至丁東院汲泉煮茶詩云雲芽近自峩眉得不減紅囊顧渚春旋置風爐清樾下他年奇事屬三人周必大集送陸務觀赴七閩提舉常平茶事詩云暮年桑苧毁茶經應為征行不到閩今有雲孫持使節好因貢焙祀茶人梅堯臣集晏成續太祝遺雙井茶五品茶具四枚近詩六十篇因賦詩為謝黄山谷集有博士王揚休碾密雲龍同事十三人飲之戲作晁補之集和答曽敬之秘書見招能賦堂烹茶詩一盌分來百越春玉溪小暑却宜人紅塵他日同囬首能賦堂中偶坐身蘇東坡集送周朝議守漢川詩云茶為西南病甿俗記二李何人折其鋒矯矯六君子注二李杞與稷也六君子謂師道與姪正儒張永徽吳醇翁吕元鈞宋文輔也蓋是時蜀茶病民二李乃始敝之人而六君子能持正論者也僕在黄州參寥自吳中來訪館之東坡一日夢見參寥所作詩覺而記其兩句云寒食清明都過了石泉槐火一時新後七年僕出守錢塘而參寥始卜居西湖智果寺院院有泉出石縫間甘冷宜茶寒食之明日僕與客汎湖自孤山來謁參寥汲泉鑽火烹黄蘗茶忽悟所夢詩兆於七年之前衆客皆驚歎知𫝊記所載非虚語也東坡物類相感志芽茶得鹽不苦而甜又云喫茶多腹脹以醋解之又云陳茶燒烟蠅速去楊誠齋集謝傅尚書送茶逺餉新茗當自携大瓢走汲溪泉束澗底之散薪然折脚之石鼎烹玉塵啜香乳以享天上故人之恵愧無胸中之書傳但一味攪破菜園耳鄭景龍續宋百家詩本朝孫志舉有訪王主簿同泛菊茶詩吕元中豐樂泉記歐陽公既得釀泉一日㑹客有以新茶獻者公勅汲泉瀹之汲者道仆覆水偽汲他泉代公知其非釀泉詰之乃得是泉於幽谷山下因名豐樂泉侯鯖録黄魯直云爛蒸同州羊沃以杏酪食之以七不以筯抹南京麫作槐葉冷淘糝以襄邑熟猪肉炊共城香稻用吳人鱠松江之鱸既飽以康山谷簾泉烹曽坑鬭品少焉卧北忩下使人誦東坡赤壁前後賦亦足少快又見蘇長公外紀蘇舜欽傳有興則泛小舟出盤閶二門吟嘯覽古渚茶野釀足以消憂過庭録劉貢父知長安妓有茶嬌者以色慧稱貢父惑之事𫝊一時貢父被召至闕歐陽永叔去城四十五里迓之貢父以酒病未起永叔戲之曰非獨酒能病人茶亦能病人多矣合璧事類覺林寺僧志崇製茶有三等待客以驚雷莢自奉以萱草帶供佛以紫茸香凡赴茶者輒以油囊盛餘瀝江南有驛官以幹事自任白太守曰驛中已理請一閲之刺史乃往初至一室為酒庫諸醖皆熟其外懸一畫神問何也曰杜康刺史曰公有餘也又至一室為茶庫諸茗畢備復懸畫神問何也曰陸鴻漸刺史益喜又至一室為葅庫諸爼咸具亦有畫神問何也曰蔡伯喈刺史大笑曰不必置此江浙間養蠶皆以鹽藏其繭而繰絲恐蠶蛾之生也每繰畢即煎茶葉為汁搗米粉搜之篩於茶汁中煮為粥謂之洗􅣙粥聚族以啜之謂益明年之蠶經鉏堂雜志松聲澗聲禽聲夜蟲聲鶴聲琴聲棋聲落子聲雨滴堦聲雪灑忩聲煎茶聲皆聲之至清者松漠紀聞燕京茶肆設雙陸局如南人茶肆中置碁具也夢梁録茶肆列花架安頓竒松異檜等物於其上裝飾店面敲打響盞又冬月添賣七寳擂茶饊子葱茶茶肆樓上專安着妓女名曰花茶坊南宋市肆記平康歌館凡初登門有提瓶獻茗者雖杯茶亦犒數千謂之㸃花茶諸處茶肆有清樂茶坊八仙茶坊珠子茶坊潘家茶坊連三茶坊連二茶坊等名謝府有酒名勝茶宋都城紀勝大茶坊皆掛名人書畫人情茶坊本以茶湯為正水茶坊乃娼家聊設菓凳以茶為由後生輩甘於費錢謂之乾茶錢又有提茶瓶及齪茶名色臆乘楊􅃷之作洛陽伽藍記日食有酪奴蓋指茶為酪粥之奴也瑯環記昔有客遇茅君時當大暑茅君於手巾内解茶葉人興一葉客食之五内清凉茅君曰此蓬萊穆陀樹葉衆仙食之以當飲又有寳文之蘂食之不饑故謝幼貞詩云摘寳文之初蕊拾穆陀之墜葉楊南峯手鏡載宋時姑蘇女子沈清友有續鮑令暉香茗賦孫月峯坡仙食飲録密雲龍茶極為甘馨宋寥正一字明畧晚登蘇門子瞻大奇之時黄秦鼂張號蘇門四學士子瞻待之厚毎至必令侍妾朝雲取密雲龍烹以飲之一日又命取密雲龍家人謂是四學士窺之乃明畧也山谷詩有矞聿雲龍亦茶名嘉禾志煮茶亭在秀水縣西南湖中景徳寺之東禪堂宋學士蘇軾與文長老嘗三過湖上汲水煮茶後人因建亭以識其勝今遺址尚存名勝志茶仙亭在滁州瑯琊山宋時寺僧為刺史曽肇建蓋取杜牧池州茶山病不飲酒詩誰知病太守猶得作茶仙之句子開詩云山僧獨好事為我結茒茨茶仙榜草聖頗宗樊川詩蓋紹聖二年肇知是州也陳眉公珍珠船蔡君謨謂范文正曰公採茶歌云黄金碾畔緑塵飛碧玉甌中翠濤起今茶絶品其色甚白翠緑乃下者耳欲改為玉塵飛素濤起如何希文曰善又蔡君謨嗜茶老病不能飲但把玩而已潛確類書宋紹興中少卿曺戩之母喜茗飲山初無井戩乃齋戒祝天斵地纔尺而清泉溢湧因名孝感泉大理徐恪建人也見貽鄉信鋌子茶茶面印文曰玉蟬膏一種曰清風使蔡君謨善别茶建安能仁院有茶生石縫間蓋精品也寺僧採造得八餅號石巖白以四餅遺君謨以四餅密遣人走京師遺王内翰禹玉嵗餘君謨被召還闕過訪禹玉禹玉命子弟於茶筒中選精品碾以待蔡蔡捧甌未嘗輒曰此極似能仁寺石巖白公何以得之禹玉未信索帖騐之乃服月令廣義蜀之雅州名山縣蒙山有五峯峯頂有茶園中頂最髙處曰上清峯産甘露茶昔有僧病冷且久嘗遇老父詢其病僧具告之父曰何不飲茶僧曰本以茶冷豈能止乎父曰是非常茶仙家有所謂雷鳴者而亦聞乎僧曰未也父曰蒙之中頂有茶當以春分前後多搆人力俟雷之發聲併手採摘以多為貴至三日乃止若獲一兩以本處水煎服能袪宿疾服二兩終身無病服三兩可以換骨服四兩即為地仙但精潔治之無不效者僧因之中頂築室以俟及期獲一兩餘服未竟而病瘥惜不能久住博求而精健至八十餘嵗氣力不衰時到城市觀其貌若年三十餘者眉髮紺緑後入青城山不知所終今四頂茶園不廢惟中頂草木繁茂重雲積霧蔽虧日月鷙獸時出人跡罕到矣太平清話張文規以吳興白苧白蘋洲明月峽中茶為三絶文規好學有文藻蘇子由孔武仲何正臣諸公皆與之游夏茂卿茶董劉煜字子儀嘗與劉筠飲茶問左右湯滚也未衆曰已滚筠云僉曰鯀哉煜應聲曰吾與㸃也黄魯直以小龍團半鋌題詩贈晁無咎有云曲几蒲團聴煮湯煎成車聲繞羊腸雞蘇胡麻留渴羗不應亂我官焙香東坡見之曰黄九恁地怎得不窮陳詩教灌園史杭妓周韶有詩名好蓄竒茗嘗與蔡公君謨鬭勝題品風味君謨屈焉江參字貫道江南人形貌清癯嗜香茶以為生博學彚書司馬温公與子瞻論茶墨云茶與墨二者正相反茶欲白墨欲黑茶欲重墨欲輕茶欲新墨欲陳蘇曰上茶妙墨俱香是其徳同也皆堅是其操同也公嘆以為然元耶律楚材詩在西域作茶㑹值雪有髙人恵我嶺南茶爛賞飛花雪没車之句雲林遺事光福徐達左搆養賢樓於鄧尉山中一時名士多集於此元鎮為尤數焉嘗使童子入山擔七寳泉以前桶煎茶以後桶濯足人不解其意或問之曰前者無觸故用煎茶後者或為泄氣所穢故以為濯足之用其潔癖如此陳繼儒妮古録至正辛丑九月三日與陳徴君同宿愚菴師房焚香煮茗圖石梁秋瀑翛然有出塵之趣黄鶴山人王蒙題畫周叙遊嵩山記見㑹善寺中有元雪菴頭陀茶榜石刻字徑三寸遒偉可觀鍾嗣成録鬼簿王實甫有蘇小郎夜月販茶船傳竒吳興掌故録明太祖喜顧渚茶定制嵗貢止三十二觔於清明前二日縣官親詣採茶進南京奉先殿焚香而已未嘗别有上供七脩彚藁明洪武二十四年詔天下産茶之地嵗有定額以建寧為上聴茶户採進勿預有司茶名有四探春先春次春紫筍不得碾揉為大小龍團楊維楨煮茶夢記鐵崖道人卧石牀移二更月微明及紙帳梅影亦及半忩鶴孤立不鳴命小芸童汲白蓮泉燃槁湘竹授以凌霄芽為飲供乃遊心太虚恍兮入夢陸樹聲茶寮記園居敞小寮於嘯軒埤垣之西中設茶竈凡瓢汲罌注濯拂之具咸庀擇一人稍通茗事者主之一人佐炊汲客至則茶烟隠隠起竹外其禪客過從予者與余相對結跏趺坐啜茗汁舉無生話時杪秋既望適園無諍居士與五臺僧演鎮終南僧明亮同試天池茶於茶寮中漫記墨娥小録千里茶細茶一兩五錢孩兒茶一兩柿霜一兩粉草末六錢薄荷葉三錢右為細末調勻煉蜜丸如白豆大可以代茶便於行逺湯臨川題飲茶録陶學士謂湯者茶之司命此言最得三昧馮祭酒精於茶政手自料滌然後飲客客有笑者余戲解之云此正如羙人又如古法書名畫度可着俗漢手否陸釴病逸漫記東宫出講必使左右迎請講官講畢則語東宫官云先生吃茶玉堂叢語愧齋陳公性寛坦在翰林時夫人嘗試之㑹客至公呼茶夫人曰未煮公曰也罷又呼曰乾茶夫人曰未買公曰也罷客為捧腹時號陳也罷沈周客坐新聞吳僧大機所居古屋三四間潔淨不容唾善瀹茗有古井清冽為稱客至出一甌為供飲之有滌腸湔胃之爽先公與交甚乆亦嗜茶每入城必至其所沈周書岕茶别論後自古名山留以待羈人遷客而茶以資髙士蓋造物有深意而周慶叔者為岕茶别論以行之天下度銅山金穴中無此福又恐仰屠門而大嚼者未必領此味慶叔隠居長興所至載茶具邀余素鷗黄葉間共相欣賞恨鴻漸君謨不見慶叔耳為之覆茶三嘆馮夢禎快雪堂漫録李于鱗為吾浙按察副使徐子與以岕茶之最精餉之比看子與於昭慶寺問及則已賞皁役矣蓋岕茶葉大梗多于鱗北士不遇宜也紀之以發一笑閔元衡玉壺氷良宵燕坐篝燈煮茗萬籟俱寂疏鐘時聞當此情景對簡編而忘疲徹衾枕而不御一樂也甌江逸志永嘉嵗進茶芽十觔樂清茶芽五觔瑞安平陽嵗進亦如之雁山五珍龍湫茶觀音竹金星草山樂官香魚也茶即明茶紫色而香者名𤣥茶其味皆似天池而稍薄王世懋二酉委譚余性不耐􅃣帶暑月尤甚豫章天氣蚤熱而今嵗尤甚春三月十七日觴客於滕王閣日出如火流汗接踵頭涔涔㡬不知所措歸而煩悶婦為具湯沭便科頭裸身赴之時西山雲霧新茗初至張右伯適以見遺茶色白大作荳子香㡬與虎邱埓余時浴出露坐明月下亟命侍兒汲新水烹嘗之覺沆瀣入咽兩腋風生念此境味都非宦路所有琳泉蔡先生老而嗜茶尤甚於余時已就寢不可邀之共啜晨起復烹遺之然已作第二義矣追憶夜來風味書一通以贈先生湧幢小品王璡昌邑人洪武初為寧波知府有給事來謁具茶給事為客居間公大呼撤去給事慚而退因號撤茶太守臨安志棲霞洞内有水洞深不可測水極甘冽魏公嘗調以瀹茗西湖志餘杭州先年有酒館而無茶坊然富家燕㑹猶有專供茶事之人謂之茶博士潘子真詩話葉濤詩極不工而喜賦咏嘗有試茶詩云碾成天上龍兼鳯煮出人間􅈉與蝦好事者戯云此非試茶乃碾玉匠人嘗南食也董其昌容臺集蔡忠恵公進小團茶至為蘇文忠公所譏謂與錢思公進姚黄花同失士氣然宋時君臣之際情意藹然猶見於此且君謨未嘗以貢茶干寵第㸃綴太平世界一段清事而已東坡書歐陽公滁州二記知其不肯書茶録余以蘇法書之為公懴悔否則蟄龍詩句㡬臨湯火有何罪過凡持論不大逺人情可也金陵春卿署中時有以松蘿茗相貽者平平耳歸來山館得啜尤物詢知為閔汶水所蓄汶水家在金陵與余相及海上之鷗舞而不下葢知希為貴鮮遊大人者昔陸羽以精茗事為貴人所侮作毁茶論如汶水者知其終不作此論矣李日華六研齋筆記攝山棲霞寺有茶坪茶生榛莽中非經人剪植者唐陸羽入山采之皇甫冉作詩送之紫桃軒雜綴泰山無茶茗山中人摘青桐芽㸃飲號女兒茶又有松苔極饒奇韻鍾伯敬集茶訊詩云猶得年年一度行嗣音幸借采茶名伯敬與徐波元歎交厚吳楚風烟相隔數千里以買茶為名一年通一訊遂成佳話謂之茶訊嘗見茶供説云婁江逸人朱汝圭精於茶事將以茶隠欲求為之記愿嵗嵗採渚山青芽為余作供余觀楞嚴壇中設供取白牛乳砂糖純蜜之類西方沙門婆羅門以葡萄甘蔗漿為上供未有以茶供者鴻漸長於苾蒭者也杼山禪伯也而鴻漸茶經杼山茶歌俱不云供佛西土以貫花燃香供佛不以茶供斯亦供養之缺典也汝圭益精心治辦茶事金芽素瓷清淨供佛他生受報往生香國以諸妙香而作佛事豈但如丹丘羽人飲茶生羽翼而已哉余不敢當汝圭之茶供請以茶供佛後之精於茶道者以採茶供佛為佛事則自余之諗汝圭始爰作茶供説以贈五燈㑹元摩突羅國有一青林枝葉茂盛地名曰優留茶僧問如寳禪師曰如何是和尚家風師曰飯後三碗茶僧問谷泉禪師曰未審客來如何祗待師曰雲門胡餅趙州茶淵鑒類函鄭愚茶詩嫩芽香且靈吾謂草中英夜臼和煙搗寒爐對雪烹因謂茶曰草中英素馨花曰禆茗陳白沙素馨記以其能少禆於茗耳一名那悉茗花佩文韻府元好問詩注唐人以茶為小女羙稱黔南行紀陸羽茶經紀黄牛峽茶可飲因令舟人求之有媪賣新茶一籠與草葉無異山中無好事者故耳初余在峽州問士大夫黄陵茶皆云觕澀不可飲試問小吏云唯僧茶味善令求之得十餅價甚平也擕至黄牛峽置風爐清樾間身自候湯手㧫得味既以享黄牛神且酌元明堯夫云不減江南茶味也乃知夷陵士大夫以貌取之耳九華山録至化城寺謁金地藏㙮僧祖瑛獻土産茶味可敵北苑馮時可茶録松郡佘山亦有茶與天池無異顧採造不如近有比邱來以虎邱法製之味與松蘿等老衲亟逐之曰毋為此山開羶徑而置火坑冒巢民岕茶彚鈔憶四十七年前有吴人柯姓者熟於陽羡茶山毎桐初露白之際為余入岕篛籠携來十餘種其最精妙者不過斤許數兩耳味老香深具芝蘭金石之性十五年以為恒後宛姬從吳門歸余則岕片必需半塘顧子兼黄熟香必金平叔茶香雙妙更入精微然顧金茶香之供毎嵗必先虞山栁夫人吾邑隴西之舊姬與余共宛姬而後他及金沙于象明携岕茶來絶妙金沙之于精鑒賞甲於江南而岕山之棋盤頂乆歸于家毎嵗其尊人必躬往採製今夏㩦來廟後棋頂漲沙本山諸種各有差等然道地之極真極妙二十年所無又辨水候火與手自洗烹之細潔使茶之色香性情從文人之奇嗜異好一一淋漓而出誠如丹丘羽人所謂飲茶生羽翼者真衰年稱心樂事也吳門七十四老人朱汝圭㩦茶過訪與象明頗同多花香一種汝圭之嗜茶自㓜如世人之結齋於胎年十四入岕迄今春夏不渝者百二十番奪食色以好之有子孫為名諸生老不受其養謂不嗜茶為不似阿翁毎竦骨入山卧遊虎虺負籠入肆嘯傲甌香晨夕滌甆洗葉啜弄無休指爪齒頰與語言激揚讚頌之津津恒有喜神妙氣與茶相長養真奇癖也嶺南雜記潮州燈節飾姣童為採茶女毎隊十二人或八人手挈花籃迭進而歌俯仰抑揚備極妖妍又以少長者二人為隊首擎綵燈綴以扶桑茉莉諸花采女進退作止皆視隊首至各衙門或巨室唱歌賚以銀錢酒果自十三夕起至十八夕而止余録其歌數首頗有前溪子夜之遺郎瑛七修類稿歙人閔汶水居桃葉渡上予往品茶其家見其水火皆自任以小酒盞酌客頗極烹飲態正如徳山擔青龍鈔髙自矜許而已不足異也秣陵好事者嘗誚閩無茶謂閩客得閩茶咸製為羅囊佩而嗅之以代㫋檀實則閩不重汶水也閩客游秣陵者宋比玉洪仲章輩類依附吳兒強作解事賤家雞而貴野鶩宜為其所誚歟三山薛老亦秦淮汶水也薛嘗言汶水假他味作蘭香究使茶之真味盡失汶水而在聞此亦當色沮薛嘗住屴崱自為剪焙遂欲駕汶水上余謂茶難以香名况以蘭定茶乃咫尺見也頗以薛老論為善延邵人呼製茶人為碧豎富沙陷後碧豎盡在緑林中矣蔡忠恵茶録石刻在甌寧邑庠壁間予五年前搨數紙寄所知今漫漶不如前矣閩酒數郡如一茶亦類是今年予得茶甚夥學坡公義酒事盡合為一然與未合無異也李仙根安南雜記交趾稱其貴人曰翁茶翁茶者大官也虎邱茶經補注徐天全自金齒謫囬毎春末夏初入虎邱開茶社羅光璽作虎邱茶記嘲山僧有替身茶吳匏菴與沈石田遊虎邱采茶手煎對啜自言有茶癖漁洋詩話林確齋者亡其名江右人居冠石率子孫種茶躬親畚􅓩負擔夜則課讀毛詩離騷過冠石者見三四少年頭着一幅布赤脚揮鋤琅然歌出金石竊嘆以為古圖畫中人尤西堂集有戲册茶為不夜侯制朱彛尊日下舊聞上已後三日新茶從馬上至至之日宫價五十金外價二三十金不一二日即二三金矣見北京嵗華記曝書亭集錫山聴松菴僧性海製竹火爐王舍人過而愛之為作山水横幅并題以詩嵗乆爐壊盛太常因而更製流傳都下羣公多為吟咏顧梁汾典籍仿其遺式製爐及來京師成容若侍衛以舊圖贈之丙寅之秋梁汾㩦爐及卷過余海波寺寓適姜西溟周青士孫愷似三子亦至坐青藤下燒爐試武夷茶相與聨句成四十韻用書於册以示好事之君子蔡方炳増訂廣輿記湖廣長沙府攸縣古蹟有茶王城即漢茶陵城也葛萬里清異録倪元鎮飲茶用果按者名清泉白石非佳客不供有客請見命進此茶客渴再及而盡倪意大悔放盞入内黄周星九烟夢讀採茶賦只記一句云施凌雲以翠歩别號録宋曽機吾甫别號茶山明許應元子春别號茗山隨見録武夷五曲朱文公書院内有茶一株葉有臭蟲氣及焙製出時香逾他樹名曰臭葉香茶又有老樹數株云係文公手值名曰宋樹補西湖遊覽志立夏之日人家各烹新茗配以諸色細果餽送親戚比隣謂之七家茶南屏謙師妙於茶事自云得心應手非可以言𫝊學到者劉士亨有謝璘上人恵桂花茶詩云金粟金芽出焙篝鶴邊小試兎絲甌葉含雷信三春雨花帶天香八月秋味羙絶勝陽羡種神清如在廣寒遊玉川句好無才續我欲逃禪問趙州李世熊寒支集新城之山有異鳥其音若簫遂名曰簫曲山山産佳茗亦名簫曲茶因作歌紀事禪元顯教編徐道人居廬山天池寺不食者九年矣畜一墨羽鶴嘗採山中新茗令鶴銜松枝烹之遇道流輒相與飲㡬椀張鵬翀抑齋集有御賜鄭宅茶賦云青雲幸接於後塵白日捧歸乎深殿從容歩緩膏芬齊出螭頭肅穆神凝乳滴將開蠟面用以濡毫可嫓文章之草將之比徳勉為精白之臣續茶經巻下之三欽定四庫全書續茶經卷下之四候補主事陳廷燦撰八茶之出國史補風俗貴茶其名品益衆南劍有蒙頂石花或小方散芽號為第一湖州顧渚之紫筍東川有神泉小團緑昌明獸目峽州有小江園碧澗寮明月房茱萸寮福州有栢巖方山露芽婺州有東白舉巖碧貌建安有青鳯髄䕫州有香山江陵有楠木湖南有衡山睦州有鳩坑洪州有西山之白露夀州有霍山之黄芽綿州之松嶺雅州之露芽南康之雲居彭州之仙崖石花渠江之薄片卭州之火井思安黔陽之都濡髙株瀘川之納溪梅嶺義興之陽羡春池陽鳯嶺皆品第之最著者也文獻通考片茶之出於建州者有龍鳯石乳的乳白乳頭金蠟面頭骨次骨末骨麄骨山挺十二等以充嵗貢及邦國之用洎本路食茶餘州片茶有進寳雙勝寳山兩府出興國軍仙芝嫩蕊福合禄合運合脂合出饒池州泥片出䖍州緑英金片出袁州玉津出臨江軍靈川出福州先春早春華英來泉勝金出歙州獨行靈草緑芽片金金茗出潭州大拓枕出江陵大小巴陵開勝開棬小棬生黄翎毛出岳州雙上緑牙大小方出岳辰澧州東首淺山薄側出光州總二十六名其兩浙及宣江鼎州止以上中下或第一至第五為號其散茶則有太湖龍溪次號末號出淮南岳麓草子楊樹雨前雨後出荆湖清口出歸州茗子出江南總十一名葉夢得避暑録話北苑茶正所産為曽坑謂之正焙非曽坑為沙溪謂之外焙二地相去不逺而茶種懸絶沙溪色白過於曽坑但味短而微澀識者一啜如别涇渭也余始疑地氣土宜不應頓異如此及來山中毎開闢徑路刳治巖竇有尋丈之間土色各殊肥瘠𦂳緩燥潤亦從而不同並植兩木於數歩之間封培灌溉畧等而生死豐悴如二物者然後知事不經見不可必信也草茶極品惟雙井顧渚亦不過各有數畝雙井在分寧縣其地屬黄氏魯直家也元祐間魯直力推賞於京師族人交致之然嵗僅得一二觔爾顧渚在長興縣所謂吉祥寺也其半為今劉侍郎希范家所有兩地所産嵗亦止五六觔近嵗寺僧求之者多不暇精擇不及劉氏逺甚余嵗求於劉氏過半觔則不復佳蓋茶味雖均其精者在嫩芽取其初萌如雀舌者謂之槍稍敷而為葉者謂之旗旗非所貴不得已取一槍一旗猶可過是則老矣此所以為難得也歸田録臘茶出於劍建草茶盛於兩浙兩浙之品日注為第一自景祐以後洪州雙井白芽漸盛近嵗製作尤精囊以紅紗不過一二兩以常茶十數斤養之用辟暑濕之氣其品逺出日注上遂為草茶第一雲麓漫鈔茶出浙西湖州為上江南常州次之湖州出長興顧渚山中常州出義興君山懸脚嶺北岸下等處蔡寛夫詩話玉川子謝孟諫議寄新茶詩有手閲月團三百片及天子須嘗陽羡茶之句則孟所寄乃陽羡茶也楊文公談苑蠟茶出建州陸羽茶經尚未知之但言福建等州未詳往往得之其味極佳江左近日方有蠟面之號丁謂北苑茶録云剏造之始莫有知者質之三館檢討杜鎬亦曰在江左日始記有研膏茶歐陽公歸田録亦云出福建而不言所起按唐氏諸家説中往往有蠟面茶之語則是自唐有之也事物記原江左李氏别令取茶之乳作片或號京鋌的乳及骨子等是則京鋌之品自南唐始也苑録云的乳以降以下品雜鍊售之唯京師去者至真不雜意由此得名或曰自開寳來方有此茶當時識者云金陵僣國唯曰都下而以朝廷為京師今忽有此名其將歸京師乎羅廩茶解按唐時産茶地僅僅如季疵所稱而今之虎邱羅岕天池顧渚松羅龍井鴈宕武夷靈川大盤日鑄朱溪諸名茶無一與焉乃知靈草在在有之但培植不嘉或疎於採製耳潛確類書茶譜袁州之界橋其名甚著不若湖州之研膏紫筍烹之有緑脚垂下又婺州有舉巖茶片片方細所出雖少味極甘芳煎之如碧玉之乳也農政全書玉壘闗外寳唐山有茶樹産懸崖筍長三寸五寸方有一葉兩葉涪州出三般茶最上賔化其次白馬最下涪陵煮泉小品茶自浙以北皆較勝惟閩廣以南不惟水不可輕飲而茶亦當慎之昔鴻漸未詳嶺南諸茶但云往往得之其味極佳余見其地多瘴癘之氣染着水草北人食之多致成疾故謂人當慎之也茶譜通考岳陽之含膏冷劍南之緑昌明蘄門之團黄蜀川之雀舌巴東之真香夷陵之壓磚龍安之騎火江南通志蘇州府吳縣西山産茶榖雨前采焙極細者販於市爭先騰價以雨前為貴也吳郡虎邱志虎邱茶僧房皆植名聞天下榖雨前摘細芽焙而烹之其色如月下白其味如荳花香近因官司征以饋逺山僧供茶一觔費用銀數錢是以苦於賫送樹不修葺甚至刈斫之因以絶少米襄陽志林蘇州穹窿山下有海雲菴菴中有二茶樹其二株皆連理葢二百餘年矣姑蘇志虎邱寺西産茶朱安雅云今二山門西偏本名茶嶺陳眉公太平清話洞庭中西盡處有仙人茶乃樹上之苔蘚也四皓采以為茶圖經續記洞庭小青山塢出茶唐宋入貢下有水月寺因名水月茶古今名山記支硎山茶塢多種茶隨見録洞庭山有茶微似岕而細味甚甘香俗呼為嚇殺人産碧螺峰者尤佳名碧螺春松江府志佘山在府城北舊有佘姓者修道於此故名山産茶與笋並羙有蘭花香味故陳眉公云余鄉佘山茶與虎邱相伯仲常州府志武進縣章山麓有茶巢嶺唐陸龜蒙嘗種茶於此天下名勝志南岳古名陽羡山即君山北麓孫皓既封國後遂禪此山為岳故名唐時産茶充貢即所云南岳貢茶也常州宜興縣東南别有茶山唐時造茶入貢又名唐貢山在縣東南三十五里均山鄉武進縣志茶山路在廣化門外十里之内大墩小墩連綿簇擁有山之形唐代湖常二守㑹陽羡造茶修貢由此往返故名檀几叢書茗山在宜興縣西南五十里永豐鄉皇甫曽有送羽南山采茶詩可見唐時貢茶在茗山矣唐李栖筠守常州日山僧獻陽羡茶陸羽品為芬芳冠世産可供上方遂置茶舍於洞靈觀嵗造萬兩入貢後韋夏卿徙於無錫縣罨畫溪上去湖􅆜一里所許有榖詩云陸羽名荒舊茶舍却教陽羡置郵忙是也義興南岳寺唐天寳中有白蛇銜茶子墜寺前寺僧種之菴側由此滋蔓茶味倍佳號曰蛇種土人重之每嵗爭先餉遺官司需索修貢不絶迨今方春采茶清明日縣令躬享白蛇於卓錫泉亭隆厥典也後來檄取山農苦之故袁髙有隂嶺茶未吐使者牒已頻之句郭三益詩官符星火催春焙却使山僧怨白蛇盧仝茶歌安知百萬億蒼生命墜顛崖受辛苦可見貢茶之累民亦自古然矣洞山茶系羅岕去宜興而南踰八九十里浙直分界只一山岡岡南即長興山兩峯相阻介就夷曠者人呼為岕云履其地始知古人制字有意今字書岕字但注云山名耳有八十八處前横大磵水泉清駛潄潤茶根洩山土之肥澤故洞山為諸岕之最自西氿㴑漲渚而入取道茗嶺甚險惡縣西南八十里自東氿㴑湖􅆜而入取道瀍嶺稍夷才通車騎所出之茶厥有四品第一品老廟後廟祀山之土神者瑞草叢鬰殆比茶星肸蠁矣地不下二三畝苕溪姚象先與婿分有之茶皆古本每年産不過二十觔色淡黄不緑葉筋淡白而厚製成梗絶少入湯色柔白如玉露味甘芳香藏味中空濛深永啜之愈出致在有無之外第二品新廟後棋盤頂紗㡌頂手巾條姚八房及吳江周氏地産茶亦不能多香幽色白味冷􅖿與老廟不甚别啜之差覺其薄耳此皆洞頂岕也總之岕品至此清如孤竹和如栁下並入聖矣今人以色濃香烈為岕茶真耳食而眯其似也第三品廟後漲沙大袁頭姚洞羅洞王洞范洞白石第四品下漲沙梧桐洞余洞石場丫頭岕留青岕黄龍巖竈龍池此皆平洞本岕也外山之長潮青口箵莊顧渚茅山岕俱不入品岕茶彚鈔洞山茶之下者香清葉嫩着水香消棋盤頂紗帽頂雄鵞頭茗嶺皆産茶地諸地有老柯嫩柯惟老廟後無二梗葉叢宻香不外散稱為上品也鎮江府志潤州之茶傲山為佳寰宇記揚州江都縣蜀岡有茶園茶甘㫖如蒙頂蒙頂在蜀故以名岡上有時㑹堂春貢亭皆造茶所今廢見毛文錫茶譜宋史食貨志散茶出淮南有龍溪雨前雨後之類安慶府志六邑俱産茶以桐之龍山潛之閔山者為最蒔茶源在潛山縣香茗山在太湖縣大小茗山在望江縣隨見録宿松縣産茶嘗之頗有佳種但製不得法倘别其地辨其等製以能手品不在六安下徽州志茶産於松蘿而松蘿茶乃絶少其名則有勝金嫩桑仙芝來泉先春運合華英之品其不及號者為片茶八種近嵗茶名細者有雀舌蓮心金芽次者為芽下白為走林為羅公又其次者為開園為軟枝為大方製名號多端皆松蘿種也吳從先茗説松蘿子土産也色如梨花香如荳蘂飲如嚼雪種愈佳則色愈白即經宿無茶痕固足美也秋露白片子更輕清若空但香大惹人難乆貯非富家不能藏耳真者其妙若此畧溷他地一片色遂作惡不可觀矣然松蘿地如掌所産㡬許而求者四方雲至安得不以他溷耶黄山志蓮花菴旁就石縫養茶多輕香冷韻襲人齗齶昭代叢書張潮云吾鄉天都有抹山茶茶生石間非人力所能培植味淡香清足稱仙品採之甚難不可多得隨見録松蘿茶近稱紫霞山者為佳又有南源北源名色其松蘿真品殊不易得黄山絶頂有雲霧茶别有風味超出松蘿之外通志寧國府屬宣涇寧旌太諸縣各山俱産松蘿名勝志寧國縣鵶山在文脊山北産茶充貢茶經云味與蘄州同宋梅詢有茶煮鵶山雪滿甌之句今不可復得矣農政全書宣城縣有丫山形如小方餅横鋪茗芽産其上其山東為朝日所燭號曰陽坡其茶最勝太守薦之京洛人士題曰丫山陽坡横文茶一名瑞草魁華夷花木考宛陵茗池源茶根株頗碩生於隂谷春夏之交方發萌芽莖條雖長旗槍不展乍紫乍緑天聖初郡守李虚巳仝太史梅詢嘗試之品以為建溪顧渚不如也隨見録宣城有緑雪芽亦松蘿一類又有翠屏等名色其涇川涂茶芽細色白味香為上供之物通志池州府屬青陽石埭建徳俱産茶貴池亦有之九華山閔公墓茶四方稱之九華山志金地茶西域僧金地藏所植今傳枝梗空筒者是大抵烟霞雲霧之中氣常温潤與地上者不同味自異也通志廬州府屬六安霍山並産名茶其最著惟白茅貢尖即茶芽也毎嵗茶出知州具本恭進六安州有小峴山出茶名小峴春為六安極品霍山有梅花片乃黄梅時摘製色香兩兼而味稍薄又有銀針丁香松蘿等名色紫桃軒雜綴余生平慕六安茶適一門生作彼中守寄書託求數兩竟不可得殆絶意乎陳眉公筆記雲桑茶出瑯琊山茶類桑葉而小山僧焙而藏之其味甚清廣徳州建平縣雅山出茶色香味俱羙浙江通志杭州錢塘富陽及餘杭徑山多産茶天中記杭州寳雲山出者名寳雲茶下天竺香林洞者名香林茶上天竺白雲峯者名白雲茶田子藝云龍泓今稱龍井因其深也郡志稱有龍居之非也葢武林之山皆發源天目有龍飛鳯舞之䜟故西湖之山以龍名者多非真有龍居之也有龍則泉不可食矣泓上之閣亟宜去之浣花諸池尤所當浚湖壖雜記龍井産茶作荳花香與香林寳雲石人塢垂雲亭者絶異采於榖雨前者尤佳啜之淡然似乎無味飲過後覺有一種太和之氣瀰淪於齒頰之間此無味之味乃至味也為益於人不淺故能療疾其貴如珍不可多得坡仙食飲録寳嚴院垂雲亭亦産茶僧怡然以垂雲茶見餉坡報以大龍團陶榖清異録開寳中竇儀以新茶餉予味極羙奩面標云龍陂山子茶龍陂是顧渚山之别境吳興掌故顧渚左右有大小官山皆為茶園明月峽在顧渚側絶壁削立大澗中流亂石飛走茶生其間尤為絶品張文規詩所謂明月峽中茶始生是也顧渚山相𫝊以為吳王夫差於此顧望原隰可為城邑故名唐時其左右大小官山皆為茶園造茶充貢故其下有貢茶院蔡寛夫詩話湖州紫筍茶出顧渚在常湖二郡之間以其萌茁紫而似筍也毎嵗入貢以清明日到先薦宗廟後賜近臣馮可賓岕茶牋環長興境産茶者曰羅嶰曰白巖曰烏瞻曰青東曰顧渚曰篠浦不可指數獨羅嶰最勝環嶰境十里而遙為嶰者亦不可指數嶰而曰岕兩山之介也羅隠隠此故名在小秦王廟後所以稱廟後羅岕也洞山之岕南面陽光朝旭夕輝雲滃霧浡所以味逈别也名勝志茗山在蕭山縣西三里以山中出佳茗也又上虞縣後山茶亦佳方輿覽勝㑹稽有日鑄嶺嶺下有寺名資夀其陽坡名油車朝暮常有日茶産其地絶奇歐陽文忠云兩浙草茶日鑄第一紫桃軒雜綴普陀老僧貽余小白巖茶一裹葉有白茸瀹之無色徐引覺凉透心腑僧云本巖嵗止五六觔專供大士僧得啜者寡矣普陀山志茶以白華巖頂者為佳天台記丹邱出大茗服之生羽翼桑莊茹芝續譜天台茶有三品紫凝魏嶺小溪是也今諸處並無出産而土人所需多來自西坑東陽黄坑等處石橋諸山近亦種茶味甚清甘不讓他郡葢出自名山霧中宜其多液而全厚也但山中多寒萌發較遲兼之做法不佳以此不得取勝又所産不多僅足供山居而已天台山志葛仙翁茶圃在華頂峯上郡芳譜安吉州茶亦名紫筍通志茶山在金華府蘭溪縣廣輿記鳩坑茶出嚴州府淳安縣方山茶出衢州府龍游縣勞大與甌江逸志浙東多茶品雁宕山稱第一毎嵗榖雨前三日採摘茶芽進貢一槍兩旗而白毛者名曰明茶榖雨日採者名雨茶一種紫茶其色紅紫其味尤佳香氣尤清又名𤣥茶其味皆似天池而稍薄難種薄収土人厭人求索園圃中少種間有之亦為識者取去按盧仝茶經云温州無好茶天台瀑布水甌水味薄唯雁宕山水為佳此茶亦為第一曰去腥膩除煩惱却昏散消積食但以錫瓶貯者得清香味不以錫瓶貯者其色雖不堪觀而滋味且佳同陽羡山岕茶無二無别採摘近夏不宜早炒做宜熟不宜生如法可貯二三年愈佳愈能消宿食醒酒此為最者王草堂茶説温州中􅓝及漈上茶皆有名性不寒不熱屠粹忠三才藻異舉巖婺茶也片片方細煎如碧乳江西通志茶山在廣信府城北陸羽嘗居此洪州西山白露鶴嶺號絶品以紫清香城者為最及雙井茶芽即歐陽公所云石上生茶如鳯爪者也又羅漢茶如荳苗因靈觀尊者自西山持至故名南昌府志新建縣鵞岡西有鶴嶺雲物鮮羙草木秀潤産名茶異於他山通志瑞州府出茶芽廖暹十咏呼為雀舌香焙云其餘臨江南安等府俱出茶廬山亦産茶袁州府界橋出茶今稱仰山稠平木平者佳稠平者尤妙贑州府寧都縣出林岕乃一林姓者以長指甲炒之采製得法香味獨絶因之得名名勝志茶山寺在上饒縣城北三里按圖經即廣教寺中有茶園數畝陸羽泉一勺羽性嗜茶環居皆植之烹以是泉後人遂以廣教寺為茶山寺云宋有茶山居士曽吉甫名㡬以兄開忤秦檜奉祠僑居此寺凡七年杜門不問世故丹霞洞天志建昌府麻姑山産茶惟山中之茶為上家園植者次之饒州府志浮梁縣陽府山冬無積雪凡物早成而茶尤殊異金君卿詩云聞雷已薦雞鳴笋未雨先嘗雀舌茶以其地暖故也通志南康府出匡茶香味可愛茶品之最上者九江府彭澤縣九都山出茶其味畧似六安廣輿記徳化茶出九江府又崇義縣多産茶吉安府志龍泉縣匡山有苦齋章溢所居四面峭壁其下多白雲上多北風植物之味皆苦野蜂巢其間采花蘂作蜜味亦苦其茶苦於常茶羣芳譜太和山騫林茶初泡極苦澀至三四泡清香特異人以為茶寳福建通志福州泉州建寧延平興化汀州邵武諸府俱産茶合璧事類建州出大片方山之芽如紫筍片大極硬須湯浸之方可碾治頭痛江東老人多服之天下名山記鼔山半巖茶色香風味當為閩中第一不讓虎邱龍井也雨前者毎兩僅十錢其價亷甚一云前朝毎嵗進貢至楊文敏當國始奏罷之然近來官取其擾甚於進貢矣栢巖福州茶也巖即栢梁臺興化府志仙遊縣出鄭宅茶真者無㡬大都以贋者雜之雖香而味薄陳懋仁泉南雜志清源山茶青翠芳馨超軼天池之上南安縣英山茶精者可亞虎邱惜所産不若清源之多也閩地氣暖桃李冬花故茶較吳中差早延平府志㯶毛茶出南平縣半巖者佳建寧府志北苑在郡城東先是建州貢茶首稱北苑龍團而武夷石乳之名未著至元時設塲於武夷遂與北苑並稱今則但知有武夷不知有北苑矣吴越間人頗不足閩茶而甚艶北苑之名不知北苑實在閩也宋無名氏北苑别録建安之東三十里有山曰鳯凰其下直北苑旁聨諸焙厥土赤壤厥茶惟上上太平興國中初為御焙嵗模龍鳯以羞貢篚葢表珍異慶厯中漕臺益重其事品數日増制度日精厥今茶自北苑上者獨冠天下非人間所可得也方其春蟲震蟄羣夫雷動一時之盛誠為大觀故建人謂至建安而不詣北苑與不至者同僕因攝事得研究其始末姑摭其大概修為十餘類目曰北苑别録云御園九窠十二隴麥窠壤園龍游窠小苦竹苦竹裏雞藪窠苦竹苦竹源鼯䑕窠教練隴鳯凰山大小焊横坑猿游隴張坑帶園焙東中歴東際西際官平石碎窠上下官坑虎膝窠樓隴蕉窠新園天樓基院坑曽坑黄際馬安山林園和尚園黄淡窠吴彦山羅漢山水桑窠銅塲師如園靈滋苑馬園髙畬大窠頭小山右四十六所廣袤三十餘里自官平而上為内園官坑而下為外園方春靈芽萌拆先民焙十餘日如九窠十二隴龍游窠小苦竹張坑西際又為禁園之先也東溪試茶録舊記建安郡官焙三十有八丁氏舊録云官私之焙千三百三十有六而獨記官焙三十二東山之焙十有四北苑龍焙一乳橘内焙二乳橘外焙三重院四壑嶺五渭源六范源七蘇口八東宫九石坑十連溪十一香口十二火梨十三開山十四南溪之焙十有二下瞿一濛洲東二汾東三南溪四斯源五小香六際㑹七謝坑八沙龍九南香十中瞿十一黄熟十二西溪之焙四慈善西一慈善東二慈恵三船坑四北山之焙二慈善東一豐樂二外有曽坑石坑壑源葉源佛嶺沙溪等處惟壑源之茶甘香特勝茶之名有七一曰白茶民間大重出於近嵗園焙時有之地不以山川逺近發不以社之先後芽葉如紙民間以為茶瑞取其第一者為鬭茶次曰柑葉茶樹髙丈餘徑頭七八寸葉厚而圓狀如柑橘之葉其芽發即肥乳長二寸許為食茶之上品三曰早茶亦類柑葉發常先春民間採製為試焙者四曰細葉茶葉比柑葉細薄樹髙者五六尺芽短而不肥乳今生沙溪山中葢土薄而不茂也五曰稽茶葉細而厚宻芽晚而青黄六曰晚茶蓋稽茶之類發比諸茶較晚生於社後七曰叢茶亦曰叢生茶髙不數尺一嵗之間發者數四貧民取以為利品茶要録壑源沙溪其地相背而中隔一嶺其去無數里之遙然茶産頓殊有能出力移裁植之亦為風土所化竊嘗怪茶之為草一物耳其勢必猶得地而後異豈水絡地脉偏鍾粹於壑源而御焙占此大岡巍隴神物伏䕶得其餘䕃耶何其甘芳精至而羙擅天下也觀夫春雷一鳴筠籠纔起售者已擔簦挈槖於其門或先期而散留金錢或茶纔入笪而爭酬所直故壑源之茶常不足容所求其有桀猾之園民隂取沙溪茶葉雜就家棬而製之人耳其名睨其規模之相若不能原其實者葢有之矣凡壑源之茶售以十則沙溪之茶售以五其直大率倣此然沙溪之園民亦勇於覔利或雜以松黄飾其首面凡肉理怯薄體輕而色黄者試時鮮白不能久泛香薄而味短者沙溪之品也凡肉理實厚質體堅而色紫試時泛盞凝久香滑而味長者壑源之品也潛確類書歴代貢茶以建寧為上有龍團鳯團石乳滴乳緑昌明頭骨次骨末骨鹿骨山挺等名而宻雲龍最髙皆碾屑作餅至國朝始用芽茶曰探春曰先春曰次春曰紫筍而龍鳯團皆廢矣名勝志北苑茶園屬甌寧縣舊經云偽閩龍啓中里人張暉以所居北苑地宜茶悉獻之官其名始著三才藻異石巖白建安能仁寺茶也生石縫間建寧府屬浦城縣江郎山出茶即名江郎茶武夷山志前朝不貴閩茶即貢者亦只備宫中涴濯甌盞之需貢使類以價貨京師所有者納之間有採辦皆劍津廖地産非武夷也黄冠毎市山下茶登山貿之人莫能辨茶洞在接笋峯側洞門甚隘内境夷曠四週皆穹崖壁立土人種茶視他處為最盛崇安殷令招黄山僧以松蘿法製建茶真堪並駕人甚珍之時有武夷松蘿之目王梓茶説武夷山週迴百二十里皆可種茶茶性他産多寒此獨性温其品有二在山者為巖茶上品在地者為洲茶次之香清濁不同且泡時巖茶湯白洲茶湯紅以此為别雨前者為頭春稍後為二春再後為三春又有秋中採者為秋露白最香須種植採摘烘焙得宜則香味兩絶然武夷本石山峯巒載土者寥寥故所産無㡬若洲茶所在皆是即隣邑近多栽植運至山中及星村墟市賈售皆冐充武夷更有安溪所産尤為不堪或品嘗其味不甚貴重者皆以假亂真誤之也至於蓮子心白毫皆洲茶或以木蘭花熏成欺人不及巖茶逺矣張大復梅花筆談經云嶺南生福州建州今武夷所産其味極佳葢以諸峯拔立正陸羽所云茶上者生爛石中者耶草堂雜録武夷山有三味茶苦酸甜也别是一種飲之味果屢變相傳能解酲消脹然采製甚少售者亦稀隨見録武夷茶在山上者為巖茶水邊者為洲茶巖茶為上洲茶次之巖茶北山者為上南山者次之南北兩山又以所産之巖名為名其最佳者名曰工夫茶工夫之上又有小種則以樹名為名毎株不過數兩不可多得洲茶名色有蓮子心白毫紫毫龍鬚鳯尾花香蘭香清香奧香選芽漳芽等類廣輿記泰寧茶出邵武府福寧州大姥山出茶名緑雪芽湖廣通志武昌茶出通山者上崇陽蒲圻者次之廣輿記崇陽縣龍泉山周二百里山有洞好事者持炬而入行數十歩許坦平如室可容千百衆石渠流泉清冽鄉人號曰魯溪巖産茶甚甘羙天下名勝志湖廣江夏縣洪山舊名東山茶譜云鄂州東山出茶黒色如韭食之已頭痛武昌郡志茗山在蒲圻縣北十五里産茶又大冶縣亦有茗山荆州土地記武陵七縣通出茶最好岳陽風土記㴩湖諸山舊出茶謂之㴩湖茶李肇所謂岳州㴩湖之含膏是也唐人極重之見於篇什今人不甚種植惟白鶴僧園有千餘本土地頗類北苑所出茶一嵗不過一二十觔土人謂之白鶴茶味極甘香非他處草茶可比並茶園地色亦相類但土人不甚植爾通志長沙茶陵州以地居茶山之隂因名昔炎帝葬於茶山之野茶山即雲陽山其陵谷間多生茶茗故也長沙府出茶名安化茶辰州茶出溆浦彬州亦出茶類林新咏長沙之石楠葉摘芽為茶名欒茶可治頭風湘人以四月四日摘楊桐草搗其汁拌米而蒸猶餻糜之類必啜此茶乃去風也合璧事類潭郡之間有渠江中出茶而多毒蛇猛獸鄉人每年采擷不過十五六觔其色如鐵而芳香異常烹之無脚湘潭茶味畧似普洱土人名曰芙蓉茶茶事拾遺潭州有鐵色夷陵有壓磚通志靖州出茶油蘄水有茶山産茶河南通志羅山茶出河南汝寧府信陽州桐柏山志瀑布山一名紫凝山産大葉茶山東通志兖州府費縣蒙山石巔有花如茶土人取而製之其味清香逈異他茶貢茶之異品也輿志蒙山一名東山上有白雲巖産茶亦稱蒙頂王草堂云乃石上之苔為之非茶類也廣東通志廣州韶州南雄肇慶各府及羅定州俱産茶西樵山在郡城西一百二十里峰巒七十有二唐末詩人曹松移植顧渚茶於此居人遂以茶為生業韶州府曲江縣曹溪茶嵗可三四採其味清甘潮州大埔縣肇慶恩平縣俱有茶山徳慶州有茗山欽州靈山縣亦有茶山吳陳琰曠園雜志端州白雲山出雲獨奇山故蒔茶在絶壁嵗不過得一石許價可至百金王草堂雜録粤東珠江之南産茶曰河南茶潮陽有鳯山茶樂昌有毛茶長樂有石茗瓊州有靈茶烏藥茶云嶺南雜記廣南出苦䔲茶俗呼為苦丁非茶也茶大如掌一片入壺其味極苦少則反有甘味噙嚥利咽喉之症功並山豆根化州有琉璃茶出琉璃菴其産不多香與峒岕相似僧人奉客不及一兩羅浮有茶産於山頂石上剥之如蒙山之石茶其香倍於廣岕不可多得南越志龍川縣出臯盧味苦澀南海謂之過盧陜西通志漢中府興安州等處産茶如金州石泉漢隂平利西鄉諸縣各有茶園他郡則無四川通志四川産茶州縣凡二十九處成都府之資陽安縣灌縣石泉崇慶等重慶府之南川黔江鄷都武隆彭水等䕫州府之建始開縣等及保寧府遵義府嘉定州瀘州雅州烏蒙等處東川茶有神泉獸目卭州茶曰火井華陽國志涪陵無蠶桑惟出茶丹漆蜜蠟華夷花木考蒙頂茶受陽氣全故芳香唐李徳裕入蜀得蒙餅以沃於湯瓶之上移時盡化乃騐其真蒙頂又有五花茶其片作五出毛文錫茶譜蜀州晉原洞口横原珠江青城有横芽雀舌鳥觜麥顆葢取其嫩芽所造以形似之也又有片甲蟬翼之異片甲者早春黄芽其葉相抱如片甲也蟬翼者其葉嫩薄如蟬翼也皆散茶之最上者東齋紀事蜀雅州蒙頂産茶最佳其生最晚每至春夏之交始出常有雲霧覆其上若有神物䕶持之羣芳譜峽州茶有小江園碧磵􅀢明月房茱萸􅀢等陸平泉茶寮記事蜀雅州蒙頂上有火前茶最好謂禁火以前採者後者謂之火後茶有露芽榖芽之名述異記巴東有真香茗其花白色如薔薇煎服令人不眠能誦無忘廣輿記峩嵋山茶其味初苦而終甘又瀘州茶可療風疾又有一種烏茶出天全六畨招討使司境内王新城隴蜀餘聞蒙山在名山縣西十五里有五峯最髙者曰上清峯其巔一石大如數間屋有茶七株生石上無縫罅云是甘露大師手植毎茶時葉生智炬寺僧輒報有司往視籍記其葉之多少采製纔得數錢許明時貢京師僅一錢有奇環石别有數十株曰陪茶則供藩府諸司之用而已其旁有泉恒用石覆之味清妙在恵泉之上雲南記名山縣出茶有山曰蒙山聨延數十里在西南按拾遺志尚書所謂蔡蒙旅平者蒙山也在雅州凡蜀茶盡在此雲南通志茶山在元江府城西北普洱界太華山在雲南府西産茶色似松蘿名曰太華茶普洱茶出元江府普洱山性温味香兒茶出永昌府俱作團又感通茶出大理府㸃蒼山感通寺續博物志威逺州即唐南詔銀生府之地諸山出茶收採無時雜椒薑烹而飲之廣輿記雲南廣西府出茶又灣甸州出茶其境内孟通山所産亦類陽羡茶榖雨前採者香曲靖府出茶子叢生單葉子可作油許鶴沙滇行紀程滇中陽山茶絶類松蘿天中記容州黄家洞出竹茶其葉如嫩竹土人採以作飲甚甘羙廣西容縣唐容州貴州通志貴陽府産茶出龍里東苗坡及陽寳山土人製之無法味不佳近亦有採芽以造者稍可供啜威寧府茶出平逺産巖間以法製之味亦佳地圖綜要貴州新添軍民衛産茶平越軍民衛亦出茶研北雜志交趾出茶如緑苔味辛烈名曰登北人重譯名茶曰釵續茶經卷下之四欽定四庫全書續茶經卷下之五候補主事陸廷燦撰九茶之畧茶事著述名目茶經三巻唐太子文學陸羽撰茶記三卷前人見國史經籍志顧渚山記二卷前人煎茶水記一卷江州刺史張又新撰采茶録三卷温庭筠撰補茶事太原温從雲武威叚􅀈之茶訣三卷釋皎然撰茶述裴汶茶譜一卷偽蜀毛文錫大觀茶論二十篇宋徽宗撰建安茶録三卷丁謂撰試茶録二卷蔡襄撰進茶録一卷前人品茶要録一巻建安黄儒撰建安茶記一卷吕惠卿撰北苑拾遺一卷劉异撰北苑煎茶法前人東溪試茶録宋子安集一作朱子安補茶經一卷周絳撰又一卷前人北苑總録十二卷曾伉録茶山節對一卷攝衢州長史蔡宗顔撰茶譜遺事一卷前人宣和北苑貢茶録建陽熊蕃撰宋朝茶法沈括茶論前人北苑别録一卷趙汝礪撰北苑别録無名氏造茶雜録張文規茶雜文一卷集古今詩及茶者壑源茶録一卷章炳文北苑别録熊克龍焙美成茶録范逵茶法易覽十卷沈立建茶論羅大經煮茶泉品葉清臣十友譜茶譜失名品茶一篇陸魯山續茶譜桑莊茹芝茶録張源煎茶七類徐渭茶寮記陸樹聲茶譜顧元慶茶具圖一卷前人茗笈屠本畯茶録馮時可岕山茶記熊明遇茶疏許次杼八牋茶譜髙濓煮泉小品田藝衡茶牋屠隆岕茶牋馮可賔峒山茶系周髙起伯髙水品徐獻忠竹嬾茶衡李日華茶觧羅廪松寮茗政卜萬祺茶譜錢友蘭翁茶集一卷胡文煥茶記吕仲吉茶箋聞龍岕茶别論周慶叔茶董夏茂卿茶説邢士襄茶史趙長白茶説吳從先武夷茶説𠂻仲儒茶譜朱碩儒見黄與堅集岕茶彚鈔冐襄茶考徐􅎾羣芳譜茶譜王象晉佩文齋廣羣芳譜茶譜詩文名目杜毓荈賦顧况茶賦吳淑茶賦李文簡茗賦梅堯臣南有佳茗賦黄庭堅煎茶賦程宣子茶銘曹暉茶銘蘇􅛫仙芽傳湯悦森伯傳蘇軾葉嘉傳支廷訓湯藴之傳徐巖泉六安州茶居士傳吕温三月三日茶晏序熊禾北苑茶焙記趙孟熧武夷山茶塲記暗都剌喊山臺記文德翼廬山免給茶引記茅一相茶譜序清虛子茶論何恭茶議汪可立茶經後序吳旦茶經跋童承叙論茶經書趙觀煑泉小品序詩文摘句合璧事類龍溪除起宗制有云必能為我講摘山之制得充厩之良胡文恭行孫諮制有云領􅈫商車典領茗軸唐武元衡有謝賜新火及新茶表劉禹錫栁宗元有代武中承謝賜新茶表韓􅀈為田神玉謝賜茶表有味足蠲邪助其正直香堪愈疾沃以勤勞吳主禮賢方聞置茗晉臣愛客纔有分茶之句宋史李稷重秋葉黄花之禁宋通商茶法詔乃歐陽修筆代福建提舉茶事謝上表乃洪邁筆謝宗謝茶啓比丹丘之仙芽勝烏程之御荈不止味同露液白况霜華豈可為酪蒼頭便應代酒從事茶榜雀舌初調玉盌分時茶思徤龍團搥碎金渠碾處睡魔降劉言史與孟郊洛北野泉上煎茶有詩僧皎然尋陸羽不遇有詩白居易有睡後茶興憶楊同州詩皇甫曽有送陸羽採茶詩劉禹錫石園蘭若試茶歌有云欲知花乳清冷味湏是眠雲跂石人鄭谷峽中嘗茶詩入座半甌輕泛緑開緘數片淺含黄杜牧茶山詩山實東南秀茶稱瑞草魁施肩吾詩茶為滌煩子酒為忘憂君秦韜玉有採茶歌顔真卿有月夜啜茶聨句詩司空圖詩碾盡明昌幾角茶李羣玉詩客有衡山隠遺余石廪茶李郢酬友人春暮寄枳花茶詩蔡襄有北苑茶壟採茶造茶試茶詩五首朱熹集香茶供飬黄栢長老悟公塔有詩文公茶坂詩㩦籝北嶺西採葉供茗飲一啜夜窻寒跏趺謝衾枕蘇軾有和錢安道寄惠建茶詩坡仙食飲録有問大冶長老乞桃花茶栽詩韓駒集謝人送鳯團茶詩白髪前朝舊史官風爐煑茗暮江寒蒼龍不復從天下拭淚看君小鳯團蘇轍有咏茶花詩二首有云細嚼花鬚味亦長新芽一粟葉間藏孔平仲夢錫惠墨答以蜀茶有詩岳珂茶花盛放滿山詩有潔躬淡薄隠君子苦口森嚴大丈夫之句趙抃集次謝許少卿寄卧龍山茶詩有越芽逺寄入都時詶唱争誇互見詩之句文彦博詩舊譜最稱蒙頂味露芽雲液勝醍醐張文規詩明月峽中茶始生明月峽與顧渚聫屬茶生其間者尤為絶品孫覿有飲修仁茶詩韋處厚茶嶺詩顧渚吳霜絶蒙山蜀信稀千叢因此始含露紫茸肥周必大集胡邦衡生日以詩送北苑八銙日注二瓶賀客稱觴滿冠霞懸知酒渴正思茶尚書八餅分閩焙主簿䨇瓶揀越芽又有次韻王少府送焦坑茶詩陸放翁詩寒泉自換菖蒲水活火閒煎橄欖茶又村舍雜書東山石上茶鷹爪初脱韝雪落紅絲磑香動銀毫甌爽如聞至言餘味終日留不知葉家白亦復有此否劉詵詩鸚鵡茶香堪供客荼䕷酒熟足娛親王禹偁茶園詩茂育知天意甄收荷主恩沃心同直諫苦口類嘉言梅堯臣集宋著作寄鳯茶詩團為蒼玉璧隠起雙飛鳯獨應近日頒豈得常寮共又李求仲寄建溪洪井茶七品云忽有西山使始遺七品茶末品無水暈六品無沉柤五品散雲脚四品浮粟花三品若瓊乳二品罕所加絶品不可議甘香焉等差又答宣城梅主簿遺鴉山茶詩云昔觀唐人詩茶咏鴉山嘉鴉啣茶子生遂同山名鴉又有七寳茶詩云七物甘香雜蕊茶浮花泛緑亂於霞啜之始覺君恩重休作尋常一等誇又吳正仲餉新茶沙門頴公遺碧霄峯茗俱有吟咏戴復古謝史石窻送酒并茶詩曰遺來二物應時須客子行厨用有餘午困政需茶料理春愁全仗酒消除費氏宫詞近被宫中知了事每來隨駕使煎茶楊廷秀有謝木舍人送講筵茶詩葉適有寄謝王文叔送真日鑄茶詩云誰知真苦澁黯淡發竒光杜本武夷茶詩春從天上來噓咈通寰海納納此中藏萬斛珠蓓蕾劉秉忠嘗雲芝茶詩云鐵色皺皮帶老霜含英咀美入詩腸髙啓有月團茶歌又有茶軒詩楊慎有和章水部沙坪茶歌沙坪茶出玉壘闗外實唐山董其昌贈煎茶僧詩怪石與枯槎相將度嵗華鳯團雖貯好只吃趙州茶婁堅有花朝醉後為女郎題品泉圖詩程嘉燧有虎丘僧房夏夜試茶歌南宋雜事詩云六一泉烹雙井茶朱隗虎丘竹枝詞官封茶地雨前開皂𨽻衙官攪似雷近日正堂偏體貼監茶不遣掾曹來綿津山人漫堂咏物有大食索耳茶盃詩云粤香泛永夜詩思來悠然注武夷有粤香茶薛熙依歸集有朱新菴今茶譜序續茶經卷下之五欽定四庫全書續茶經卷下之六候補主事陸廷燦撰十茶之圖歴代圖畵名目唐張萱有烹茶士女圖見宣和畵譜唐周昉寓意丹青馳譽當代宣和御府所藏有烹茶圖一五代陸滉烹茶圖一宋中興館閣儲藏宋周文矩有火龍烹茶圖四煎茶圖一宋李龍眠有虎阜采茶圖見題跋宋劉松年絹畵盧仝煑茶圖一卷有元人跋十餘家范司理龍石藏王齊翰有陸羽煎茶圖見王世懋澹園畫品董逌陸羽㸃茶圖有跋元錢舜舉畵陶學士雪夜煑茶圖在焦山道士郭苐處見詹景鳯東岡𤣥覽史石窗名文卿有煑茶圖袁桷作煑茶圖詩序馮璧有東坡海南烹茶圖并詩嚴氏書畵記有杜檉居茶經圖汪珂玉珊瑚網載盧仝烹茶圖明文徴明有烹茶圖沈石田有醉茗圖題云酒邊風月與誰同陽羡春雷醉耳聾七椀便堪酬酩酊任渠髙枕夢周公沈石田有為吳匏庵寫虎丘對茶坐雨圖淵鑒齋書畫譜陸包山治有烹茶圖補元趙松雪有宫女啜茗圖見漁洋詩話劉孔和詩茶具十二圖韋鴻臚贊曰祝融司夏萬物焦爍火炎昆岡玉石俱焚爾無與焉乃若不使山谷之英􅑁於塗炭子與有力矣上卿之號頗著㣲稱木待制上應列宿萬民以濟禀性剛直摧折彊梗使隨方逐圓之徒不能保其身善則善矣然非佐以法曹資之樞宻亦莫能成厥功金法曹柔亦不茹剛亦不吐圓機運用一皆有法使强梗者不得殊軌亂轍豈不韙與石轉運抱堅質懐直心嚌嚅英華周行不怠斡摘山之利操漕權之重循環自常不舍正而適他雖沒齒無怨言胡員外周旋中規而不逾其間動静有常而性苦其卓鬱結之患悉能破之雖中無所有而外能研究其精㣲不足以望圓機之士羅樞宻機事不宻則害成今髙者抑之下者揚之使精粗不致於混殽人其難諸柰何矜細行而事諠譁惜之宗從事孔門髙弟當灑掃應對事之末者亦所不棄又况能萃其既散拾其已遺運寸毫而使邊塵不飛功亦善哉漆雕秘閣危而不持顛而不扶則吾斯之未能信以其弭執熱之患無㘭堂之覆故宜輔以寳文而親近君子陶寶文出河濵而無苦窳經緯之象剛柔之理炳其弸中虛己待物不飾外貎休髙秘閣宜無愧焉湯提㸃飬浩然之氣發沸騰之聲以執中之能輔成湯之德斟酌賔主間功邁仲叔圉然未免外爍之憂復有内熱之患柰何竺副帥首陽餓夫毅諌於兵沸之時方今鼎揚湯能探其沸者幾希子之清節獨以身試非臨難不顧者疇見爾司職方互鄉童子聖人猶與其進况端方質素經緯有理終身湼而不緇者此孔子所以與潔也竹爐并分封茶具六事苦節君銘曰肖形天地匪冶匪陶心存活火聲帶湘濤一滴甘露滌我詩腸清風兩腋洞然八荒苦節君行省茶具六事分封悉貯於此侍從苦節君於泉石山齋亭館間執事者故以行省名之陸鴻漸所謂都籃者此其是與建城茶宜宻裹故以篛籠盛之今稱建城按茶録云建安民間以茶為尚故據地以城封之雲屯泉汲於雲根取其潔也今名雲屯盖雲即泉也貯得其所雖與列職諸君同事而獨屯於斯豈不清髙絶俗而自貴哉烏府炭之為物貎𤣥性剛遇火則威靈氣燄赫然可畏苦節君得此甚利於用也况其别號烏銀故特表章其所藏之具曰烏府不亦宜哉水曹茶之真味藴諸旗鎗之中必浣之以水而後發也凡器物用事之餘未免殘瀝㣲垢皆賴水沃盥因名其器曰水曹器局一應茶具收貯於器局供役苦節君者故立名管之品司茶欲啜時入以笋欖𤓰仁芹蒿之屬則清而且佳因命湘君設司檢束羅先登續文房圖贊玉川先生毓秀蒙頂蜚英玉川搜攪胸中書傳五千儒素家風清淡滋味君子之交其淡如水續茶經卷下之六
